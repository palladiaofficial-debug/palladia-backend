name: API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    name: Syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check syntax — tutti i file route e lib
        run: |
          find routes lib middleware scripts -name "*.js" | while read f; do
            node --check "$f" || exit 1
          done
          echo "✓ Syntax OK"

  api-tests:
    name: API regression tests
    runs-on: ubuntu-latest
    needs: syntax-check

    env:
      # Test base — senza JWT, esegue solo i test pubblici (health, auth rejection)
      TEST_BASE_URL: http://localhost:3001
      NODE_ENV: test
      # Variabili minime per avviare il server senza crash
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      JWT_SECRET: test-secret-ci
      QR_SIGNING_SECRET: test-qr-secret-ci
      PIN_SIGNING_SECRET: test-pin-secret-ci
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      FRONTEND_URL: http://localhost:5173
      APP_BASE_URL: http://localhost:3001
      # Autenticati — solo TEST_CI_PASSWORD è obbligatoria per i test autenticati
      # Gli ID sono hardcoded come default nel test script (generati da setup-ci-user.js)
      TEST_CI_PASSWORD: ${{ secrets.TEST_CI_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start server in background
        run: |
          node server.js &
          echo $! > /tmp/server.pid
          # Aspetta che il server sia pronto (max 30s)
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001/api/health > /dev/null && echo "Server pronto dopo ${i}s" && break
            sleep 1
          done

      - name: Run API regression tests
        run: npm test

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill $(cat /tmp/server.pid) || true
          fi
