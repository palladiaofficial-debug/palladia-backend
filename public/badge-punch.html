<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#f5f3ee">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Timbratura">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/manifest.json" id="pwa-manifest">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <title>Timbratura — Palladia</title>
  <script>
  (function () {
    var parts = location.pathname.split('/').filter(Boolean);
    var idx   = parts.indexOf('timbratura');
    var code  = idx !== -1 ? (parts[idx + 1] || '') : '';
    if (code && /^[A-Fa-f0-9]{18}$/i.test(code)) {
      document.getElementById('pwa-manifest').href = '/timbratura/' + code + '/manifest.json';
    }
  })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f5f3ee;
      --surface:  #ffffff;
      --border:   #e4e7ec;
      --text:     #1a1a1a;
      --muted:    #71717a;
      --green:    #16a34a;
      --green-dk: #15803d;
      --red:      #dc2626;
      --red-dk:   #b91c1c;
      --amber:    #d97706;
      --blue:     #2563eb;
      --radius:   16px;
    }

    html, body {
      min-height: 100%;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 17px;
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px 48px;
      min-height: 100dvh;
    }

    /* ── Brand header ── */
    .topbar {
      width: 100%;
      max-width: 480px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 0 8px;
    }
    .brand {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Container ── */
    .wrap {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 12px;
    }

    /* ── Card generica ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    /* ── Lavoratore badge ── */
    .worker-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;
    }
    .avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--blue);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .avatar-photo {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }
    .worker-info { flex: 1; min-width: 0; }
    .worker-name {
      font-size: 19px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .worker-sub { font-size: 13px; color: var(--muted); margin-top: 3px; }

    /* ── Cantiere info ── */
    .site-card {
      padding: 16px 20px;
    }
    .site-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .site-name {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 2px;
    }
    .site-address { font-size: 13px; color: var(--muted); }

    /* ── Bottone punch — IL BOTTONE ── */
    .punch-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      min-height: 80px;
      border: none;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: opacity 0.12s, transform 0.1s;
      -webkit-appearance: none;
      text-transform: uppercase;
    }
    .punch-btn:active  { transform: scale(0.97); opacity: 0.9; }
    .punch-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .punch-btn.entry {
      background: var(--green);
      color: #fff;
    }
    .punch-btn.exit {
      background: var(--red);
      color: #fff;
    }
    .punch-icon { font-size: 28px; line-height: 1; }

    /* ── GPS status ── */
    .gps-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 4px 0;
      min-height: 28px;
    }
    .gps-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .gps-dot.ok    { background: var(--green); }
    .gps-dot.warn  { background: var(--amber); animation: blink 1.2s infinite; }
    .gps-dot.error { background: var(--red); }
    .gps-dot.wait  { background: var(--muted); }
    .gps-text {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
    }
    .gps-text.ok    { color: var(--green); }
    .gps-text.warn  { color: var(--amber); }
    .gps-text.error { color: var(--red); }

    @keyframes blink { 50% { opacity: 0.3; } }

    /* ── Hint ── */
    .hint-text {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }
    .hint-help {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── Schermata selezione cantiere ── */
    .site-select-label {
      font-size: 15px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 4px;
    }
    .site-select-sub {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 16px;
    }
    .site-btn {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
      width: 100%;
      padding: 18px 20px;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      text-align: left;
      margin-bottom: 8px;
    }
    .site-btn:hover  { border-color: var(--blue); background: rgba(37,99,235,.06); }
    .site-btn:active { transform: scale(0.98); }
    .site-btn-name { font-size: 17px; font-weight: 700; color: var(--text); }
    .site-btn-addr { font-size: 13px; color: var(--muted); }
    .site-btn-dist { font-size: 12px; color: var(--green); font-weight: 600; margin-top: 2px; }

    /* ── Stato successo ── */
    .success-wrap {
      text-align: center;
      padding: 32px 20px 24px;
    }
    .success-icon { font-size: 56px; line-height: 1; margin-bottom: 16px; display: block; }
    .success-title { font-size: 26px; font-weight: 800; margin-bottom: 6px; }
    .success-sub   { font-size: 15px; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }
    .success-close { font-size: 13px; color: var(--muted); }

    /* ── Errore ── */
    .error-wrap {
      text-align: center;
      padding: 40px 20px;
    }
    .error-icon  { font-size: 40px; display: block; margin-bottom: 14px; }
    .error-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .error-sub   { font-size: 14px; color: var(--muted); line-height: 1.6; }

    /* ── Loading ── */
    .spinner {
      display: block;
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-wrap {
      text-align: center;
      padding: 56px 20px;
    }
    .loading-text { font-size: 14px; color: var(--muted); margin-top: 16px; }

    /* ── Spinner nel bottone ── */
    .btn-spinner {
      display: inline-block;
      width: 22px;
      height: 22px;
      border: 2px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .65s linear infinite;
    }

    .hidden { display: none !important; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeUp 0.3s ease-out both; }

    /* ── Guida salvataggio Home ── */
    #pwa-guide {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 300;
      padding: 0;
    }
    #pwa-guide.hidden { display: none !important; }

    .pwa-sheet {
      background: #ffffff;
      border-top: 1px solid #e4e7ec;
      border-radius: 24px 24px 0 0;
      padding: 28px 24px 40px;
      width: 100%;
      max-width: 520px;
      animation: slideUp .28s ease-out both;
    }
    @keyframes slideUp {
      from { transform: translateY(60px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .pwa-handle {
      width: 40px; height: 4px;
      background: #d1d5db;
      border-radius: 2px;
      margin: 0 auto 22px;
    }
    .pwa-headline {
      font-size: 20px;
      font-weight: 800;
      color: #111827;
      text-align: center;
      margin-bottom: 6px;
      line-height: 1.25;
    }
    .pwa-sub {
      font-size: 14px;
      color: #6b7280;
      text-align: center;
      margin-bottom: 26px;
      line-height: 1.5;
    }
    .pwa-steps { display: flex; flex-direction: column; gap: 16px; margin-bottom: 28px; }
    .pwa-step {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .pwa-step-num {
      width: 30px; height: 30px;
      background: #000000;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 800; color: #fff;
      flex-shrink: 0; margin-top: 1px;
    }
    .pwa-step-text {
      flex: 1;
      font-size: 15px;
      color: #374151;
      line-height: 1.5;
    }
    .pwa-step-text strong { color: #111827; }
    .pwa-step-icon { font-size: 19px; flex-shrink: 0; margin-top: 2px; }

    .pwa-note {
      background: #fefce8;
      border: 1px solid #fde68a;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 13px;
      color: #78350f;
      line-height: 1.5;
      margin-bottom: 22px;
    }

    .pwa-btn-primary {
      display: block;
      width: 100%;
      padding: 16px;
      background: #000000;
      color: #fff;
      border: none;
      border-radius: 14px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      margin-bottom: 12px;
      letter-spacing: 0.01em;
    }
    .pwa-btn-skip {
      display: block;
      width: 100%;
      padding: 12px;
      background: none;
      color: #9ca3af;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="brand">Palladia</div>
  </div>

  <!-- Guida salvataggio Home — si apre automaticamente, contenuto generato da JS -->
  <div id="pwa-guide" class="hidden">
    <div class="pwa-sheet">
      <div class="pwa-handle"></div>
      <div class="pwa-headline" id="pwa-headline">Salva sulla schermata Home</div>
      <div class="pwa-sub">Così apri Timbratura ogni giorno con un tocco — senza più scansionare il QR code.</div>
      <div class="pwa-steps" id="pwa-steps"><!-- riempito da JS --></div>
      <div class="pwa-note" id="pwa-note" style="display:none"></div>
      <button class="pwa-btn-primary" id="pwa-btn-primary" onclick="pwaGuideAction()">Ho capito — ci provo!</button>
      <button class="pwa-btn-skip" onclick="pwaGuideSkip()">Adesso no, faccio dopo</button>
    </div>
  </div>

  <div class="wrap" id="wrap">
    <!-- Contenuto iniettato da JS -->
    <div class="card loading-wrap">
      <span class="spinner"></span>
      <div class="loading-text">Lettura badge in corso…</div>
    </div>
  </div>

  <script>
  'use strict';

  // ── Config ────────────────────────────────────────────────────────────────────
  const API = '';

  // Estrai badge code dall'URL: /timbratura/{badge_code}
  function getBadgeCode() {
    const parts = window.location.pathname.split('/').filter(Boolean);
    const idx   = parts.indexOf('timbratura');
    return idx !== -1 ? (parts[idx + 1] || '') : '';
  }

  const BADGE_CODE = getBadgeCode();

  // ── State ─────────────────────────────────────────────────────────────────────
  let workerData   = null;   // risposta punch-context
  let selectedSite = null;   // {site_id, site_name, address, next_action, …}
  let gpsCoords    = null;   // {latitude, longitude, accuracy} — migliore lettura finora
  let gpsStatus    = 'wait'; // 'wait' | 'ok' | 'warn' | 'error'
  let gpsText      = 'In attesa del GPS…';
  let gpsWatcher   = null;
  let maxAccuracyM = 500;
  let punching     = false;
  let gpsAttempts  = 0;      // contatore letture GPS ricevute

  const wrap = document.getElementById('wrap');

  // ── Helpers ───────────────────────────────────────────────────────────────────
  function esc(s) {
    if (s == null) return '';
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function fmtTime(iso) {
    try {
      return new Date(iso).toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
    } catch { return ''; }
  }

  async function apiFetch(method, path, body) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const r = await fetch(API + path, opts);
    const json = await r.json().catch(() => ({}));
    return { status: r.status, body: json };
  }

  // ── GPS ───────────────────────────────────────────────────────────────────────
  // Usa watchPosition (non getCurrentPosition) per ricevere letture continue.
  // Su iOS/Android la prima lettura è spesso da antenna cellulare (>500m).
  // Le letture successive migliorano progressivamente man mano che il chip GPS si aggancia.
  // Teniamo sempre la lettura con la precisione migliore ricevuta finora.

  function startGps() {
    if (!navigator.geolocation) {
      gpsStatus = 'error';
      gpsText   = 'GPS non disponibile su questo dispositivo';
      updateGpsRow();
      return;
    }

    gpsWatcher = navigator.geolocation.watchPosition(
      pos => {
        gpsAttempts++;
        const acc = pos.coords.accuracy;
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;

        // Teniamo solo la lettura migliore (accuracy più bassa = più precisa)
        if (!gpsCoords || acc < gpsCoords.accuracy) {
          gpsCoords = { latitude: lat, longitude: lon, accuracy: acc };
        }

        if (acc <= maxAccuracyM) {
          gpsStatus = 'ok';
          gpsText   = `Posizione rilevata (±${Math.round(acc)}m)`;
        } else if (gpsAttempts <= 2) {
          // Prime letture: di solito da cella, aspettiamo miglioramento
          gpsStatus = 'wait';
          gpsText   = `GPS in acquisizione… (±${Math.round(acc)}m)`;
        } else {
          gpsStatus = 'warn';
          gpsText   = `Segnale GPS debole (±${Math.round(acc)}m) — spostati all'aperto`;
        }

        updateGpsRow();
        if (!punching) updatePunchButton();
      },
      err => {
        if (err.code === 1) {
          // PERMISSION_DENIED — definitivo, smetti di provare
          gpsStatus = 'error';
          gpsText   = 'Posizione non disponibile. Attiva la geolocalizzazione nelle impostazioni.';
          gpsCoords = null;
          stopGps();
        } else {
          // POSITION_UNAVAILABLE o TIMEOUT — temporaneo, continua a watchare
          if (!gpsCoords) {
            gpsStatus = 'warn';
            gpsText   = 'GPS lento — spostati all\'aperto oppure premi il pulsante per riprovare';
          }
        }
        updateGpsRow();
        if (!punching) updatePunchButton();
      },
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 5000 }
    );
  }

  function stopGps() {
    if (gpsWatcher !== null) {
      navigator.geolocation.clearWatch(gpsWatcher);
      gpsWatcher = null;
    }
  }

  // Aspetta fino a timeoutMs per una lettura GPS con accuracy <= targetAccuracyM.
  // Risolve con {latitude, longitude, accuracy} oppure null se timeout/non disponibile.
  // Il watcher viene pulito al termine — non interferisce con startGps() successivo.
  function waitForGps(timeoutMs, targetAccuracyM) {
    return new Promise(resolve => {
      if (!navigator.geolocation) { resolve(null); return; }

      let watchId = null;
      let best    = null;

      const done = () => {
        if (watchId !== null) {
          navigator.geolocation.clearWatch(watchId);
          watchId = null;
        }
        resolve(best);
      };

      const timer = setTimeout(done, timeoutMs);

      watchId = navigator.geolocation.watchPosition(
        pos => {
          const acc = pos.coords.accuracy;
          if (!best || acc < best.accuracy) {
            best = { latitude: pos.coords.latitude, longitude: pos.coords.longitude, accuracy: acc };
          }
          if (acc <= targetAccuracyM) {
            clearTimeout(timer);
            done();
          }
        },
        () => { /* errori temporanei: il timeout risolverà */ },
        { enableHighAccuracy: true, timeout: timeoutMs, maximumAge: 30000 }
      );
    });
  }

  function updateGpsRow() {
    const el = document.getElementById('gps-row');
    if (!el) return;
    el.innerHTML = `
      <span class="gps-dot ${gpsStatus}"></span>
      <span class="gps-text ${gpsStatus}">${esc(gpsText)}</span>`;
  }

  function updatePunchButton() {
    const btn = document.getElementById('punch-btn');
    if (!btn || punching) return;

    if (!gpsCoords) {
      // GPS non ancora disponibile — bottone disabilitato con spiegazione
      btn.disabled = true;
      const lbl = document.getElementById('btn-label');
      if (lbl) lbl.textContent = 'In attesa del GPS…';
    } else {
      // GPS disponibile — bottone attivo con label corretta
      btn.disabled = false;
      const s = selectedSite;
      if (s) {
        const lbl = document.getElementById('btn-label');
        const ico = document.getElementById('btn-icon');
        if (lbl) lbl.textContent = s.next_action === 'EXIT' ? 'REGISTRA USCITA' : 'REGISTRA ENTRATA';
        if (ico) ico.textContent = s.next_action === 'EXIT' ? '⏹' : '▶';
      }
    }
  }

  // ── Render: errore ─────────────────────────────────────────────────────────────
  const ERROR_COPY = {
    BADGE_NOT_FOUND:              { icon: '🚫', title: 'Badge non valido',        sub: 'Avvisa il responsabile.' },
    BADGE_REVOKED:                { icon: '🔒', title: 'Badge disattivato',       sub: 'Avvisa il responsabile.' },
    INVALID_BADGE_CODE:           { icon: '🚫', title: 'Codice non valido',       sub: 'Il QR potrebbe essere danneggiato. Avvisa il responsabile.' },
    WORKER_NOT_AUTHORIZED_ON_SITE:{ icon: '⛔', title: 'Non autorizzato',         sub: 'Non risulti assegnato a questo cantiere. Avvisa il responsabile.' },
    COMPANY_MISMATCH:             { icon: '⛔', title: 'Cantiere non valido',     sub: 'Avvisa il responsabile.' },
    NO_SITES:                     { icon: '📍', title: 'Nessun cantiere trovato', sub: 'Non risulti assegnato a nessun cantiere attivo. Avvisa il responsabile.' },
    GPS_REQUIRED:                 { icon: '📡', title: 'Posizione richiesta',     sub: 'Attiva la geolocalizzazione per registrare la presenza.' },
    OUTSIDE_GEOFENCE:             { icon: '📍', title: 'Sei troppo lontano',      sub: 'Non risulti vicino al cantiere selezionato. Se sei sul posto, avvisa il responsabile.' },
    PUNCH_TOO_SOON:               { icon: '⏳', title: 'Timbratura già registrata', sub: 'Hai già timbrato di recente. Riprova tra qualche minuto.' },
    SERVER_ERROR:                 { icon: '⚠️', title: 'Errore temporaneo',       sub: 'Riprova tra qualche minuto. Se il problema persiste, avvisa il responsabile.' },
    NETWORK_ERROR:                { icon: '📶', title: 'Nessuna connessione',      sub: 'Controlla la connessione a internet e riprova.' },
  };

  function renderError(code, extraSub) {
    const cfg = ERROR_COPY[code] || ERROR_COPY.SERVER_ERROR;
    const sub = extraSub ? `${cfg.sub}<br>${extraSub}` : cfg.sub;
    wrap.innerHTML = `
      <div class="card error-wrap fade-in">
        <span class="error-icon">${cfg.icon}</span>
        <div class="error-title">${cfg.title}</div>
        <div class="error-sub">${sub}</div>
      </div>
      <div class="hint-help">Se hai problemi, avvisa il responsabile.</div>`;
  }

  // ── Render: selezione cantiere ─────────────────────────────────────────────────
  function renderSiteSelection() {
    const sites = workerData.sites;

    const siteButtons = sites.map(s => {
      const nextLabel = s.next_action === 'EXIT' ? 'Sei in cantiere' : 'Sei fuori cantiere';
      const distStr   = s.distance_m != null ? ` · ${s.distance_m}m` : '';
      return `
        <button class="site-btn" onclick="selectSite('${esc(s.site_id)}')">
          <span class="site-btn-name">${esc(s.site_name)}</span>
          ${s.address ? `<span class="site-btn-addr">${esc(s.address)}</span>` : ''}
          <span class="site-btn-dist">${esc(nextLabel)}${esc(distStr)}</span>
        </button>`;
    }).join('');

    wrap.innerHTML = `
      <div class="card worker-card fade-in">
        ${workerData.photo_url
          ? `<img src="${esc(workerData.photo_url)}" class="avatar-photo" alt="">`
          : `<div class="avatar">${esc(workerData.worker_initial)}</div>`}
        <div class="worker-info">
          <div class="worker-name">${esc(workerData.worker_name)}</div>
          <div class="worker-sub">Scegli il cantiere</div>
        </div>
      </div>

      <div class="card fade-in" style="padding:20px;">
        <div class="site-select-label">Dove stai lavorando?</div>
        <div class="site-select-sub">Seleziona il cantiere per timbrare la presenza.</div>
        ${siteButtons}
      </div>

      <div class="hint-help">Se hai problemi, avvisa il responsabile.</div>`;
  }

  // ── Render: schermata punch ────────────────────────────────────────────────────
  function renderPunchScreen() {
    const s           = selectedSite;
    const isExit      = s.next_action === 'EXIT';
    const btnClass    = isExit ? 'exit' : 'entry';
    const btnIcon     = isExit ? '⏹' : '▶';
    const btnLabel    = isExit ? 'REGISTRA USCITA' : 'REGISTRA ENTRATA';
    const statusLabel = isExit ? 'In cantiere' : 'Fuori cantiere';

    wrap.innerHTML = `
      <div class="card worker-card fade-in">
        ${workerData.photo_url
          ? `<img src="${esc(workerData.photo_url)}" class="avatar-photo" alt="">`
          : `<div class="avatar">${esc(workerData.worker_initial)}</div>`}
        <div class="worker-info">
          <div class="worker-name">${esc(workerData.worker_name)}</div>
          <div class="worker-sub" id="status-sub">${esc(statusLabel)}</div>
        </div>
      </div>

      <div class="card site-card fade-in">
        <div class="site-label">Cantiere</div>
        <div class="site-name">${esc(s.site_name)}</div>
        ${s.address ? `<div class="site-address">${esc(s.address)}</div>` : ''}
      </div>

      <!-- result-card: usato per messaggi GPS retry e successo inline -->
      <div id="result-card" class="hidden"></div>

      <div class="fade-in" style="display:flex;flex-direction:column;gap:8px;">
        <button class="punch-btn ${btnClass}" id="punch-btn" disabled onclick="doPunch()">
          <span class="punch-icon" id="btn-icon">⏳</span>
          <span id="btn-label">In attesa del GPS…</span>
        </button>

        <div class="gps-row" id="gps-row">
          <span class="gps-dot wait"></span>
          <span class="gps-text">In attesa del GPS…</span>
        </div>
      </div>

      <div class="hint-text fade-in">
        Premi il pulsante quando entri o esci dal cantiere.
      </div>
      <div class="hint-help">Se hai problemi, avvisa il responsabile.</div>`;

    // Avvia GPS — i callback aggiorneranno bottone e riga GPS via updatePunchButton/updateGpsRow
    startGps();
  }

  // ── Render: successo ───────────────────────────────────────────────────────────
  function renderSuccess(eventType, tsServer, siteName) {
    stopGps();
    const isEntry   = eventType === 'ENTRY';
    const icon      = isEntry ? '✅' : '⏹️';
    const titleText = isEntry ? 'Entrata registrata' : 'Uscita registrata';
    const color     = isEntry ? '#22c55e' : '#ef4444';

    wrap.innerHTML = `
      <div class="card success-wrap fade-in">
        <span class="success-icon">${icon}</span>
        <div class="success-title" style="color:${color};">${esc(titleText)}</div>
        <div class="success-sub">
          ${esc(siteName)}<br>
          ${fmtTime(tsServer)}
        </div>
        <div class="success-close">Presenza registrata. Puoi chiudere questa pagina.</div>
      </div>`;
  }

  // ── GPS scarso: mostra avviso con retry ma non blocca definitivamente ─────────
  function showGpsRetry() {
    const resultCard = document.getElementById('result-card');
    if (!resultCard) return;

    resultCard.className = '';
    resultCard.style.cssText = 'background:#fffbeb;border:1.5px solid #d97706;border-radius:16px;padding:20px;text-align:center;margin-bottom:12px;';
    resultCard.innerHTML = `
      <div style="font-size:28px;margin-bottom:10px;">📡</div>
      <div style="font-size:17px;font-weight:700;color:#d97706;margin-bottom:6px;">GPS non abbastanza preciso</div>
      <div style="font-size:14px;color:#6b7280;margin-bottom:16px;line-height:1.5;">
        Spostati all'aperto, aspetta qualche secondo e riprova.
      </div>
      <button onclick="retryAfterGps()" style="width:100%;padding:14px;background:#000;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;">
        Riprova
      </button>`;
    resultCard.classList.remove('hidden');
  }

  function retryAfterGps() {
    const resultCard = document.getElementById('result-card');
    if (resultCard) {
      resultCard.classList.add('hidden');
      resultCard.style.cssText = '';
    }
    // Ripristina bottone
    const btn = document.getElementById('punch-btn');
    if (btn) {
      btn.disabled = !gpsCoords;
      const lbl = document.getElementById('btn-label');
      if (lbl && selectedSite) {
        lbl.textContent = selectedSite.next_action === 'EXIT' ? 'REGISTRA USCITA' : 'REGISTRA ENTRATA';
      }
      const ico = document.getElementById('btn-icon');
      if (ico && selectedSite) {
        ico.textContent = selectedSite.next_action === 'EXIT' ? '⏹' : '▶';
      }
    }
  }

  // ── Selezione cantiere da lista ────────────────────────────────────────────────
  function selectSite(siteId) {
    const site = workerData.sites.find(s => s.site_id === siteId);
    if (!site) return;
    selectedSite = site;
    renderPunchScreen();
  }

  // ── Punch ─────────────────────────────────────────────────────────────────────
  async function doPunch() {
    if (punching) return;
    if (!gpsCoords) {
      // GPS non disponibile — mostra il messaggio nella riga GPS, non un alert
      gpsStatus = 'error';
      gpsText   = 'Posizione non disponibile. Attiva la geolocalizzazione.';
      updateGpsRow();
      return;
    }

    punching = true;
    const btn   = document.getElementById('punch-btn');
    const label = document.getElementById('btn-label');
    const icon  = document.getElementById('btn-icon');

    if (btn)   { btn.disabled = true; }
    if (icon)  { icon.innerHTML = '<span class="btn-spinner"></span>'; }
    if (label) { label.textContent = 'Registrazione…'; }

    try {
      const { status, body } = await apiFetch('POST', `/api/v1/badge/${BADGE_CODE}/punch`, {
        site_id:        selectedSite.site_id,
        latitude:       gpsCoords.latitude,
        longitude:      gpsCoords.longitude,
        gps_accuracy_m: gpsCoords.accuracy,
      });

      if (status === 200) {
        renderSuccess(body.event_type, body.timestamp_server, body.site_name || selectedSite.site_name);
        return;
      }

      // Errori gestiti
      if (status === 429 && body.error === 'PUNCH_TOO_SOON') {
        const mins = body.retry_after_secs ? Math.ceil(body.retry_after_secs / 60) : 1;
        renderError('PUNCH_TOO_SOON',
          mins > 0 ? `Riprova tra ${mins} minut${mins === 1 ? 'o' : 'i'}.` : null);
        return;
      }
      if (status === 403 && body.error === 'OUTSIDE_GEOFENCE') {
        renderError('OUTSIDE_GEOFENCE');
        return;
      }
      if (status === 422 && body.error === 'GPS_ACCURACY_TOO_LOW') {
        // Non è un errore permanente — mostra retry, non dead-end
        showGpsRetry();
        return;
      }
      if (status === 422 && body.error === 'GPS_REQUIRED') {
        renderError('GPS_REQUIRED');
        return;
      }
      if (status === 403 && body.error === 'BADGE_REVOKED') {
        renderError('BADGE_REVOKED');
        return;
      }
      if (status === 404 && body.error === 'BADGE_NOT_FOUND') {
        renderError('BADGE_NOT_FOUND');
        return;
      }
      if (status === 403 && body.error === 'WORKER_NOT_AUTHORIZED_ON_SITE') {
        renderError('WORKER_NOT_AUTHORIZED_ON_SITE');
        return;
      }

      renderError('SERVER_ERROR');

    } catch (e) {
      renderError('NETWORK_ERROR');
    } finally {
      punching = false;
      // Ripristina icona se non siamo andati a successo/errore permanente
      const ico2 = document.getElementById('btn-icon');
      if (ico2 && ico2.querySelector('.btn-spinner')) {
        ico2.textContent = selectedSite?.next_action === 'EXIT' ? '⏹' : '▶';
      }
      // Ripristina label e stato bottone
      updatePunchButton();
    }
  }

  // ── Main ─────────────────────────────────────────────────────────────────────
  async function main() {
    if (!BADGE_CODE || !/^[A-Fa-f0-9]{18}$/i.test(BADGE_CODE)) {
      renderError('INVALID_BADGE_CODE');
      return;
    }

    // Aspetta fino a 3s per un fix GPS (accuracy ≤ 200m) prima di interrogare il backend.
    // Così il backend può calcolare le distanze e fare auto-select corretto anche per
    // lavoratori assegnati a più cantieri. Su Android il GPS cached risolve in <100ms.
    const initialGps = await waitForGps(3000, 200);
    if (initialGps) {
      gpsCoords = initialGps;
    }

    // Fetch punch-context, con GPS se disponibile
    let contextUrl = `/api/v1/badge/${BADGE_CODE}/punch-context`;
    if (gpsCoords) {
      contextUrl += `?lat=${gpsCoords.latitude}&lon=${gpsCoords.longitude}`;
    }

    let res;
    try {
      res = await apiFetch('GET', contextUrl);
    } catch (e) {
      renderError('NETWORK_ERROR');
      return;
    }

    const { status, body } = res;

    if (status === 404) { renderError('BADGE_NOT_FOUND');  return; }
    if (status === 403) { renderError('BADGE_REVOKED');    return; }
    if (status === 400) { renderError('INVALID_BADGE_CODE'); return; }
    if (status !== 200) { renderError('SERVER_ERROR');     return; }

    workerData    = body;
    maxAccuracyM  = body.max_gps_accuracy_m || 500;

    if (!body.sites || body.sites.length === 0) {
      renderError('NO_SITES');
      return;
    }

    // Auto-select cantiere
    if (body.auto_selected_site_id) {
      selectedSite = body.sites.find(s => s.site_id === body.auto_selected_site_id);
      if (selectedSite) {
        renderPunchScreen();
        return;
      }
    }

    // Nessun auto-select → mostra selezione
    renderSiteSelection();
  }

  // ── PWA ──────────────────────────────────────────────────────────────────────

  // Persistenza badge code in localStorage.
  // Se l'app viene aperta dall'icona home (standalone) senza code nell'URL,
  // redirect al codice salvato così non serve riscansionare il QR.
  (function () {
    var parts = window.location.pathname.split('/').filter(Boolean);
    var idx   = parts.indexOf('timbratura');
    var code  = idx !== -1 ? (parts[idx + 1] || '') : '';
    if (code && /^[A-Fa-f0-9]{18}$/i.test(code)) {
      try { localStorage.setItem('palladia_badge_code', code); } catch (e) {}
    } else {
      var standalone = window.matchMedia('(display-mode: standalone)').matches ||
                       window.navigator.standalone === true;
      if (standalone) {
        var saved = null;
        try { saved = localStorage.getItem('palladia_badge_code'); } catch (e) {}
        if (saved && /^[A-Fa-f0-9]{18}$/i.test(saved)) {
          window.location.replace('/timbratura/' + saved);
        }
      }
    }
  })();

  // Service Worker — richiesto per installabilità PWA
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js', { scope: '/timbratura/' })
      .catch(function (e) { console.warn('[PWA] SW:', e.message); });
  }

  // ── Guida salvataggio Home ────────────────────────────────────────────────────
  var _pwaPrompt = null; // beforeinstallprompt Android Chrome

  window.addEventListener('beforeinstallprompt', function (e) {
    e.preventDefault();
    _pwaPrompt = e;
    // Aggiorna il bottone se la guida è già aperta
    var btn = document.getElementById('pwa-btn-primary');
    if (btn) { btn.textContent = '📲 Installa ora'; }
  });

  window.addEventListener('appinstalled', function () {
    pwaGuideHide();
  });

  function pwaDetect() {
    var ua = navigator.userAgent;
    var isIos     = /iphone|ipad|ipod/i.test(ua);
    var isSamsung = /samsungbrowser/i.test(ua);
    var isFirefox = /firefox/i.test(ua) && !isIos;
    var isOpera   = /opr\//i.test(ua);
    if (isIos)     return 'ios';
    if (isSamsung) return 'samsung';
    if (isFirefox) return 'firefox';
    if (isOpera)   return 'opera';
    return 'chrome'; // Chrome, Edge, WebView, default
  }

  var PWA_STEPS = {
    ios: [
      { n: '1', icon: '⬆️', text: 'Tocca il pulsante <strong>Condividi</strong> — l\'icona con la freccia verso l\'alto, nella barra in basso di Safari' },
      { n: '2', icon: '➕', text: 'Scorri l\'elenco verso il basso e tocca <strong>"Aggiungi a schermata Home"</strong>' },
      { n: '3', icon: '✅', text: 'Tocca <strong>Aggiungi</strong> in alto a destra — l\'icona di Timbratura apparirà sul tuo telefono' },
    ],
    samsung: [
      { n: '1', icon: '☰', text: 'Tocca le <strong>tre linee</strong> in basso a destra (menu del browser)' },
      { n: '2', icon: '➕', text: 'Tocca <strong>"Aggiungi pagina a"</strong> e poi <strong>"Schermata Home"</strong>' },
      { n: '3', icon: '✅', text: 'Tocca <strong>Aggiungi</strong> — l\'icona apparirà sul tuo telefono' },
    ],
    firefox: [
      { n: '1', icon: '⋮', text: 'Tocca i <strong>tre puntini</strong> in basso a destra (menu del browser)' },
      { n: '2', icon: '📲', text: 'Tocca <strong>"Installa"</strong> — comparirà un\'anteprima dell\'app' },
      { n: '3', icon: '✅', text: 'Tocca <strong>Aggiungi</strong> per confermare' },
    ],
    opera: [
      { n: '1', icon: '⋮', text: 'Tocca i <strong>tre puntini</strong> in basso (menu)' },
      { n: '2', icon: '🏠', text: 'Tocca <strong>"Aggiungi a schermata Home"</strong>' },
      { n: '3', icon: '✅', text: 'Tocca <strong>Aggiungi</strong> per confermare' },
    ],
    chrome: [
      { n: '1', icon: '⋮', text: 'Tocca i <strong>tre puntini</strong> in alto a destra (menu del browser)' },
      { n: '2', icon: '🏠', text: 'Tocca <strong>"Aggiungi a schermata Home"</strong>' },
      { n: '3', icon: '✅', text: 'Tocca <strong>Aggiungi</strong> per confermare — l\'icona apparirà sul tuo telefono' },
    ],
  };

  var PWA_NOTES = {
    ios:     '📌 Su iPhone e iPad questo passaggio si fa solo da <strong>Safari</strong>. Se stai usando un altro browser, aprilo in Safari per poter salvare l\'app.',
    samsung: null,
    firefox: null,
    opera:   null,
    chrome:  null,
  };

  function pwaGuideBuild() {
    var browser  = pwaDetect();
    var steps    = PWA_STEPS[browser] || PWA_STEPS.chrome;
    var note     = PWA_NOTES[browser];
    var headline = document.getElementById('pwa-headline');
    var stepsEl  = document.getElementById('pwa-steps');
    var noteEl   = document.getElementById('pwa-note');
    var btnEl    = document.getElementById('pwa-btn-primary');

    if (headline) headline.textContent = 'Salva sulla schermata Home';

    if (stepsEl) {
      stepsEl.innerHTML = steps.map(function (s) {
        return '<div class="pwa-step">' +
          '<div class="pwa-step-num">' + s.n + '</div>' +
          '<div class="pwa-step-icon">' + s.icon + '</div>' +
          '<div class="pwa-step-text">' + s.text + '</div>' +
          '</div>';
      }).join('');
    }

    if (noteEl) {
      if (note) { noteEl.innerHTML = note; noteEl.style.display = ''; }
      else       { noteEl.style.display = 'none'; }
    }

    // Se il prompt nativo è già disponibile (Android Chrome) cambia il bottone
    if (btnEl && _pwaPrompt) {
      btnEl.textContent = '📲 Installa ora';
    }
  }

  function pwaGuideShow() {
    var guide = document.getElementById('pwa-guide');
    if (!guide) return;
    pwaGuideBuild();
    guide.classList.remove('hidden');
    // Blocca scroll del body mentre la guida è aperta
    document.body.style.overflow = 'hidden';
  }

  function pwaGuideHide() {
    var guide = document.getElementById('pwa-guide');
    if (guide) guide.classList.add('hidden');
    document.body.style.overflow = '';
  }

  function pwaGuideAction() {
    // Android Chrome con prompt nativo: avvia installazione diretta
    if (_pwaPrompt) {
      _pwaPrompt.prompt();
      _pwaPrompt.userChoice.then(function () {
        _pwaPrompt = null;
        pwaGuideHide();
      });
      return;
    }
    // Tutti gli altri: l'utente ha letto le istruzioni, chiude la guida
    pwaGuideHide();
    try { localStorage.setItem('palladia_pwa_guide_done', '1'); } catch (e) {}
  }

  function pwaGuideSkip() {
    pwaGuideHide();
    // "adesso no" → non salvare il flag, così ricompare alla prossima apertura
  }

  // Mostra la guida se: non in standalone, non già completata
  (function () {
    var standalone = window.matchMedia('(display-mode: standalone)').matches ||
                     window.navigator.standalone === true;
    if (standalone) return; // già installata — non serve la guida

    var done = false;
    try { done = !!localStorage.getItem('palladia_pwa_guide_done'); } catch (e) {}
    if (done) return;

    // Breve delay: prima mostra la schermata di timbratura, poi la guida
    setTimeout(pwaGuideShow, 800);
  })();

  main();
  </script>
</body>
</html>
