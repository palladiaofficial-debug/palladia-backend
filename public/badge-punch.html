<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#f5f3ee">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Timbratura">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/manifest.json" id="pwa-manifest">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <title>Timbratura — Palladia</title>
  <script>
  (function () {
    var parts = location.pathname.split('/').filter(Boolean);
    var idx   = parts.indexOf('timbratura');
    var code  = idx !== -1 ? (parts[idx + 1] || '') : '';
    if (code && /^[A-Fa-f0-9]{18}$/i.test(code)) {
      document.getElementById('pwa-manifest').href = '/timbratura/' + code + '/manifest.json';
    }
  })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f5f3ee;
      --surface:  #ffffff;
      --border:   #e4e7ec;
      --text:     #1a1a1a;
      --muted:    #6b7280;
      --subtle:   #9ca3af;
      --green:    #16a34a;
      --green-dk: #15803d;
      --red:      #dc2626;
      --red-dk:   #b91c1c;
      --amber:    #d97706;
      --accent:   #2563eb;
      --radius:   12px;
    }

    html, body {
      min-height: 100%;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 17px;
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px calc(48px + env(safe-area-inset-bottom, 0px));
      min-height: 100dvh;
    }

    /* ── Brand header ── */
    .topbar {
      width: 100%;
      max-width: 480px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: calc(20px + env(safe-area-inset-top, 0px)) 0 8px;
    }
    .brand {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Selettore lingua ── */
    .lang-switch {
      position: absolute;
      right: 0;
      top: calc(16px + env(safe-area-inset-top, 0px));
      display: flex;
      gap: 2px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 3px;
    }
    .lang-btn {
      min-width: 26px;
      height: 26px;
      padding: 0 6px;
      border: none;
      border-radius: 999px;
      background: none;
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
    }
    .lang-btn.active { background: var(--text); color: #fff; }

    /* ── Container ── */
    .wrap {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 12px;
    }

    /* ── Card generica ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    /* ── Lavoratore badge ── */
    .worker-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;
    }
    .avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .avatar-photo {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }
    .worker-info { flex: 1; min-width: 0; }
    .worker-name {
      font-size: 19px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .worker-sub { font-size: 13px; color: var(--muted); margin-top: 3px; }

    /* ── Cantiere info ── */
    .site-card {
      padding: 16px 20px;
    }
    .site-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .site-name {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 2px;
    }
    .site-address { font-size: 13px; color: var(--muted); }

    /* ── Bottone punch — IL BOTTONE ── */
    .punch-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      min-height: 80px;
      border: none;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: opacity 0.12s, transform 0.1s;
      -webkit-appearance: none;
      text-transform: uppercase;
    }
    .punch-btn:active  { transform: scale(0.97); opacity: 0.9; }
    .punch-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .punch-btn.entry {
      background: var(--green);
      color: #fff;
    }
    .punch-btn.exit {
      background: var(--red);
      color: #fff;
    }
    .punch-icon { font-size: 28px; line-height: 1; }

    /* ── GPS status ── */
    .gps-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 4px 0;
      min-height: 28px;
    }
    .gps-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .gps-dot.ok    { background: var(--green); }
    .gps-dot.warn  { background: var(--amber); animation: blink 1.2s infinite; }
    .gps-dot.error { background: var(--red); }
    .gps-dot.wait  { background: var(--muted); }
    .gps-text {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
    }
    .gps-text.ok    { color: var(--green); }
    .gps-text.warn  { color: var(--amber); }
    .gps-text.error { color: var(--red); }

    @keyframes blink { 50% { opacity: 0.3; } }

    /* ── Hint ── */
    .hint-text {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }
    .hint-help {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── Schermata selezione cantiere ── */
    .site-select-label {
      font-size: 15px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 4px;
    }
    .site-select-sub {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 16px;
    }
    .site-btn {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
      width: 100%;
      padding: 18px 20px;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      text-align: left;
      margin-bottom: 8px;
    }
    .site-btn:hover  { border-color: var(--accent); background: rgba(37,99,235,.06); }
    .site-btn:active { transform: scale(0.98); }
    .site-btn-name { font-size: 17px; font-weight: 700; color: var(--text); }
    .site-btn-addr { font-size: 13px; color: var(--muted); }
    .site-btn-dist { font-size: 12px; color: var(--green); font-weight: 600; margin-top: 2px; }

    /* ── Stato successo ── */
    .success-wrap {
      text-align: center;
      padding: 32px 20px 24px;
    }
    .success-icon { font-size: 56px; line-height: 1; margin-bottom: 16px; display: block; }
    .success-title { font-size: 26px; font-weight: 800; margin-bottom: 6px; }
    .success-sub   { font-size: 15px; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }
    .success-close { font-size: 13px; color: var(--muted); }

    /* ── Errore ── */
    .error-wrap {
      text-align: center;
      padding: 36px 20px 28px;
    }
    .error-icon  { font-size: 40px; display: block; margin-bottom: 14px; }
    .error-title { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
    .error-sub   { font-size: 15px; color: var(--muted); line-height: 1.6; }
    .error-retry {
      display: block; width: 100%; margin-top: 24px;
      padding: 16px; font-size: 16px; font-weight: 800; font-family: inherit;
      color: #fff; background: var(--text); border: none; border-radius: 12px;
      cursor: pointer;
    }

    /* ── Loading ── */
    .spinner {
      display: block;
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-wrap {
      text-align: center;
      padding: 56px 20px;
    }
    .loading-text { font-size: 14px; color: var(--muted); margin-top: 16px; }

    /* ── Spinner nel bottone ── */
    .btn-spinner {
      display: inline-block;
      width: 22px;
      height: 22px;
      border: 2px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .65s linear infinite;
    }

    .hidden { display: none !important; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeUp 0.3s ease-out both; }

    /* ── Guida permessi GPS ── */
    #gps-guide {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 400;
      padding: 0;
    }
    #gps-guide.hidden { display: none !important; }
    .gps-sheet {
      background: #ffffff;
      border-radius: 24px 24px 0 0;
      padding: 20px 20px calc(20px + env(safe-area-inset-bottom, 0));
      width: 100%;
      max-width: 520px;
      max-height: 85dvh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      animation: slideUp .28s ease-out both;
    }
    .gps-guide-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 64px; height: 64px;
      border-radius: 50%;
      background: #fef2f2;
      margin: 0 auto 18px;
    }
    .gps-guide-icon svg { width: 32px; height: 32px; color: #dc2626; }
    .gps-guide-title {
      font-size: 20px; font-weight: 800; color: #111827;
      text-align: center; margin-bottom: 6px; line-height: 1.25;
    }
    .gps-guide-sub {
      font-size: 14px; color: #6b7280; text-align: center;
      margin-bottom: 24px; line-height: 1.5;
    }
    .gps-steps { display: flex; flex-direction: column; gap: 14px; margin-bottom: 24px; }
    .gps-step {
      display: flex; align-items: flex-start; gap: 12px;
    }
    .gps-step-num {
      width: 28px; height: 28px; background: var(--red);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800; color: #fff; flex-shrink: 0; margin-top: 1px;
    }
    .gps-step-text {
      flex: 1; font-size: 15px; color: #374151; line-height: 1.5;
    }
    .gps-step-text strong { color: #111827; }
    .gps-guide-note {
      background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 12px;
      padding: 12px 14px; font-size: 13px; color: #1e40af; line-height: 1.5;
      margin-bottom: 20px; text-align: center;
    }
    .gps-btn-retry {
      display: block; width: 100%; padding: 16px;
      background: var(--red); color: #fff; border: none; border-radius: 14px;
      font-family: inherit; font-size: 16px; font-weight: 800; cursor: pointer;
      margin-bottom: 10px;
    }
    .gps-btn-retry:active { opacity: 0.85; transform: scale(0.98); }

    /* ── Guida salvataggio Home ── */
    #pwa-guide {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 300;
      padding: 0;
    }
    #pwa-guide.hidden { display: none !important; }

    .pwa-sheet {
      background: #ffffff;
      border-top: 1px solid #e4e7ec;
      border-radius: 24px 24px 0 0;
      padding: 20px 20px calc(20px + env(safe-area-inset-bottom, 0));
      width: 100%;
      max-width: 520px;
      max-height: 85dvh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      animation: slideUp .28s ease-out both;
    }
    @keyframes slideUp {
      from { transform: translateY(60px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .pwa-handle {
      width: 40px; height: 4px;
      background: #d1d5db;
      border-radius: 2px;
      margin: 0 auto 22px;
    }
    .pwa-headline {
      font-size: 20px;
      font-weight: 800;
      color: #111827;
      text-align: center;
      margin-bottom: 6px;
      line-height: 1.25;
    }
    .pwa-sub {
      font-size: 14px;
      color: #6b7280;
      text-align: center;
      margin-bottom: 26px;
      line-height: 1.5;
    }
    .pwa-steps { display: flex; flex-direction: column; gap: 16px; margin-bottom: 28px; }
    .pwa-step {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .pwa-step-num {
      width: 30px; height: 30px;
      background: #000000;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 800; color: #fff;
      flex-shrink: 0; margin-top: 1px;
    }
    .pwa-step-text {
      flex: 1;
      font-size: 15px;
      color: #374151;
      line-height: 1.5;
    }
    .pwa-step-text strong { color: #111827; }
    .pwa-step-icon { font-size: 19px; flex-shrink: 0; margin-top: 2px; }

    .pwa-note {
      background: #fefce8;
      border: 1px solid #fde68a;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 13px;
      color: #78350f;
      line-height: 1.5;
      margin-bottom: 22px;
    }

    .pwa-btn-primary {
      display: block;
      width: 100%;
      padding: 16px;
      background: #000000;
      color: #fff;
      border: none;
      border-radius: 14px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      margin-bottom: 12px;
      letter-spacing: 0.01em;
    }
    .pwa-btn-skip {
      display: block;
      width: 100%;
      padding: 14px;
      min-height: 48px;
      background: none;
      color: #9ca3af;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="brand" style="display:flex;align-items:center;gap:6px">Palladia</div>
    <div class="lang-switch" id="lang-switch"></div>
  </div>

  <!-- Guida attivazione GPS — si apre quando il permesso è negato -->
  <div id="gps-guide" class="hidden">
    <div class="gps-sheet">
      <div class="pwa-handle"></div>
      <div class="gps-guide-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      </div>
      <div class="gps-guide-title" id="gps-guide-title"></div>
      <div class="gps-guide-sub" id="gps-guide-sub"></div>
      <div class="gps-steps" id="gps-steps"></div>
      <div class="gps-guide-note" id="gps-guide-note"></div>
      <button class="gps-btn-retry" id="gps-btn-retry" onclick="location.reload()"></button>
    </div>
  </div>

  <!-- Guida salvataggio Home — si apre automaticamente, contenuto generato da JS -->
  <div id="pwa-guide" class="hidden">
    <div class="pwa-sheet">
      <div class="pwa-handle"></div>
      <div class="pwa-headline" id="pwa-headline">Salva sulla schermata Home</div>
      <div class="pwa-sub" id="pwa-sub"></div>
      <div class="pwa-steps" id="pwa-steps"><!-- riempito da JS --></div>
      <div class="pwa-note" id="pwa-note" style="display:none"></div>
      <button class="pwa-btn-primary" id="pwa-btn-primary" onclick="pwaGuideAction()"></button>
      <button class="pwa-btn-skip" id="pwa-btn-skip" onclick="pwaGuideSkip()"></button>
    </div>
  </div>

  <div class="wrap" id="wrap">
    <!-- Contenuto iniettato da JS -->
    <div class="card loading-wrap">
      <span class="spinner"></span>
      <div class="loading-text" id="initial-loading-text">Lettura badge in corso…</div>
    </div>
  </div>

  <script>
  'use strict';

  // ── i18n ──────────────────────────────────────────────────────────────────────
  // Dizionario leggero dedicato a questa sola pagina (stesso pattern di
  // src/lib/i18n/timbratura.ts nel repo frontend — vedi ARCHITECTURE.md).
  // Traduzioni curate ma non riviste da un madrelingua: da far rileggere prima
  // di un rollout oltre il pilota, specialmente le guide GPS/PWA passo-passo.
  var LANG_CODES = ['it', 'ro', 'sq', 'ar'];
  var RTL_LANGS  = ['ar'];
  var LANG_STORAGE_KEY = 'palladia_badge_lang';

  function detectDefaultLang() {
    try {
      var saved = localStorage.getItem(LANG_STORAGE_KEY);
      if (saved && LANG_CODES.indexOf(saved) !== -1) return saved;
    } catch (e) {}
    var nav = (navigator.language || '').slice(0, 2).toLowerCase();
    if (LANG_CODES.indexOf(nav) !== -1) return nav;
    return 'it';
  }

  var LANG = detectDefaultLang();

  var I18N = {
    it: {
      langNative: 'IT',
      loadingText: 'Lettura badge in corso…',
      ifProblems: 'Se hai problemi, avvisa il responsabile.',
      chooseSite: 'Scegli il cantiere',
      whereWorking: 'Dove stai lavorando?',
      selectSiteToPunch: 'Seleziona il cantiere per timbrare la presenza.',
      inCantiere: 'Sei in cantiere', outCantiere: 'Sei fuori cantiere',
      cantiereLabel: 'Cantiere',
      waitingGps: 'In attesa del GPS…',
      registraUscita: 'REGISTRA USCITA', registraEntrata: 'REGISTRA ENTRATA',
      inCantiereStatus: 'In cantiere', fuoriCantiereStatus: 'Fuori cantiere',
      pressButtonHint: 'Premi il pulsante quando entri o esci dal cantiere.',
      entrataRegistrata: 'Entrata registrata', uscitaRegistrata: 'Uscita registrata',
      canCloseAfterSuccess: 'Presenza registrata. Puoi chiudere questa pagina.',
      gpsNotPrecise: 'GPS non abbastanza preciso',
      gpsRetryHint: "Spostati all'aperto, aspetta qualche secondo e riprova.",
      retry: 'Riprova',
      registrazione: 'Registrazione…',
      gpsUnavailableDevice: 'GPS non disponibile su questo dispositivo',
      gpsPositionDetected: function (a) { return 'Posizione rilevata (±' + a + 'm)'; },
      gpsAcquiring: function (a) { return 'GPS in acquisizione… (±' + a + 'm)'; },
      gpsWeakSignal: function (a) { return "Segnale GPS debole (±" + a + "m) — spostati all'aperto"; },
      gpsPermissionDeniedFollow: 'Permesso posizione negato — segui la guida qui sotto',
      gpsSlowRetry: "GPS lento — spostati all'aperto oppure premi il pulsante per riprovare",
      gpsPositionUnavailableActivate: 'Posizione non disponibile. Attiva la geolocalizzazione.',
      offlineSavedTitle: 'Salvata offline',
      offlineSavedHint: 'La timbratura verrà inviata automaticamente<br>quando tornerà la connessione.',
      canClose: 'Puoi chiudere questa pagina.',
      offlineBadge: function (n) { return n + ' timbratur' + (n > 1 ? 'e' : 'a') + ' in attesa di connessione…'; },
      minuteRetry: function (m) { return 'Riprova tra ' + m + ' minut' + (m === 1 ? 'o' : 'i') + '.'; },
      activatePosition: 'Attiva la posizione',
      gpsGuideSub: 'Per timbrare la presenza serve il GPS attivo.<br>Segui questi passaggi:',
      haveActivatedRetry: 'Ho attivato — Riprova',
      saveToHome: 'Salva sulla schermata Home',
      saveToHomeSub: 'Così apri Timbratura ogni giorno con un tocco — senza più scansionare il QR code.',
      understoodTry: 'Ho capito — ci provo!',
      installNow: 'Installa ora',
      notNowLater: 'Adesso no, faccio dopo',
      errorCopy: {
        BADGE_NOT_FOUND:               { icon: '🚫', title: 'Badge non valido',          sub: 'Avvisa il responsabile.' },

  function t() { return I18N[LANG]; }

  function applyDir() {
    document.documentElement.dir = RTL_LANGS.indexOf(LANG) !== -1 ? 'rtl' : 'ltr';
    document.documentElement.lang = LANG;
  }

  function renderLangSwitch() {
    var el = document.getElementById('lang-switch');
    if (!el) return;
    el.innerHTML = LANG_CODES.map(function (code) {
      return '<button class="lang-btn' + (code === LANG ? ' active' : '') + '" onclick="setLang(\'' + code + '\')">' +
        esc(I18N[code].langNative) + '</button>';
    }).join('');
  }

  // Ogni render* imposta questo riferimento PRIMA di costruire il markup, così
  // setLang() può ridisegnare esattamente la schermata attiva senza dover
  // indovinare lo stato (bug reale trovato dal vivo: cambiare lingua sulla
  // schermata di errore lasciava il testo in italiano, solo il selettore si
  // aggiornava — renderError() non era mai tra i casi gestiti qui).
  var _rerenderCurrent = null;

  function setLang(code) {
    if (LANG_CODES.indexOf(code) === -1) return;
    LANG = code;
    try { localStorage.setItem(LANG_STORAGE_KEY, code); } catch (e) {}
    applyDir();
    renderLangSwitch();
    if (_rerenderCurrent) {
      _rerenderCurrent();
    } else {
      var initialLoading = document.getElementById('initial-loading-text');
      if (initialLoading) initialLoading.textContent = t().loadingText;
    }
  }

  applyDir();
  renderLangSwitch();
  document.getElementById('initial-loading-text').textContent = t().loadingText;

  // ── Config ────────────────────────────────────────────────────────────────────
  const API = '';

  // Estrai badge code dall'URL: /timbratura/{badge_code}
  function getBadgeCode() {
    const parts = window.location.pathname.split('/').filter(Boolean);
    const idx   = parts.indexOf('timbratura');
    return idx !== -1 ? (parts[idx + 1] || '') : '';
  }

  const BADGE_CODE = getBadgeCode();

  // ── State ─────────────────────────────────────────────────────────────────────
  let workerData   = null;   // risposta punch-context
  let selectedSite = null;   // {site_id, site_name, address, next_action, …}
  let gpsCoords    = null;   // {latitude, longitude, accuracy} — migliore lettura finora
  let gpsStatus    = 'wait'; // 'wait' | 'ok' | 'warn' | 'error'
  let gpsText      = '';
  let gpsWatcher   = null;
  let maxAccuracyM = 500;
  let punching     = false;
  let gpsAttempts  = 0;      // contatore letture GPS ricevute

  const wrap = document.getElementById('wrap');

  // ── Helpers ───────────────────────────────────────────────────────────────────
  function esc(s) {
    if (s == null) return '';
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function fmtTime(iso) {
    try {
      return new Date(iso).toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
    } catch { return ''; }
  }

  async function apiFetch(method, path, body) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    // Timeout esplicito: senza, un backend lento (non un vero errore di rete,
    // che invece rifiuta subito) lascia lo spinner di timbratura girare
    // all'infinito. Lasciamo che l'abort si propaghi come eccezione — i
    // chiamanti (vedi handlePunch) già trattano qualunque eccezione come
    // "offline": mettono la timbratura in coda locale e la ritentano da soli,
    // che è esattamente il comportamento giusto anche per un server lento.
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 15000);
    opts.signal = controller.signal;
    try {
      const r = await fetch(API + path, opts);
      const json = await r.json().catch(() => ({}));
      return { status: r.status, body: json };
    } finally {
      clearTimeout(timeoutId);
    }
  }

  // ── Guida permessi GPS ─────────────────────────────────────────────────────────
  function showGpsPermissionGuide() {
    var isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
    var isSamsung = /samsungbrowser/i.test(navigator.userAgent);
    var stepsEl = document.getElementById('gps-steps');
    var noteEl  = document.getElementById('gps-guide-note');
    if (!stepsEl) return;

    var variant = isIos ? 'ios' : (isSamsung ? 'samsung' : 'other');
    var steps = t().gpsGuideSteps[variant];
    var note  = t().gpsGuideNotes[variant];

    var titleEl = document.getElementById('gps-guide-title');
    var subEl   = document.getElementById('gps-guide-sub');
    var retryBtn = document.getElementById('gps-btn-retry');
    if (titleEl) titleEl.textContent = t().activatePosition;
    if (subEl) subEl.innerHTML = t().gpsGuideSub;
    if (retryBtn) retryBtn.textContent = t().haveActivatedRetry;

    stepsEl.innerHTML = steps.map(function (s) {
      return '<div class="gps-step">' +
        '<div class="gps-step-num">' + s.n + '</div>' +
        '<div class="gps-step-text">' + s.text + '</div>' +
        '</div>';
    }).join('');

    if (noteEl) noteEl.innerHTML = note;

    var guide = document.getElementById('gps-guide');
    if (guide) {
      guide.classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }
  }

  // ── GPS ───────────────────────────────────────────────────────────────────────
  // Usa watchPosition (non getCurrentPosition) per ricevere letture continue.
  // Su iOS/Android la prima lettura è spesso da antenna cellulare (>500m).
  // Le letture successive migliorano progressivamente man mano che il chip GPS si aggancia.
  // Teniamo sempre la lettura con la precisione migliore ricevuta finora.

  function startGps() {
    if (!navigator.geolocation) {
      gpsStatus = 'error';
      gpsText   = t().gpsUnavailableDevice;
      updateGpsRow();
      showGpsPermissionGuide();
      return;
    }

    gpsWatcher = navigator.geolocation.watchPosition(
      pos => {
        gpsAttempts++;
        const acc = pos.coords.accuracy;
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;

        // Teniamo solo la lettura migliore (accuracy più bassa = più precisa)
        if (!gpsCoords || acc < gpsCoords.accuracy) {
          gpsCoords = { latitude: lat, longitude: lon, accuracy: acc };
        }

        if (acc <= maxAccuracyM) {
          gpsStatus = 'ok';
          gpsText   = t().gpsPositionDetected(Math.round(acc));
        } else if (gpsAttempts <= 2) {
          // Prime letture: di solito da cella, aspettiamo miglioramento
          gpsStatus = 'wait';
          gpsText   = t().gpsAcquiring(Math.round(acc));
        } else {
          gpsStatus = 'warn';
          gpsText   = t().gpsWeakSignal(Math.round(acc));
        }

        updateGpsRow();
        if (!punching) updatePunchButton();
      },
      err => {
        if (err.code === 1) {
          // PERMISSION_DENIED — definitivo, mostra guida passo-passo
          gpsStatus = 'error';
          gpsText   = t().gpsPermissionDeniedFollow;
          gpsCoords = null;
          stopGps();
          showGpsPermissionGuide();
        } else {
          // POSITION_UNAVAILABLE o TIMEOUT — temporaneo, continua a watchare
          if (!gpsCoords) {
            gpsStatus = 'warn';
            gpsText   = t().gpsSlowRetry;
          }
        }
        updateGpsRow();
        if (!punching) updatePunchButton();
      },
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 5000 }
    );
  }

  function stopGps() {
    if (gpsWatcher !== null) {
      navigator.geolocation.clearWatch(gpsWatcher);
      gpsWatcher = null;
    }
  }

  // Aspetta fino a timeoutMs per una lettura GPS con accuracy <= targetAccuracyM.
  // Risolve con {latitude, longitude, accuracy} oppure null se timeout/non disponibile.
  // Il watcher viene pulito al termine — non interferisce con startGps() successivo.
  function waitForGps(timeoutMs, targetAccuracyM) {
    return new Promise(resolve => {
      if (!navigator.geolocation) { resolve(null); return; }

      let watchId = null;
      let best    = null;

      const done = () => {
        if (watchId !== null) {
          navigator.geolocation.clearWatch(watchId);
          watchId = null;
        }
        resolve(best);
      };

      const timer = setTimeout(done, timeoutMs);

      watchId = navigator.geolocation.watchPosition(
        pos => {
          const acc = pos.coords.accuracy;
          if (!best || acc < best.accuracy) {
            best = { latitude: pos.coords.latitude, longitude: pos.coords.longitude, accuracy: acc };
          }
          if (acc <= targetAccuracyM) {
            clearTimeout(timer);
            done();
          }
        },
        () => { /* errori temporanei: il timeout risolverà */ },
        { enableHighAccuracy: true, timeout: timeoutMs, maximumAge: 30000 }
      );
    });
  }

  function updateGpsRow() {
    const el = document.getElementById('gps-row');
    if (!el) return;
    el.innerHTML = `
      <span class="gps-dot ${gpsStatus}"></span>
      <span class="gps-text ${gpsStatus}">${esc(gpsText)}</span>`;
  }

  function updatePunchButton() {
    const btn = document.getElementById('punch-btn');
    if (!btn || punching) return;

    if (!gpsCoords) {
      // GPS non ancora disponibile — bottone disabilitato con spiegazione
      btn.disabled = true;
      const lbl = document.getElementById('btn-label');
      if (lbl) lbl.textContent = t().waitingGps;
    } else {
      // GPS disponibile — bottone attivo con label corretta
      btn.disabled = false;
      const s = selectedSite;
      if (s) {
        const lbl = document.getElementById('btn-label');
        const ico = document.getElementById('btn-icon');
        if (lbl) lbl.textContent = s.next_action === 'EXIT' ? t().registraUscita : t().registraEntrata;
        if (ico) ico.textContent = s.next_action === 'EXIT' ? '⏹' : '▶';
      }
    }
  }

  function renderError(code, extraSub) {
    _rerenderCurrent = function () { renderError(code, extraSub); };
    const cfg = t().errorCopy[code] || t().errorCopy.SERVER_ERROR;
    const sub = extraSub ? `${cfg.sub}<br>${extraSub}` : cfg.sub;
    wrap.innerHTML = `
      <div class="card error-wrap fade-in">
        <span class="error-icon">${cfg.icon}</span>
        <div class="error-title">${cfg.title}</div>
        <div class="error-sub">${sub}</div>
        <button class="error-retry" onclick="location.reload()">${esc(t().retry)}</button>
      </div>
      <div class="hint-help">${esc(t().ifProblems)}</div>`;
  }

    wrap.innerHTML = `

          ? `<img src="${esc(workerData.photo_url)}" class="avatar-photo" alt="">`
          : `<div class="avatar">${esc(workerData.worker_initial)}</div>`}
        <div class="worker-info">

        <div class="site-select-label">${esc(t().whereWorking)}</div>

        ${siteButtons}
      </div>

      <div class="hint-help">${esc(t().ifProblems)}</div>`;
  }

  // ── Render: schermata punch ────────────────────────────────────────────────────
  // isRelang=true → ridisegno per cambio lingua: NON deve far ripartire il GPS
  // (watchPosition già attivo, riavviarlo duplicherebbe il watcher).
  function renderPunchScreen(isRelang) {
    _rerenderCurrent = function () { renderPunchScreen(true); };
    const s           = selectedSite;
    const isExit      = s.next_action === 'EXIT';
    const btnClass    = isExit ? 'exit' : 'entry';
    const btnIcon     = isExit ? '⏹' : '▶';
    const btnLabel    = isExit ? t().registraUscita : t().registraEntrata;
    const statusLabel = isExit ? t().inCantiereStatus : t().fuoriCantiereStatus;

    wrap.innerHTML = `
      <div class="card worker-card fade-in">
        ${workerData.photo_url
          ? `<img src="${esc(workerData.photo_url)}" class="avatar-photo" alt="">`
          : `<div class="avatar">${esc(workerData.worker_initial)}</div>`}
        <div class="worker-info">
          <div class="worker-name">${esc(workerData.worker_name)}</div>
          <div class="worker-sub" id="status-sub">${esc(statusLabel)}</div>
        </div>
      </div>

      <div class="card site-card fade-in">
        <div class="site-label">${esc(t().cantiereLabel)}</div>
        <div class="site-name">${esc(s.site_name)}</div>
        ${s.address ? `<div class="site-address">${esc(s.address)}</div>` : ''}
      </div>

      <!-- result-card: usato per messaggi GPS retry e successo inline -->
      <div id="result-card" class="hidden"></div>

      <div class="fade-in" style="display:flex;flex-direction:column;gap:8px;">
        <button class="punch-btn ${btnClass}" id="punch-btn" disabled onclick="doPunch()">
          <span class="punch-icon" id="btn-icon">⏳</span>
          <span id="btn-label">${esc(t().waitingGps)}</span>
        </button>

        <div class="gps-row" id="gps-row">
          <span class="gps-dot wait"></span>
          <span class="gps-text">${esc(t().waitingGps)}</span>
        </div>
      </div>

      <div class="hint-text fade-in">
        ${esc(t().pressButtonHint)}
      </div>
      <div class="hint-help">${esc(t().ifProblems)}</div>`;

    if (isRelang) {
      // Il watcher GPS è già attivo — ripristina solo lo stato già noto nel nuovo markup
      updateGpsRow();
      updatePunchButton();
    } else {
      // Avvia GPS — i callback aggiorneranno bottone e riga GPS via updatePunchButton/updateGpsRow
      startGps();
    }
  }

  // ── Render: successo ───────────────────────────────────────────────────────────
  function renderSuccess(eventType, tsServer, siteName) {
    _rerenderCurrent = function () { renderSuccess(eventType, tsServer, siteName); };
    stopGps();
    const isEntry   = eventType === 'ENTRY';
    const icon      = isEntry ? '✓' : '■';
    const titleText = isEntry ? t().entrataRegistrata : t().uscitaRegistrata;
    const color     = isEntry ? '#22c55e' : '#ef4444';

    wrap.innerHTML = `
      <div class="card success-wrap fade-in">
        <span class="success-icon">${icon}</span>
        <div class="success-title" style="color:${color};">${esc(titleText)}</div>
        <div class="success-sub">
          ${esc(siteName)}<br>
          ${fmtTime(tsServer)}
        </div>
        <div class="success-close">${esc(t().canCloseAfterSuccess)}</div>
      </div>`;
  }

  // ── GPS scarso: mostra avviso con retry ma non blocca definitivamente ─────────
  function showGpsRetry() {
    const resultCard = document.getElementById('result-card');
    if (!resultCard) return;

    resultCard.className = '';
    resultCard.style.cssText = 'background:#fffbeb;border:1.5px solid #d97706;border-radius:16px;padding:20px;text-align:center;margin-bottom:12px;';
    resultCard.innerHTML = `
      <div style="font-size:28px;margin-bottom:10px;">📡</div>
      <div style="font-size:17px;font-weight:700;color:#d97706;margin-bottom:6px;">${esc(t().gpsNotPrecise)}</div>
      <div style="font-size:14px;color:#6b7280;margin-bottom:16px;line-height:1.5;">
        ${esc(t().gpsRetryHint)}
      </div>
      <button onclick="retryAfterGps()" style="width:100%;padding:14px;background:#000;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;">
        ${esc(t().retry)}
      </button>`;
    resultCard.classList.remove('hidden');
  }

  function retryAfterGps() {
    const resultCard = document.getElementById('result-card');
    if (resultCard) {
      resultCard.classList.add('hidden');
      resultCard.style.cssText = '';
    }
    // Ripristina bottone
    const btn = document.getElementById('punch-btn');
    if (btn) {
      btn.disabled = !gpsCoords;
      const lbl = document.getElementById('btn-label');
      if (lbl && selectedSite) {
        lbl.textContent = selectedSite.next_action === 'EXIT' ? t().registraUscita : t().registraEntrata;
      }
      const ico = document.getElementById('btn-icon');
      if (ico && selectedSite) {
        ico.textContent = selectedSite.next_action === 'EXIT' ? '⏹' : '▶';
      }
    }
  }

  // ── Selezione cantiere da lista ────────────────────────────────────────────────
  function selectSite(siteId) {
    const site = workerData.sites.find(s => s.site_id === siteId);
    if (!site) return;
    selectedSite = site;
    renderPunchScreen();
  }

  // ── Punch ─────────────────────────────────────────────────────────────────────
  async function doPunch() {
    if (punching) return;
    if (!gpsCoords) {
      // GPS non disponibile — mostra il messaggio nella riga GPS, non un alert
      gpsStatus = 'error';
      gpsText   = t().gpsPositionUnavailableActivate;
      updateGpsRow();
      return;
    }

    punching = true;
    const btn   = document.getElementById('punch-btn');
    const label = document.getElementById('btn-label');
    const icon  = document.getElementById('btn-icon');

    if (btn)   { btn.disabled = true; }
    if (icon)  { icon.innerHTML = '<span class="btn-spinner"></span>'; }
    if (label) { label.textContent = t().registrazione; }

    try {
      const { status, body } = await apiFetch('POST', `/api/v1/badge/${BADGE_CODE}/punch`, {
        site_id:        selectedSite.site_id,
        latitude:       gpsCoords.latitude,
        longitude:      gpsCoords.longitude,
        gps_accuracy_m: gpsCoords.accuracy,
      });

      if (status === 200) {
        renderSuccess(body.event_type, body.timestamp_server, body.site_name || selectedSite.site_name);
        setTimeout(requestPushPermission, 2000);
        return;
      }

      // Errori gestiti
      if (status === 429 && body.error === 'PUNCH_TOO_SOON') {
        const mins = body.retry_after_secs ? Math.ceil(body.retry_after_secs / 60) : 1;
        renderError('PUNCH_TOO_SOON', mins > 0 ? t().minuteRetry(mins) : null);
        return;
      }
      if (status === 403 && body.error === 'OUTSIDE_GEOFENCE') {
        renderError('OUTSIDE_GEOFENCE');
        return;
      }
      if (status === 422 && body.error === 'GPS_ACCURACY_TOO_LOW') {
        // Non è un errore permanente — mostra retry, non dead-end
        showGpsRetry();
        return;
      }
      if (status === 422 && body.error === 'GPS_REQUIRED') {
        renderError('GPS_REQUIRED');
        return;
      }
      if (status === 403 && body.error === 'BADGE_REVOKED') {
        renderError('BADGE_REVOKED');
        return;
      }
      if (status === 404 && body.error === 'BADGE_NOT_FOUND') {
        renderError('BADGE_NOT_FOUND');
        return;
      }
      if (status === 403 && body.error === 'WORKER_NOT_AUTHORIZED_ON_SITE') {
        renderError('WORKER_NOT_AUTHORIZED_ON_SITE');
        return;
      }

      renderError('SERVER_ERROR');

    } catch (e) {
      // Offline: salva in coda locale per retry automatico
      var punchPayload = {
        site_id:        selectedSite.site_id,
        latitude:       gpsCoords.latitude,
        longitude:      gpsCoords.longitude,
        gps_accuracy_m: gpsCoords.accuracy,
      };
      queueOfflinePunch(punchPayload, selectedSite.site_name);
      renderOfflineSuccess(selectedSite.site_name);
      return;
    } finally {
      punching = false;
      var ico2 = document.getElementById('btn-icon');
      if (ico2 && ico2.querySelector('.btn-spinner')) {
        ico2.textContent = selectedSite?.next_action === 'EXIT' ? '⏹' : '▶';
      }
      updatePunchButton();
    }
  }

  // ── Offline Queue ──────────────────────────────────────────────────────────
  var OFFLINE_KEY = 'palladia_offline_punches';

  function getOfflineQueue() {
    try { return JSON.parse(localStorage.getItem(OFFLINE_KEY) || '[]'); } catch { return []; }
  }
  function saveOfflineQueue(q) {
    try { localStorage.setItem(OFFLINE_KEY, JSON.stringify(q)); } catch {}
  }

  function queueOfflinePunch(payload, siteName) {
    var q = getOfflineQueue();
    q.push({ payload: payload, siteName: siteName, savedAt: new Date().toISOString() });
    saveOfflineQueue(q);
  }

  function renderOfflineSuccess(siteName) {
    _rerenderCurrent = function () { renderOfflineSuccess(siteName); };
    stopGps();
    wrap.innerHTML =
      '<div class="card fade-in" style="text-align:center;padding:32px 20px;">' +
        '<span style="font-size:56px;display:block;margin-bottom:16px;">📡</span>' +
        '<div style="font-size:22px;font-weight:800;color:#d97706;margin-bottom:6px;">' + esc(t().offlineSavedTitle) + '</div>' +
        '<div style="font-size:15px;color:#6b7280;margin-bottom:20px;line-height:1.5;">' +
          esc(siteName) + '<br>' + t().offlineSavedHint +
        '</div>' +
        '<div style="font-size:13px;color:#9ca3af;">' + esc(t().canClose) + '</div>' +
      '</div>';
  }

  var _syncing = false;
  async function syncOfflineQueue() {
    if (_syncing) return;
    var q = getOfflineQueue();
    if (!q.length) return;
    _syncing = true;

    var remaining = [];
    for (var i = 0; i < q.length; i++) {
      try {
        var r = await apiFetch('POST', '/api/v1/badge/' + BADGE_CODE + '/punch', q[i].payload);
        if (r.status === 200) {
          console.log('[offline-sync] punch inviato:', q[i].siteName);
        } else if (r.status === 429) {
          remaining.push(q[i]);
        }
        // 4xx diverso da 429: scarta (dati non validi, badge revocato, etc.)
      } catch {
        remaining.push(q[i]);
        break; // ancora offline, riprova dopo
      }
    }

    saveOfflineQueue(remaining);
    _syncing = false;

    if (remaining.length === 0 && q.length > 0) {
      updateOfflineBadge();
    }
  }

  function updateOfflineBadge() {
    var badge = document.getElementById('offline-badge');
    var q = getOfflineQueue();
    if (q.length > 0) {
      if (!badge) {
        badge = document.createElement('div');
        badge.id = 'offline-badge';
        badge.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#d97706;color:#fff;text-align:center;font-size:13px;font-weight:700;padding:6px 12px;z-index:500;';
        document.body.prepend(badge);
      }
      badge.textContent = t().offlineBadge(q.length);
    } else if (badge) {
      badge.remove();
    }
  }

  // Sync quando torna la rete
  window.addEventListener('online', function () {
    setTimeout(syncOfflineQueue, 1500);
  });

  // Sync al caricamento pagina
  setTimeout(function () {
    updateOfflineBadge();
    if (navigator.onLine) syncOfflineQueue();
  }, 2000);

  // ── Main ─────────────────────────────────────────────────────────────────────
  async function main() {
    if (!BADGE_CODE || !/^[A-Fa-f0-9]{18}$/i.test(BADGE_CODE)) {
      renderError('INVALID_BADGE_CODE');
      return;
    }

    // Aspetta fino a 3s per un fix GPS (accuracy ≤ 200m) prima di interrogare il backend.
    // Così il backend può calcolare le distanze e fare auto-select corretto anche per
    // lavoratori assegnati a più cantieri. Su Android il GPS cached risolve in <100ms.
    const initialGps = await waitForGps(3000, 200);
    if (initialGps) {
      gpsCoords = initialGps;
    }

    // Fetch punch-context, con GPS se disponibile
    let contextUrl = `/api/v1/badge/${BADGE_CODE}/punch-context`;
    if (gpsCoords) {
      contextUrl += `?lat=${gpsCoords.latitude}&lon=${gpsCoords.longitude}`;
    }

    let res;
    try {
      res = await apiFetch('GET', contextUrl);
    } catch (e) {
      renderError('NETWORK_ERROR');
      return;
    }

    const { status, body } = res;

    if (status === 404) { renderError('BADGE_NOT_FOUND');  return; }
    if (status === 403) { renderError('BADGE_REVOKED');    return; }
    if (status === 400) { renderError('INVALID_BADGE_CODE'); return; }
    if (status !== 200) { renderError('SERVER_ERROR');     return; }

    workerData    = body;
    maxAccuracyM  = body.max_gps_accuracy_m || 500;

    if (!body.sites || body.sites.length === 0) {
      renderError('NO_SITES');
      return;
    }

    // Auto-select cantiere
    if (body.auto_selected_site_id) {
      selectedSite = body.sites.find(s => s.site_id === body.auto_selected_site_id);
      if (selectedSite) {
        renderPunchScreen();
        return;
      }
    }

    // Nessun auto-select → mostra selezione
    renderSiteSelection();
  }

  // ── PWA ──────────────────────────────────────────────────────────────────────

  // Persistenza badge code in localStorage.
  // Se l'app viene aperta dall'icona home (standalone) senza code nell'URL,
  // redirect al codice salvato così non serve riscansionare il QR.
  (function () {
    var parts = window.location.pathname.split('/').filter(Boolean);
    var idx   = parts.indexOf('timbratura');
    var code  = idx !== -1 ? (parts[idx + 1] || '') : '';
    if (code && /^[A-Fa-f0-9]{18}$/i.test(code)) {
      try { localStorage.setItem('palladia_badge_code', code); } catch (e) {}
    } else {
      var standalone = window.matchMedia('(display-mode: standalone)').matches ||
                       window.navigator.standalone === true;
      if (standalone) {
        var saved = null;
        try { saved = localStorage.getItem('palladia_badge_code'); } catch (e) {}
        if (saved && /^[A-Fa-f0-9]{18}$/i.test(saved)) {
          window.location.replace('/timbratura/' + saved);
        }
      }
    }
  })();

  // Service Worker — richiesto per installabilità PWA + push notifications
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js', { scope: '/' })
      .catch(function (e) { console.warn('[PWA] SW:', e.message); });
  }

  // Push notifications — chiede il permesso dopo la prima timbratura riuscita
  function requestPushPermission() {
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
    if (typeof Notification === 'undefined' || Notification.permission !== 'default') return;
    Notification.requestPermission().then(function (perm) {
      if (perm === 'granted') subscribePush();
    });
  }

  function subscribePush() {
    navigator.serviceWorker.ready.then(function (reg) {
      fetch('/api/v1/push/vapid-public-key').then(function (r) { return r.json(); }).then(function (d) {
        if (!d.vapidPublicKey) return;
        var rawKey = atob(d.vapidPublicKey.replace(/-/g,'+').replace(/_/g,'/'));
        var keyArr = new Uint8Array(rawKey.length);
        for (var i = 0; i < rawKey.length; i++) keyArr[i] = rawKey.charCodeAt(i);
        return reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: keyArr });
      }).then(function (sub) {
        if (!sub) return;
        var json = sub.toJSON();
        fetch('/api/v1/push/subscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ endpoint: json.endpoint, keys: json.keys }),
        }).catch(function () {});
      }).catch(function () {});
    });
  }

  if (typeof Notification !== 'undefined' && Notification.permission === 'granted') subscribePush();

  // ── Guida salvataggio Home ────────────────────────────────────────────────────
  var _pwaPrompt = null; // beforeinstallprompt Android Chrome

  window.addEventListener('beforeinstallprompt', function (e) {
    e.preventDefault();
    _pwaPrompt = e;
    // Aggiorna il bottone se la guida è già aperta
    var btn = document.getElementById('pwa-btn-primary');
    if (btn) { btn.textContent = t().installNow; }
  });

  window.addEventListener('appinstalled', function () {
    pwaGuideHide();
  });

  function pwaDetect() {
    var ua = navigator.userAgent;
    var isIos     = /iphone|ipad|ipod/i.test(ua);
    var isSamsung = /samsungbrowser/i.test(ua);
    var isFirefox = /firefox/i.test(ua) && !isIos;
    var isOpera   = /opr\//i.test(ua);
    if (isIos)     return 'ios';
    if (isSamsung) return 'samsung';
    if (isFirefox) return 'firefox';
    if (isOpera)   return 'opera';
    return 'chrome'; // Chrome, Edge, WebView, default
  }

  function pwaGuideBuild() {
    var browser  = pwaDetect();
    var steps    = t().pwaSteps[browser] || t().pwaSteps.chrome;
    var note     = t().pwaNotes[browser];
    var headline = document.getElementById('pwa-headline');
    var subEl    = document.getElementById('pwa-sub');
    var stepsEl  = document.getElementById('pwa-steps');
    var noteEl   = document.getElementById('pwa-note');
    var btnEl    = document.getElementById('pwa-btn-primary');
    var skipEl   = document.getElementById('pwa-btn-skip');

    if (headline) headline.textContent = t().saveToHome;
    if (subEl) subEl.textContent = t().saveToHomeSub;
    if (skipEl) skipEl.textContent = t().notNowLater;

    if (stepsEl) {
      stepsEl.innerHTML = steps.map(function (s) {
        return '<div class="pwa-step">' +
          '<div class="pwa-step-num">' + s.n + '</div>' +
          '<div class="pwa-step-icon">' + s.icon + '</div>' +
          '<div class="pwa-step-text">' + s.text + '</div>' +
          '</div>';
      }).join('');
    }

    if (noteEl) {
      if (note) { noteEl.innerHTML = note; noteEl.style.display = ''; }
      else       { noteEl.style.display = 'none'; }
    }

    if (btnEl) {
      // Se il prompt nativo è già disponibile (Android Chrome) cambia il bottone
      btnEl.textContent = _pwaPrompt ? t().installNow : t().understoodTry;
    }
  }

  function pwaGuideShow() {
    var guide = document.getElementById('pwa-guide');
    if (!guide) return;
    pwaGuideBuild();
    guide.classList.remove('hidden');
    // Blocca scroll del body mentre la guida è aperta
    document.body.style.overflow = 'hidden';
  }

  function pwaGuideHide() {
    var guide = document.getElementById('pwa-guide');
    if (guide) guide.classList.add('hidden');
    document.body.style.overflow = '';
  }

  function pwaGuideAction() {
    // Android Chrome con prompt nativo: avvia installazione diretta
    if (_pwaPrompt) {
      _pwaPrompt.prompt();
      _pwaPrompt.userChoice.then(function () {
        _pwaPrompt = null;
        pwaGuideHide();
      });
      return;
    }
    // Tutti gli altri: l'utente ha letto le istruzioni, chiude la guida
    pwaGuideHide();
    try { localStorage.setItem('palladia_pwa_guide_done', '1'); } catch (e) {}
  }

  function pwaGuideSkip() {
    pwaGuideHide();
    // "adesso no" → non salvare il flag, così ricompare alla prossima apertura
  }

  // Mostra la guida se: non in standalone, non già completata
  (function () {
    var standalone = window.matchMedia('(display-mode: standalone)').matches ||
                     window.navigator.standalone === true;
    if (standalone) return; // già installata — non serve la guida

    var done = false;
    try { done = !!localStorage.getItem('palladia_pwa_guide_done'); } catch (e) {}
    if (done) return;

    // Bug reale trovato dal vivo (screenshot): il vecchio setTimeout fisso
    // mostrava la guida 800ms dopo il load SEMPRE, anche sopra "Badge
    // disattivato" o la guida permessi GPS — due overlay sovrapposti,
    // testo illeggibile. Ora aspetta che la pagina sia in uno stato "calmo"
    // (niente caricamento, niente errore, niente guida GPS aperta) prima di
    // mostrarsi, ritentando invece di sparare alla cieca. Se resta bloccata
    // (es. badge disattivato per sempre) smette di ritentare dopo 30s.
    var attempts = 0;
    (function maybeShow() {
      attempts++;
      var gpsGuide = document.getElementById('gps-guide');
      var gpsOpen  = gpsGuide && !gpsGuide.classList.contains('hidden');
      var loading  = !!wrap.querySelector('.loading-wrap');
      var errorScreen = !!wrap.querySelector('.error-wrap');
      if (gpsOpen || loading || errorScreen) {
        if (attempts < 20) setTimeout(maybeShow, 1500);
        return;
      }
      pwaGuideShow();
    })();
  })();

  main().catch(function (err) {
    console.error('[badge-punch] main() failed:', err);
    renderError('SERVER_ERROR');
  });
  </script>
</body>
</html>
