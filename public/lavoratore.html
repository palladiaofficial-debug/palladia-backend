<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a1a">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <title>Area Lavoratore — Palladia</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f5f3ee;
      --surface: #ffffff;
      --border:  #e4e7ec;
      --text:    #1a1a1a;
      --muted:   #6b7280;
      --subtle:  #9ca3af;
      --accent:  #2563eb;
      --green:   #16a34a;
      --green-bg:#f0fdf4;
      --red:     #dc2626;
      --red-bg:  #fef2f2;
      --amber:   #d97706;
      --radius:  16px;
    }

    html, body {
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 18px; line-height: 1.4;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }

    /* ═══════════ AUTH ═══════════ */
    .auth-wrap {
      min-height: 100dvh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px 16px;
    }
    .auth-brand { font-size: 11px; font-weight: 800; letter-spacing: 0.22em; color: var(--subtle); text-transform: uppercase; margin-bottom: 6px; }
    .auth-title { font-size: 22px; font-weight: 900; color: var(--text); margin-bottom: 24px; }
    .auth-card { width: 100%; max-width: 420px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .auth-worker { display: flex; align-items: center; gap: 14px; padding: 18px 20px; border-bottom: 1px solid var(--border); background: #fafaf7; }
    .auth-av { width: 50px; height: 50px; border-radius: 50%; background: var(--text); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 800; flex-shrink: 0; }
    .auth-av img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
    .auth-wn { font-size: 18px; font-weight: 700; }
    .auth-wc { font-size: 14px; color: var(--muted); margin-top: 2px; }
    .auth-body { padding: 20px; }
    .auth-label { font-size: 14px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
    .auth-input {
      width: 100%; padding: 16px; font-size: 18px; font-family: 'Inter', monospace;
      letter-spacing: 0.05em; text-transform: uppercase;
      border: 2px solid var(--border); border-radius: 10px;
      background: var(--bg); color: var(--text); outline: none;
    }
    .auth-input:focus { border-color: var(--text); }
    .auth-input.shake { animation: shake 0.4s; border-color: var(--red); }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
    .auth-btn {
      width: 100%; margin-top: 16px; padding: 16px;
      font-size: 17px; font-weight: 800; color: #fff;
      background: var(--text); border: none; border-radius: 10px;
      cursor: pointer;
    }
    .auth-btn:disabled { opacity: 0.3; }
    .auth-error { margin-top: 12px; padding: 12px; font-size: 15px; font-weight: 700; color: var(--red); background: var(--red-bg); border-radius: 10px; display: none; text-align: center; }
    .auth-footer { padding: 14px 20px; border-top: 1px solid var(--border); font-size: 12px; color: var(--subtle); text-align: center; }
    .auth-load { padding: 40px 20px; text-align: center; }

    /* ═══════════ APP ═══════════ */
    .app { display: none; flex-direction: column; min-height: 100dvh; }
    .app.active { display: flex; }

    .topbar {
      background: var(--text); color: #fff;
      padding: 0 16px; height: 60px;
      display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; z-index: 50;
    }
    .tb-av { width: 38px; height: 38px; border-radius: 50%; background: rgba(255,255,255,0.15); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; flex-shrink: 0; overflow: hidden; }
    .tb-av img { width: 100%; height: 100%; object-fit: cover; }
    .tb-info { flex: 1; min-width: 0; }
    .tb-name { font-size: 16px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tb-time { font-size: 12px; color: rgba(255,255,255,0.4); }
    .tb-exit {
      font-size: 14px; font-weight: 700; color: #fff;
      background: rgba(255,255,255,0.12); border: none;
      border-radius: 8px; padding: 8px 16px; cursor: pointer;
    }

    .content { flex: 1; padding: 8px 12px 110px; max-width: 540px; width: 100%; margin: 0 auto; }

    /* ── Tabs ── */
    .tabs {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--surface); border-top: 1.5px solid var(--border);
      display: flex; z-index: 50;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    .tab {
      flex: 1; padding: 10px 4px 8px; border: none; background: none;
      font-size: 12px; font-weight: 700; color: var(--subtle);
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      cursor: pointer; position: relative;
    }
    .tab.active { color: var(--text); }
    .tab.active::before { content:''; position:absolute; top:0; left:16%; right:16%; height:2.5px; background:var(--text); border-radius:0 0 3px 3px; }
    .tab svg { width: 26px; height: 26px; stroke-width: 1.7; }

    .pane { display: none; }
    .pane.active { display: block; }

    /* ── Section ── */
    .sec-title {
      font-size: 13px; font-weight: 800; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.06em;
      margin: 16px 0 8px 4px;
    }
    .sec-title:first-child { margin-top: 4px; }

    /* ── Cards ── */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }

    /* ── Empty ── */
    .empty { padding: 48px 24px; text-align: center; }
    .empty-ic { width: 56px; height: 56px; border-radius: 14px; background: var(--bg); border: 1px solid var(--border); display: inline-flex; align-items: center; justify-content: center; margin-bottom: 14px; }
    .empty-ic svg { stroke: var(--subtle); }
    .empty h3 { font-size: 17px; font-weight: 800; margin-bottom: 6px; }
    .empty p { font-size: 15px; color: var(--muted); line-height: 1.5; }

    /* ═══ Buste Paga ═══ */
    .slip {
      padding: 20px 16px; border-bottom: 1px solid var(--border);
    }
    .slip:last-child { border-bottom: none; }
    .slip-head {
      display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
    }
    .slip-ic {
      width: 48px; height: 48px; border-radius: 12px;
      background: rgba(37,99,235,0.07); border: 1px solid rgba(37,99,235,0.15);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .slip-ic svg { stroke: var(--accent); }
    .slip-period { font-size: 20px; font-weight: 800; text-transform: capitalize; }
    .slip-note { font-size: 14px; color: var(--muted); margin-top: 2px; }
    .slip-btns { display: flex; flex-direction: column; gap: 8px; }
    .big-btn {
      width: 100%; padding: 16px; font-size: 16px; font-weight: 800;
      border: none; border-radius: 12px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity 0.15s;
    }
    .big-btn:disabled { opacity: 0.3; }
    .big-btn.blue { background: var(--accent); color: #fff; }
    .big-btn.green { background: var(--green); color: #fff; }
    .big-btn svg { width: 20px; height: 20px; flex-shrink: 0; }
    .ack-done {
      width: 100%; padding: 14px; font-size: 15px; font-weight: 800;
      border-radius: 12px; text-align: center;
      color: var(--green); background: var(--green-bg);
      border: 1.5px solid rgba(22,163,74,0.2);
    }

    /* ═══ Documenti ═══ */
    .doc {
      padding: 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 14px;
    }
    .doc:last-child { border-bottom: none; }
    .doc-ic {
      width: 48px; height: 48px; border-radius: 12px;
      background: var(--bg); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .doc-ic svg { stroke: var(--muted); }
    .doc-body { flex: 1; min-width: 0; }
    .doc-name { font-size: 16px; font-weight: 700; }
    .doc-exp { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .doc-exp.bad { color: var(--red); font-weight: 700; }
    .doc-exp.soon { color: var(--amber); font-weight: 600; }
    .doc-open {
      padding: 12px 20px; font-size: 14px; font-weight: 800;
      color: var(--accent); background: rgba(37,99,235,0.07);
      border: 1.5px solid rgba(37,99,235,0.2); border-radius: 10px;
      cursor: pointer; flex-shrink: 0;
    }
    .doc-open:disabled { opacity: 0.3; }

    .spinner { width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--text); border-radius: 50%; animation: spin 0.6s linear infinite; margin: 40px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- AUTH -->
  <div class="auth-wrap" id="auth-wrap">
    <div class="auth-brand">PALLADIA</div>
    <div class="auth-title">Area Lavoratore</div>
    <div class="auth-card">
      <div id="auth-id"><div class="auth-load"><div class="spinner"></div></div></div>
      <div id="auth-form" style="display:none">
        <div class="auth-body">
          <div class="auth-label">Inserisci il tuo codice fiscale</div>
          <input class="auth-input" id="cf" type="text" maxlength="16"
                 autocomplete="off" autocapitalize="characters" spellcheck="false"
                 placeholder="RSSMRA85M01H501Z" inputmode="text">
          <button class="auth-btn" id="auth-btn" disabled>Accedi</button>
          <div class="auth-error" id="auth-err"></div>
        </div>
        <div class="auth-footer">Connessione sicura · Resterai collegato su questo dispositivo</div>
      </div>
    </div>
  </div>

  <!-- APP -->
  <div class="app" id="app">
    <div class="topbar">
      <div class="tb-av" id="tb-av"></div>
      <div class="tb-info">
        <div class="tb-name" id="tb-name">—</div>
        <div class="tb-time" id="tb-time">30:00</div>
      </div>
      <button class="tb-exit" id="btn-exit">Esci</button>
    </div>

    <div class="content">
      <div class="pane active" id="p-buste"></div>
      <div class="pane" id="p-doc"></div>
    </div>

    <div class="tabs">
      <button class="tab active" data-t="buste">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Buste Paga
      </button>
      <button class="tab" data-t="doc">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        Documenti
      </button>
    </div>
  </div>

  <script>
    'use strict';
    const API = location.origin + '/api/v1';
    let _tk=null, _code=null, _prof=null;

    function esc(s){const d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML;}
    function getCode(){const p=location.pathname.split('/').filter(Boolean);const i=p.indexOf('lavoratore');return i!==-1?(p[i+1]||''):'';}
    function hdr(){return{'Authorization':'WorkerArea '+_tk,'Content-Type':'application/json'};}
    function ini(n){return(n||'').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}

    async function api(path,opts={}){
      const r=await fetch(API+path,{...opts,headers:{...hdr(),...(opts.headers||{})}});
      if(r.status===401){logout();throw new Error('EXP');}
      return r;
    }

    const MO=['','Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
    function fD(iso){return iso?new Date(iso).toLocaleDateString('it-IT',{day:'2-digit',month:'short',year:'numeric'}):'—';}
    function fT(iso){return iso?new Date(iso).toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'}):'—';}
    function fDay(iso){return iso?new Date(iso).toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long'}):'—';}

    /* AUTH */
    async function initAuth(){
      _code=getCode();
      if(!_code||!/^[A-Fa-f0-9]{18}$/i.test(_code)){
        document.getElementById('auth-id').innerHTML='<div class="auth-load" style="color:var(--red);font-weight:700;font-size:16px">Codice badge non valido</div>';return;
      }
      try{
        const r=await fetch(API+'/badge/'+_code);if(!r.ok)throw 0;const d=await r.json();
        const av=d.photo_url?`<img src="${esc(d.photo_url)}">`:(esc(ini(d.full_name)));
        document.getElementById('auth-id').innerHTML=`<div class="auth-worker"><div class="auth-av">${av}</div><div><div class="auth-wn">${esc(d.full_name)}</div><div class="auth-wc">${esc(d.company_name||'')}</div></div></div>`;
        document.getElementById('auth-form').style.display='';
      }catch{document.getElementById('auth-id').innerHTML='<div class="auth-load" style="color:var(--red);font-weight:700;font-size:16px">Badge non trovato</div>';}
    }

    async function doLogin(){
      const inp=document.getElementById('cf'),err=document.getElementById('auth-err'),btn=document.getElementById('auth-btn');
      const cf=inp.value.trim().toUpperCase();
      if(cf.length!==16){inp.classList.add('shake');setTimeout(()=>inp.classList.remove('shake'),500);return;}
      btn.disabled=true;btn.textContent='Verifica…';err.style.display='none';
      try{
        const r=await fetch(API+'/area/'+_code+'/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cf})});
        const b=await r.json();
        if(!r.ok){inp.classList.add('shake');setTimeout(()=>inp.classList.remove('shake'),500);
          err.textContent=r.status===429?'Troppi tentativi. Riprova tra 15 minuti.':(b.message||'Codice fiscale non corretto.');
          err.style.display='';btn.disabled=false;btn.textContent='Accedi';return;}
        _tk=b.token;
        localStorage.setItem('wa_t',_tk);localStorage.setItem('wa_c',_code);
        enterApp();
      }catch{err.textContent='Errore di rete.';err.style.display='';btn.disabled=false;btn.textContent='Accedi';}
    }

    function logout(){
      _tk=null;_prof=null;
      localStorage.removeItem('wa_t');localStorage.removeItem('wa_c');
      document.getElementById('app').classList.remove('active');
      document.getElementById('auth-wrap').style.display='';
      document.getElementById('cf').value='';
      document.getElementById('auth-err').style.display='none';
      document.getElementById('auth-btn').disabled=true;
      document.getElementById('auth-btn').textContent='Accedi';
    }

    function tryResume(){
      const t=localStorage.getItem('wa_t'),c=localStorage.getItem('wa_c');
      if(t&&c&&c.toUpperCase()===_code.toUpperCase()){_tk=t;return true;}
      return false;
    }

    async function enterApp(){
      document.getElementById('auth-wrap').style.display='none';
      document.getElementById('app').classList.add('active');
      try{
        const r=await api('/area/'+_code+'/profile');_prof=await r.json();
        document.getElementById('tb-name').textContent=_prof.full_name||'—';
        document.getElementById('tb-time').textContent='Connesso';
        const av=_prof.photo_url?`<img src="${esc(_prof.photo_url)}">`:(esc(ini(_prof.full_name)));
        document.getElementById('tb-av').innerHTML=av;
      }catch(e){
        if(e.message==='EXP') return;
      }
      loadPayslips();
    }

    /* TABS */
    document.querySelectorAll('.tab').forEach(t=>{
      t.addEventListener('click',()=>{
        document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
        document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
        t.classList.add('active');
        document.getElementById('p-'+t.dataset.t).classList.add('active');
        if(t.dataset.t==='buste')loadPayslips();
        if(t.dataset.t==='doc')loadDocumenti();
      });
    });

    /* BUSTE PAGA */
    async function loadPayslips(){
      const p=document.getElementById('p-buste');p.innerHTML='<div class="spinner"></div>';
      try{
        const r=await api('/area/'+_code+'/payslips');const list=await r.json();
        if(!list.length){
          p.innerHTML=`<div class="sec-title">Buste paga</div><div class="card"><div class="empty">
            <div class="empty-ic"><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
            <h3>Nessuna busta paga</h3><p>Quando l'azienda condividerà le tue buste paga, le troverai qui.</p>
          </div></div>`;return;}
        let h='<div class="sec-title">Buste paga</div><div class="card">';
        for(const s of list){
          const per=`${MO[s.period_month]||s.period_month} ${s.period_year}`;
          const isAck=s.status==='acknowledged';
          const ackBtn=isAck
            ? `<div class="ack-done">&#10003; Hai firmato questa busta paga</div>`
            : `<button class="big-btn green" onclick="ackSlip('${esc(s.id)}',this)">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                Firma presa visione
              </button>`;
          h+=`<div class="slip" id="sl-${esc(s.id)}">
            <div class="slip-head">
              <div class="slip-ic"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="1.7"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
              <div>
                <div class="slip-period">${esc(per)}</div>
                ${s.note?`<div class="slip-note">${esc(s.note)}</div>`:''}
              </div>
            </div>
            <div class="slip-btns">
              <button class="big-btn blue" onclick="openSlip('${esc(s.id)}',this)">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                Apri busta paga
              </button>
              ${ackBtn}
            </div>
          </div>`;
        }
        h+='</div>';
        p.innerHTML=h;
      }catch{p.innerHTML='<div class="empty" style="color:var(--red)"><h3>Errore di caricamento</h3></div>';}
    }

    async function openSlip(id,btn){
      btn.disabled=true;const orig=btn.innerHTML;btn.innerHTML='Caricamento…';
      try{const r=await api('/area/'+_code+'/payslips/'+id+'/pdf');const{url}=await r.json();window.open(url,'_blank','noopener');}
      catch{alert('Impossibile aprire il PDF. Riprova.');}
      btn.disabled=false;btn.innerHTML=orig;
    }

    async function ackSlip(id,btn){
      if(!confirm('Confermi di aver visto questa busta paga?\n\nVerranno registrati data e ora della firma.'))return;
      btn.disabled=true;btn.innerHTML='Invio firma…';
      try{
        const r=await api('/area/'+_code+'/payslips/'+id+'/acknowledge',{method:'POST'});
        if(!r.ok)throw 0;
        btn.outerHTML='<div class="ack-done">&#10003; Hai firmato questa busta paga</div>';
      }catch{alert('Errore. Riprova.');btn.disabled=false;btn.innerHTML='Firma presa visione';}
    }

    /* DOCUMENTI */
    const DL={idoneita_medica:'Idoneità Sanitaria',formazione_sicurezza:'Formazione Sicurezza',formazione_generale:'Formazione Generale',formazione_specifica:'Formazione Specifica',patentino:'Patentino / Abilitazione',unilav:'UniLav',documento_identita:"Documento d'Identità"};

    async function loadDocumenti(){
      const p=document.getElementById('p-doc');p.innerHTML='<div class="spinner"></div>';
      try{
        const pr=_prof||await(await api('/area/'+_code+'/profile')).json();
        const docs=pr.documents||[];
        if(!docs.length){
          p.innerHTML=`<div class="sec-title">Documenti</div><div class="card"><div class="empty">
            <div class="empty-ic"><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></div>
            <h3>Nessun documento</h3><p>I tuoi documenti di sicurezza compariranno qui.</p>
          </div></div>`;return;}
        let h='<div class="sec-title">I tuoi documenti</div><div class="card">';
        for(const d of docs){
          const label=DL[d.doc_type]||d.name||d.doc_type;
          let ec='',et='';
          if(d.expiry_date){const diff=(new Date(d.expiry_date)-new Date())/86400000;ec=diff<0?'bad':diff<30?'soon':'';et=(diff<0?'SCADUTO ':'Scadenza ')+fD(d.expiry_date);}
          const btn=d.has_file?`<button class="doc-open" onclick="openDoc('${esc(d.id)}',this)">Apri</button>`:'';
          h+=`<div class="doc">
            <div class="doc-ic"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="1.7"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
            <div class="doc-body">
              <div class="doc-name">${esc(label)}</div>
              ${et?`<div class="doc-exp ${ec}">${esc(et)}</div>`:''}
            </div>
            ${btn}
          </div>`;
        }
        h+='</div>';
        p.innerHTML=h;
      }catch{p.innerHTML='<div class="empty" style="color:var(--red)"><h3>Errore di caricamento</h3></div>';}
    }

    async function openDoc(id,btn){
      btn.disabled=true;
      try{const r=await api('/area/'+_code+'/documents/'+id);const{url}=await r.json();window.open(url,'_blank','noopener');}
      catch{alert('Impossibile aprire il documento.');}
      btn.disabled=false;
    }

    /* INPUT */
    const cfIn=document.getElementById('cf');
    cfIn.addEventListener('input',function(){this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'');document.getElementById('auth-btn').disabled=this.value.length!==16;document.getElementById('auth-err').style.display='none';});
    cfIn.addEventListener('keydown',function(e){if(e.key==='Enter'&&this.value.length===16)doLogin();});
    document.getElementById('auth-btn').addEventListener('click',doLogin);
    document.getElementById('btn-exit').addEventListener('click',logout);

    /* BOOT */
    (async()=>{_code=getCode();if(_code&&tryResume())enterApp();else await initAuth();})();
  </script>
</body>
</html>
