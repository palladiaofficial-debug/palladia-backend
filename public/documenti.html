<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#f5f3ee">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <title>Archivio Documenti — Palladia</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f5f3ee;
      --surface:  #ffffff;
      --border:   rgba(0,0,0,0.08);
      --border20: rgba(0,0,0,0.20);
      --accent:   #000000;
      --green:    #16a34a;
      --green-bg: rgba(22,163,74,0.10);
      --red:      #dc2626;
      --red-bg:   rgba(220,38,38,0.10);
      --amber:    #d97706;
      --amber-bg: rgba(217,119,6,0.10);
      --blue:     #2563eb;
      --blue-bg:  rgba(37,99,235,0.08);
      --text:     #1a1a1a;
      --muted:    #6b7280;
      --subtle:   #9ca3af;
      --sidebar:  #111111;
      --sidebar-t:#9ca3af;
      --sidebar-a:#ffffff;
      --radius:   12px;
      --sidebar-w:240px;
    }

    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px; -webkit-font-smoothing: antialiased; line-height: 1.6;
    }

    /* ── Screens ── */
    .screen { display: none; }
    .screen.active { display: flex; }
    #screen-loading { align-items: center; justify-content: center; height: 100vh;
      background: var(--bg); flex-direction: column; gap: 16px; }
    .spinner { width: 32px; height: 32px; border: 2.5px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Login ── */
    #screen-login { align-items: center; justify-content: center; height: 100vh; background: var(--bg); }
    .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
      padding: 40px; width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 20px; }
    .login-box h1 { font-size: 20px; font-weight: 700; }
    .login-box p { font-size: 13px; color: var(--muted); margin-top: -12px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); }
    .field input { border: 1px solid var(--border20); border-radius: 10px; padding: 10px 12px;
      font-size: 14px; outline: none; width: 100%; }
    .field input:focus { border-color: var(--accent); }
    .btn-primary { background: var(--accent); color: #fff; border: none; border-radius: 10px;
      padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; }
    .btn-primary:hover { opacity: .85; }
    .error-msg { color: var(--red); font-size: 13px; }

    /* ── App layout ── */
    #screen-app { height: 100vh; overflow: hidden; }
    .layout { display: flex; height: 100%; }

    /* ── Sidebar ── */
    .sidebar { width: var(--sidebar-w); min-width: var(--sidebar-w); background: var(--sidebar);
      display: flex; flex-direction: column; padding: 20px 0; overflow-y: auto; }
    .sidebar-brand { padding: 0 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .sidebar-brand-name { font-size: 15px; font-weight: 700; color: #fff; }
    .sidebar-brand-sub  { font-size: 11px; color: var(--sidebar-t); margin-top: 2px; }
    .sidebar-back { display: flex; align-items: center; gap: 8px; padding: 14px 16px 0;
      font-size: 12px; color: var(--sidebar-t); text-decoration: none; cursor: pointer; }
    .sidebar-back:hover { color: #fff; }
    .sidebar-sec { padding: 20px 16px 8px;
      font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--sidebar-t); }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 16px;
      font-size: 13px; font-weight: 500; color: var(--sidebar-t); cursor: pointer;
      border-radius: 0; transition: color .15s, background .15s; }
    .nav-item:hover { color: #fff; background: rgba(255,255,255,0.06); }
    .nav-item.active { color: #fff; background: rgba(255,255,255,0.10); }
    .nav-item .nav-icon { font-size: 16px; width: 20px; text-align: center; }
    .nav-count { margin-left: auto; background: var(--red); color: #fff;
      font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 99px; }
    .sidebar-divider { border: none; border-top: 1px solid rgba(255,255,255,0.06); margin: 8px 16px; }

    /* ── Main ── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* ── Top bar ── */
    .topbar { background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 60px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
    .topbar-title { font-size: 16px; font-weight: 700; flex: 1; }
    .search-wrap { position: relative; flex: 1; max-width: 420px; }
    .search-wrap input { width: 100%; border: 1px solid var(--border20); border-radius: 10px;
      padding: 8px 12px 8px 36px; font-size: 13px; background: var(--bg); outline: none; }
    .search-wrap input:focus { border-color: var(--accent); background: var(--surface); }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--subtle); font-size: 14px; pointer-events: none; }

    /* ── Alert banner ── */
    .alert-banner { margin: 16px 24px 0; background: var(--red-bg); border: 1px solid rgba(220,38,38,0.20);
      border-radius: var(--radius); padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
    .alert-banner.amber { background: var(--amber-bg); border-color: rgba(217,119,6,0.20); }
    .alert-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); flex-shrink: 0; }
    .alert-banner.amber .alert-dot { background: var(--amber); }
    .alert-text { font-size: 13px; font-weight: 500; flex: 1; }
    .alert-text strong { font-weight: 700; }
    .btn-alert-view { font-size: 12px; font-weight: 600; color: var(--red);
      background: none; border: none; cursor: pointer; white-space: nowrap; }
    .alert-banner.amber .btn-alert-view { color: var(--amber); }

    /* ── Filter tabs ── */
    .filter-bar { padding: 16px 24px 0; display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-tab { padding: 6px 14px; border-radius: 99px; font-size: 12px; font-weight: 600;
      border: 1px solid var(--border20); background: var(--surface); color: var(--muted);
      cursor: pointer; transition: all .15s; white-space: nowrap; }
    .filter-tab:hover { border-color: var(--accent); color: var(--text); }
    .filter-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── Content area ── */
    .content { flex: 1; overflow-y: auto; padding: 16px 24px 40px; }

    /* ── Section label ── */
    .section-label { font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .07em; color: var(--muted); margin: 20px 0 10px; }
    .section-label:first-child { margin-top: 0; }

    /* ── Doc card ── */
    .doc-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 14px 16px; display: flex; align-items: center; gap: 14px; margin-bottom: 8px;
      transition: box-shadow .15s; }
    .doc-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .doc-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center;
      justify-content: center; font-size: 18px; flex-shrink: 0; }
    .doc-icon.pdf   { background: rgba(220,38,38,0.10); }
    .doc-icon.img   { background: rgba(37,99,235,0.08); }
    .doc-icon.word  { background: rgba(37,99,235,0.08); }
    .doc-icon.other { background: rgba(0,0,0,0.05); }
    .doc-info { flex: 1; min-width: 0; }
    .doc-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; color: var(--text); }
    .doc-meta { display: flex; align-items: center; gap: 8px; margin-top: 3px; flex-wrap: wrap; }
    .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 99px;
      font-size: 10px; font-weight: 700; letter-spacing: .04em; }
    .badge-site    { background: rgba(37,99,235,0.10); color: var(--blue); }
    .badge-company { background: rgba(0,0,0,0.06); color: var(--muted); }
    .badge-worker  { background: var(--green-bg); color: var(--green); }
    .badge-scaduto    { background: var(--red-bg); color: var(--red); }
    .badge-in-scadenza{ background: var(--amber-bg); color: var(--amber); }
    .badge-valido     { background: var(--green-bg); color: var(--green); }
    .doc-date { font-size: 11px; color: var(--subtle); }
    .doc-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .btn-download { padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 600;
      background: var(--accent); color: #fff; border: none; cursor: pointer; white-space: nowrap; }
    .btn-download:hover { opacity: .85; }
    .btn-download:disabled { opacity: .4; cursor: default; }

    /* ── Empty state ── */
    .empty { text-align: center; padding: 60px 24px; }
    .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: .4; }
    .empty h3 { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
    .empty p  { font-size: 13px; color: var(--muted); }

    /* ── Loading skeleton ── */
    .skeleton { background: linear-gradient(90deg, var(--border) 25%, rgba(0,0,0,0.04) 50%, var(--border) 75%);
      background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: 8px; }
    @keyframes shimmer { to { background-position: -200% 0; } }
    .skel-card { height: 68px; margin-bottom: 8px; border-radius: var(--radius); }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .sidebar { display: none; }
      .topbar { padding: 0 16px; }
      .content, .filter-bar, .alert-banner { padding-left: 16px; padding-right: 16px; }
      .alert-banner { margin: 12px 16px 0; }
    }
  </style>
</head>
<body>

<!-- Loading -->
<div id="screen-loading" class="screen active">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--muted)" id="loading-msg">Caricamento...</div>
</div>

<!-- Login -->
<div id="screen-login" class="screen">
  <div class="login-box">
    <div>
      <h1 style="display:flex;align-items:center;gap:8px"><svg width="18" height="20" viewBox="0 0 544 592" style="flex-shrink:0" aria-hidden="true"><path fill="currentColor" fill-rule="evenodd" d="M 4 4 L 311 4 L 333 6 L 365 12 L 394 21 L 430 38 L 450 51 L 478 75 L 493 92 L 507 112 L 526 151 L 537 195 L 539 214 L 539 245 L 533 285 L 521 321 L 511 341 L 498 361 L 487 375 L 465 397 L 447 411 L 406 434 L 372 446 L 340 453 L 310 456 L 148 456 L 147 587 L 4 587 L 4 4 Z M 107 100 L 305 100 L 329 103 L 354 110 L 370 117 L 389 129 L 413 153 L 421 165 L 429 182 L 434 199 L 437 219 L 437 240 L 433 265 L 428 280 L 419 298 L 408 313 L 394 327 L 377 339 L 359 348 L 338 355 L 305 360 L 148 360 L 147 443 L 107 483 L 107 100 Z"/></svg>Palladia</h1>
      <p>Accedi per gestire i documenti</p>
    </div>
    <form id="login-form" style="display:flex;flex-direction:column;gap:16px">
      <div class="field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="mario@azienda.it" autocomplete="email" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-pass" autocomplete="current-password" required>
      </div>
      <div class="error-msg" id="login-error"></div>
      <button class="btn-primary" id="btn-login" type="submit">Accedi</button>
    </form>
  </div>
</div>

<!-- App -->
<div id="screen-app" class="screen">
  <div class="layout">

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-brand-name" style="display:flex;align-items:center;gap:7px"><svg width="14" height="16" viewBox="0 0 544 592" style="flex-shrink:0" aria-hidden="true"><path fill="currentColor" fill-rule="evenodd" d="M 4 4 L 311 4 L 333 6 L 365 12 L 394 21 L 430 38 L 450 51 L 478 75 L 493 92 L 507 112 L 526 151 L 537 195 L 539 214 L 539 245 L 533 285 L 521 321 L 511 341 L 498 361 L 487 375 L 465 397 L 447 411 L 406 434 L 372 446 L 340 453 L 310 456 L 148 456 L 147 587 L 4 587 L 4 4 Z M 107 100 L 305 100 L 329 103 L 354 110 L 370 117 L 389 129 L 413 153 L 421 165 L 429 182 L 434 199 L 437 219 L 437 240 L 433 265 L 428 280 L 419 298 L 408 313 L 394 327 L 377 339 L 359 348 L 338 355 L 305 360 L 148 360 L 147 443 L 107 483 L 107 100 Z"/></svg>Palladia</div>
        <div class="sidebar-brand-sub">Archivio Documenti</div>
      </div>

      <div class="sidebar-sec">Sfoglia</div>
      <div class="nav-item active" data-scope="all" onclick="setScope('all', this)">
        <span class="nav-icon">📁</span> Tutti i documenti
      </div>
      <div class="nav-item" data-scope="company" onclick="setScope('company', this)">
        <span class="nav-icon">🏢</span> Azienda
      </div>
      <div class="nav-item" data-scope="site" onclick="setScope('site', this)">
        <span class="nav-icon">🏗️</span> Cantieri
      </div>
      <div class="nav-item" data-scope="workers" onclick="setScope('workers', this)">
        <span class="nav-icon">👷</span> Lavoratori
      </div>

      <hr class="sidebar-divider">
      <div class="sidebar-sec">Compliance</div>
      <div class="nav-item" data-scope="expiring" onclick="setScope('expiring', this)">
        <span class="nav-icon">⏰</span> Scadenze
        <span class="nav-count" id="sidebar-expiry-count" style="display:none">0</span>
      </div>

      <hr class="sidebar-divider">
      <div class="nav-item" onclick="window.history.back()" style="margin-top:auto">
        <span class="nav-icon">←</span> Torna indietro
      </div>
    </div>

    <!-- Main -->
    <div class="main">
      <!-- Topbar -->
      <div class="topbar">
        <div class="topbar-title" id="topbar-title">Tutti i documenti</div>
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input" placeholder="Cerca per nome, tipo, lavoratore..."
            oninput="onSearch(this.value)">
        </div>
      </div>

      <!-- Alert banner -->
      <div id="alert-banner" style="display:none"></div>

      <!-- Filter tabs -->
      <div class="filter-bar" id="filter-bar"></div>

      <!-- Content -->
      <div class="content" id="content">
        <div class="skel-card skeleton"></div>
        <div class="skel-card skeleton"></div>
        <div class="skel-card skeleton"></div>
        <div class="skel-card skeleton"></div>
      </div>
    </div>

  </div>
</div>

<script>
'use strict';
let sb, _companyId;
let _scope   = 'all';
let _query   = '';
let _category = '';
let _searchTimer;
let _docs    = [];
let _expiring = { scaduti: [], in_scadenza: [] };

// ── Auth ─────────────────────────────────────────────────────────────────────
async function getJwt() {
  const { data: { session } } = await sb.auth.getSession();
  return session?.access_token || null;
}
async function api(method, path, body) {
  const token = await getJwt();
  if (!token) { showScreen('screen-login'); return null; }
  const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
  if (_companyId) headers['X-Company-Id'] = _companyId;
  const r = await fetch(path, { method, headers, body: body != null ? JSON.stringify(body) : undefined });
  if (r.status === 401) { showScreen('screen-login'); return null; }
  return r.ok ? await r.json().catch(() => null) : null;
}

// ── Screens ───────────────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  let cfg;
  try {
    const r = await fetch('/api/config');
    if (!r.ok) throw new Error('Config non disponibile');
    cfg = await r.json();
    if (!cfg.supabase_url || !cfg.supabase_anon_key) throw new Error('Config Supabase mancante');
  } catch (e) {
    document.getElementById('loading-msg').textContent = e.message;
    return;
  }
  sb = supabase.createClient(cfg.supabase_url, cfg.supabase_anon_key, {
    auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false }
  });
  sb.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN' && session) checkUser(session);
    if (event === 'SIGNED_OUT') showScreen('screen-login');
  });
  const { data: { session } } = await sb.auth.getSession();
  if (session) checkUser(session);
  else showScreen('screen-login');
}

async function checkUser(session) {
  showScreen('screen-loading');
  const r = await fetch('/api/v1/me', {
    headers: { 'Authorization': `Bearer ${session.access_token}` }
  });
  if (!r.ok) { showScreen('screen-login'); return; }
  const me = await r.json();
  _companyId = me.company_id;
  showScreen('screen-app');
  loadAll();
}

// ── Login ─────────────────────────────────────────────────────────────────────
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('btn-login');
  const err = document.getElementById('login-error');
  btn.disabled = true; err.textContent = '';
  const { error } = await sb.auth.signInWithPassword({
    email: document.getElementById('login-email').value.trim(),
    password: document.getElementById('login-pass').value,
  });
  btn.disabled = false;
  if (error) err.textContent = 'Email o password non corretti.';
});

// ── Load data ─────────────────────────────────────────────────────────────────
async function loadAll() {
  // Fetch expiring in background per alert
  api('GET', '/api/v1/documents/expiring?days=60').then(data => {
    if (!data) return;
    _expiring = data;
    renderAlert();
    const total = (data.scaduti?.length || 0) + (data.in_scadenza?.length || 0);
    const badge = document.getElementById('sidebar-expiry-count');
    if (total > 0) { badge.textContent = total; badge.style.display = ''; }
  });
  await loadDocs();
}

async function loadDocs() {
  if (_scope === 'expiring') {
    await renderExpiring();
    return;
  }

  const content = document.getElementById('content');
  content.innerHTML = '<div class="skel-card skeleton"></div>'.repeat(5);

  let url = `/api/v1/documents/search?scope=${_scope}`;
  if (_query)    url += `&q=${encodeURIComponent(_query)}`;
  if (_category) url += `&category=${encodeURIComponent(_category)}`;

  const data = await api('GET', url);
  _docs = data?.results || [];
  renderDocs();
}

// ── Navigation ────────────────────────────────────────────────────────────────
const SCOPE_LABELS = {
  all: 'Tutti i documenti',
  company: 'Documenti aziendali',
  site: 'Documenti cantieri',
  workers: 'Documenti lavoratori',
  expiring: 'Scadenze e compliance',
};

const CATEGORY_FILTERS = {
  all: [],
  company: [
    { key: '', label: 'Tutti' },
    { key: 'dvr', label: 'DVR' },
    { key: 'durc', label: 'DURC' },
    { key: 'rspp', label: 'RSPP' },
    { key: 'rls', label: 'RLS' },
    { key: 'medico_competente', label: 'Medico Comp.' },
    { key: 'assicurazione', label: 'Assicurazione' },
    { key: 'soa', label: 'SOA' },
    { key: 'iso', label: 'ISO' },
    { key: 'formazione', label: 'Formazione' },
    { key: 'altro', label: 'Altro' },
  ],
  site: [
    { key: '', label: 'Tutti' },
    { key: 'pos', label: 'POS' },
    { key: 'dvr', label: 'DVR' },
    { key: 'psc', label: 'PSC' },
    { key: 'notifica_asl', label: 'Notifica ASL' },
    { key: 'durc', label: 'DURC' },
    { key: 'assicurazione', label: 'Assicurazione' },
    { key: 'altro', label: 'Altro' },
  ],
  workers: [
    { key: '', label: 'Tutti' },
    { key: 'idoneita_medica', label: 'Idoneità medica' },
    { key: 'formazione_sicurezza', label: 'Formazione sic.' },
    { key: 'antincendio', label: 'Antincendio' },
    { key: 'primo_soccorso', label: 'Primo soccorso' },
    { key: 'lavori_quota', label: 'Lavori in quota' },
    { key: 'ponteggi', label: 'Ponteggi' },
    { key: 'gruista', label: 'Gruista' },
    { key: 'patente_guida', label: 'Patente' },
    { key: 'altro', label: 'Altro' },
  ],
};

function setScope(scope, el) {
  _scope = scope; _category = ''; _query = '';
  document.getElementById('search-input').value = '';
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (el) el.classList.add('active');
  document.getElementById('topbar-title').textContent = SCOPE_LABELS[scope] || scope;
  renderFilterBar();
  loadDocs();
}

function renderFilterBar() {
  const bar = document.getElementById('filter-bar');
  const filters = CATEGORY_FILTERS[_scope] || [];
  if (filters.length === 0) { bar.innerHTML = ''; return; }
  bar.innerHTML = filters.map(f =>
    `<button class="filter-tab ${_category === f.key ? 'active' : ''}"
      onclick="setCategory('${f.key}')">${f.label}</button>`
  ).join('');
}

function setCategory(cat) {
  _category = cat;
  renderFilterBar();
  loadDocs();
}

// ── Search ────────────────────────────────────────────────────────────────────
function onSearch(val) {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(() => { _query = val.trim(); loadDocs(); }, 280);
}

// ── Alert banner ──────────────────────────────────────────────────────────────
function renderAlert() {
  const el     = document.getElementById('alert-banner');
  const scad   = _expiring.scaduti?.length || 0;
  const inScad = _expiring.in_scadenza?.length || 0;
  if (scad === 0 && inScad === 0) { el.style.display = 'none'; return; }
  el.style.display = '';
  const isRed = scad > 0;
  el.innerHTML = `
    <div class="alert-banner ${isRed ? '' : 'amber'}">
      <div class="alert-dot"></div>
      <div class="alert-text">
        ${scad > 0 ? `<strong>${scad} documento/i scaduto/i</strong>` : ''}
        ${scad > 0 && inScad > 0 ? ' · ' : ''}
        ${inScad > 0 ? `${inScad} in scadenza entro 60 giorni` : ''}
      </div>
      <button class="btn-alert-view" onclick="setScope('expiring', document.querySelector('[data-scope=expiring]'))">
        Vedi →
      </button>
    </div>`;
}

// ── Render docs ───────────────────────────────────────────────────────────────
function mimeIcon(mime) {
  if (!mime) return { icon: '📄', cls: 'other' };
  if (mime.includes('pdf'))   return { icon: '📕', cls: 'pdf' };
  if (mime.includes('image')) return { icon: '🖼️', cls: 'img' };
  if (mime.includes('word') || mime.includes('document')) return { icon: '📝', cls: 'word' };
  return { icon: '📄', cls: 'other' };
}

function fmtDate(d) {
  if (!d) return '';
  const [y, m, g] = d.split('-');
  return `${g}/${m}/${y}`;
}

function docCard(d) {
  const { icon, cls } = mimeIcon(d.mime_type);
  let badges = '';
  if (d.fonte === 'cantiere') badges += `<span class="badge badge-site">📍 ${d.cantiere || 'Cantiere'}</span>`;
  if (d.fonte === 'azienda')  badges += `<span class="badge badge-company">🏢 Aziendale</span>`;
  if (d.fonte === 'lavoratore') badges += `<span class="badge badge-worker">👷 ${d.lavoratore || 'Lavoratore'}</span>`;

  if (d.tipo) {
    const label = d.tipo.replace(/_/g, ' ');
    badges += `<span class="badge badge-company" style="text-transform:uppercase;font-size:9px">${label}</span>`;
  }

  if (d.scadenza || d.status_scadenza) {
    const st = d.status_scadenza || (d.scadenza < new Date().toISOString().slice(0,10) ? 'scaduto' : 'valido');
    const scadLabel = d.scadenza ? `Scad. ${fmtDate(d.scadenza)}` : '';
    if (st === 'scaduto')      badges += `<span class="badge badge-scaduto">⚠ SCADUTO ${scadLabel}</span>`;
    else if (st === 'in_scadenza') badges += `<span class="badge badge-in-scadenza">⏳ ${scadLabel}</span>`;
    else if (d.scadenza)       badges += `<span class="badge badge-valido">✓ ${scadLabel}</span>`;
  }

  const dateStr = d.data_caricamento ? `Caricato il ${fmtDate(d.data_caricamento)}` : '';

  return `
    <div class="doc-card">
      <div class="doc-icon ${cls}">${icon}</div>
      <div class="doc-info">
        <div class="doc-name" title="${escHtml(d.nome)}">${escHtml(d.nome)}</div>
        <div class="doc-meta">
          ${badges}
          ${dateStr ? `<span class="doc-date">${dateStr}</span>` : ''}
        </div>
      </div>
      <div class="doc-actions">
        <button class="btn-download" onclick="downloadDoc('${d.id}','${d.fonte}','${d.worker_id || ''}','${d.download_endpoint || ''}',this)">
          ${d.id.startsWith('pos_') ? 'Info' : 'Scarica'}
        </button>
      </div>
    </div>`;
}

function renderDocs() {
  const content = document.getElementById('content');
  if (_docs.length === 0) {
    content.innerHTML = `
      <div class="empty">
        <div class="empty-icon">📂</div>
        <h3>Nessun documento trovato</h3>
        <p>${_query ? `Nessun risultato per "${_query}".` : 'Non ci sono documenti in questa sezione.'}</p>
      </div>`;
    return;
  }

  // Raggruppa per fonte se scope=all
  if (_scope === 'all' && !_query && !_category) {
    const byFonte = { cantiere: [], azienda: [], lavoratore: [] };
    _docs.forEach(d => { if (byFonte[d.fonte]) byFonte[d.fonte].push(d); });
    let html = '';
    const labels = { azienda: '🏢 Aziendali', cantiere: '🏗️ Cantieri', lavoratore: '👷 Lavoratori' };
    for (const [fonte, docs] of Object.entries(byFonte)) {
      if (docs.length === 0) continue;
      html += `<div class="section-label">${labels[fonte]} (${docs.length})</div>`;
      html += docs.map(docCard).join('');
    }
    content.innerHTML = html;
  } else {
    content.innerHTML = `
      <div class="section-label">${_docs.length} documento/i</div>
      ${_docs.map(docCard).join('')}`;
  }
}

// ── Expiring view ─────────────────────────────────────────────────────────────
async function renderExpiring() {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="skel-card skeleton"></div>'.repeat(4);
  // Fetch fresh ogni volta — nessuna race condition con loadAll()
  const data = await api('GET', '/api/v1/documents/expiring?days=60');
  if (data) {
    _expiring = data;
    const total = (data.scaduti?.length || 0) + (data.in_scadenza?.length || 0);
    const badge = document.getElementById('sidebar-expiry-count');
    if (total > 0) { badge.textContent = total; badge.style.display = ''; }
    renderAlert();
  }
  const scad    = _expiring.scaduti    || [];
  const inScad  = _expiring.in_scadenza || [];

  if (scad.length === 0 && inScad.length === 0) {
    content.innerHTML = `
      <div class="empty">
        <div class="empty-icon">✅</div>
        <h3>Compliance OK</h3>
        <p>Nessun documento scaduto o in scadenza nei prossimi 60 giorni.</p>
      </div>`;
    return;
  }

  const expiringCard = (d) => {
    const giorni = d.giorni_mancanti;
    const label  = giorni < 0 ? `Scaduto da ${Math.abs(giorni)} giorni`
      : giorni === 0 ? 'Scade oggi'
      : `Scade tra ${giorni} giorni`;
    const { icon, cls } = mimeIcon(d.mime_type);
    const context = d.lavoratore
      ? `<span class="badge badge-worker">👷 ${d.lavoratore}</span>`
      : `<span class="badge badge-company">🏢 Aziendale</span>`;
    const tipoBadge = d.tipo
      ? `<span class="badge badge-company" style="text-transform:uppercase;font-size:9px">${d.tipo.replace(/_/g,' ')}</span>`
      : '';
    const statusCls = giorni < 0 ? 'badge-scaduto' : 'badge-in-scadenza';
    return `
      <div class="doc-card">
        <div class="doc-icon ${cls}">${icon}</div>
        <div class="doc-info">
          <div class="doc-name">${escHtml(d.nome)}</div>
          <div class="doc-meta">
            ${context}${tipoBadge}
            <span class="badge ${statusCls}">${label} — ${fmtDate(d.scadenza)}</span>
          </div>
        </div>
        <div class="doc-actions">
          <button class="btn-download" onclick="downloadDoc('${d.id}','${d.fonte}','${d.worker_id || ''}','${d.download_endpoint || ''}',this)">
            ${d.id.startsWith('pos_') ? 'Info' : 'Scarica'}
          </button>
        </div>
      </div>`;
  };

  let html = '';
  if (scad.length > 0) {
    html += `<div class="section-label" style="color:var(--red)">⚠ Scaduti (${scad.length})</div>`;
    html += scad.map(expiringCard).join('');
  }
  if (inScad.length > 0) {
    html += `<div class="section-label" style="color:var(--amber)">⏳ In scadenza (${inScad.length})</div>`;
    html += inScad.map(expiringCard).join('');
  }
  content.innerHTML = html;
}

// ── Download ──────────────────────────────────────────────────────────────────
async function downloadDoc(id, fonte, workerId, directUrl, btn) {
  // POS generati: non hanno endpoint API diretto — link alla pagina cantiere
  if (id.startsWith('pos_')) {
    alert('I POS generati da Palladia si scaricano dalla pagina del cantiere → sezione Documenti.');
    return;
  }
  // Attestati formazione con PDF diretto
  if (directUrl && directUrl !== 'null' && directUrl !== '') {
    const a = document.createElement('a');
    a.href = directUrl; a.target = '_blank'; a.rel = 'noopener';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    return;
  }
  btn.disabled = true; btn.textContent = '...';
  let endpoint;
  if (fonte === 'azienda')                     endpoint = `/api/v1/company-documents/${id}/download`;
  else if (fonte === 'lavoratore' && workerId) endpoint = `/api/v1/workers/${workerId}/documents/${id}/download`;
  else                                          endpoint = `/api/v1/documents/${id}/download`;

  const data = await api('GET', endpoint);
  btn.disabled = false; btn.textContent = 'Scarica';
  if (!data?.url) { alert('Impossibile ottenere il link di download.'); return; }
  const a = document.createElement('a');
  a.href = data.url; a.target = '_blank'; a.rel = 'noopener'; a.download = data.name || 'documento';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Start ─────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
