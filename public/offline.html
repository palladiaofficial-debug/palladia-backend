<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a1a">
  <title>Offline — Palladia</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{min-height:100dvh;background:#f5f3ee;color:#1a1a1a;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;font-size:18px;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
    .wrap{max-width:360px}
    .icon{font-size:48px;margin-bottom:16px}
    h1{font-size:22px;font-weight:800;margin-bottom:8px}
    p{font-size:15px;color:#6b7280;line-height:1.6;margin-bottom:24px}
    button{width:100%;padding:16px;font-size:16px;font-weight:800;color:#fff;background:#1a1a1a;border:none;border-radius:12px;cursor:pointer}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon">📶</div>
    <h1>Sei offline</h1>
    <p>Non c'è connessione a internet. Controlla il Wi-Fi o i dati mobili e riprova.</p>
    <button onclick="location.reload()">Riprova</button>
  </div>
</body>
</html>
