<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f5f3ee">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <title>Verifica Badge — Palladia</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f5f3ee;
      --surface: #ffffff;
      --border:  #e4e7ec;
      --accent:  #2563eb;
      --green:   #16a34a;
      --red:     #dc2626;
      --amber:   #d97706;
      --muted:   #6b7280;
      --subtle:  #9ca3af;
      --text:    #1a1a1a;
      --radius:  12px;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.5;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: calc(24px + env(safe-area-inset-top, 0px)) 16px calc(72px + env(safe-area-inset-bottom, 0px));
    }

    /* ── Brand ── */
    .brand-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
    }
    .brand-name {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.22em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .brand-sep { width: 1px; height: 14px; background: #d1d5db; }
    .brand-sub {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* ── Layout ── */
    .container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    /* ── Loading / error ── */
    .state-card {
      padding: 48px 24px;
      text-align: center;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .state-title { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
    .state-sub   { font-size: 13px; color: var(--muted); line-height: 1.5; }

    /* ── Status banner ── */
    .status-banner {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
    }
    .status-icon {
      width: 44px; height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .status-title {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .status-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .s-compliant     .status-icon  { background: rgba(34,197,94,.15);   color: var(--green); }
    .s-compliant     .status-title { color: var(--green); }
    .s-expiring      .status-icon  { background: rgba(245,158,11,.15);  color: var(--amber); }
    .s-expiring      .status-title { color: var(--amber); }
    .s-non_compliant .status-icon  { background: rgba(239,68,68,.15);   color: var(--red);   }
    .s-non_compliant .status-title { color: var(--red); }
    .s-incomplete    .status-icon  { background: rgba(100,116,139,.12); color: var(--muted); }
    .s-incomplete    .status-title { color: var(--muted); }
    .s-inactive      .status-icon  { background: rgba(0,0,0,.08);       color: #9ca3af; }
    .s-inactive      .status-title { color: #9ca3af; }

    /* ── Identity ── */
    .identity-card {
      display: flex;
      gap: 16px;
      padding: 18px;
      align-items: flex-start;
    }
    .worker-photo {
      width: 76px; height: 92px;
      border-radius: 8px;
      object-fit: cover;
      border: 1px solid var(--border);
      flex-shrink: 0;
    }
    .photo-placeholder {
      width: 76px; height: 92px;
      border-radius: 8px;
      border: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      color: #d1d5db;
    }
    .identity-info { flex: 1; min-width: 0; }
    .worker-name {
      font-size: 21px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 5px;
      word-break: break-word;
    }
    .worker-company {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 4px;
    }
    .worker-employer {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .tag {
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--muted);
      background: rgba(0,0,0,0.04);
    }
    .tag.sub-auth {
      border-color: rgba(37,99,235,0.35);
      color: var(--accent);
      background: rgba(37,99,235,0.07);
    }

    /* ── Section label ── */
    .section-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 2px;
    }

    /* ── Compliance docs ── */
    .doc-row {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
    }
    .doc-row:last-child { border-bottom: none; }
    .doc-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 5px;
    }
    .doc-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }
    .doc-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .doc-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .cs-ok       { background: rgba(22,163,74,.1);   color: #16a34a; }
    .cs-ok       .doc-dot { background: #16a34a; }
    .cs-expiring { background: rgba(215,119,6,.1);   color: #d97706; }
    .cs-expiring .doc-dot { background: #d97706; }
    .cs-expired  { background: rgba(220,38,38,.1);   color: #dc2626; }
    .cs-expired  .doc-dot { background: #dc2626; }
    .cs-not_set  { background: rgba(107,114,128,.1); color: #6b7280; }
    .cs-not_set  .doc-dot { background: #9ca3af; }

    .doc-detail {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }
    .doc-detail strong { color: var(--text); font-weight: 600; }
    .doc-detail .days-ok      { color: var(--green); font-weight: 600; }
    .doc-detail .days-expiring { color: var(--amber); font-weight: 700; }
    .doc-detail .days-expired  { color: var(--red);   font-weight: 700; }

    /* ── Field rows (dettagli impiego) ── */
    .field-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      padding: 11px 18px;
      border-bottom: 1px solid var(--border);
    }
    .field-row:last-child { border-bottom: none; }
    .field-label {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      flex-shrink: 0;
    }
    .field-value {
      font-size: 13px;
      color: var(--text);
      text-align: right;
      word-break: break-word;
    }
    .field-value.active   { color: var(--green); font-weight: 700; }
    .field-value.inactive { color: var(--red);   font-weight: 700; }

    /* ── Autenticità badge ── */
    .auth-card { padding: 16px 18px; }
    .auth-code-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .auth-code {
      font-family: 'Courier New', Courier, monospace;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.08em;
      word-break: break-all;
      margin-bottom: 8px;
    }
    .auth-hint {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }

    /* ── Link Area Lavoratore ── */
    .area-link-card {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 18px; cursor: pointer;
      transition: background 0.15s;
      text-decoration: none; color: inherit;
    }
    .area-link-card:hover { background: rgba(37,99,235,0.03); }
    .area-link-icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: var(--text); color: #fff;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .area-link-info { flex: 1; }
    .area-link-title { font-size: 14px; font-weight: 700; color: var(--text); }
    .area-link-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .area-link-arrow { color: var(--subtle); flex-shrink: 0; }

    /* ── Pulsante visualizza documento ── */
    .btn-view-doc {
      font-size: 12px; font-weight: 600; color: var(--accent);
      background: rgba(37,99,235,0.08); border: 1px solid rgba(37,99,235,0.25);
      border-radius: 6px; padding: 10px 14px; cursor: pointer;
      flex-shrink: 0; white-space: nowrap; transition: background 0.15s;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .btn-view-doc:hover:not(:disabled) { background: rgba(37,99,235,0.15); }
    .btn-view-doc:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Footer ── */
    .page-footer {
      margin-top: 24px;
      text-align: center;
      font-size: 12px;
      color: #9ca3af;
      line-height: 1.8;
    }
    .verify-ts {
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="brand-bar">
    <div class="brand-name" style="display:flex;align-items:center;gap:6px">PALLADIA</div>
    <div class="brand-sep"></div>
    <div class="brand-sub">Verifica Badge Lavoratore</div>
  </div>

  <div class="container" id="container">
    <div class="card state-card" id="loading-state">
      <div class="spinner"></div>
      <div class="state-title">Verifica in corso…</div>
      <div class="state-sub">Recupero dati badge dall'archivio Palladia</div>
    </div>
  </div>

  <div class="page-footer">
    Palladia · Registro Presenze Digitale · D.Lgs. 81/2008
    <div class="verify-ts" id="ts"></div>
  </div>

  <script>
    function esc(str) {
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function formatDate(iso) {
      if (!iso) return null;
      try {
        return new Date(iso).toLocaleDateString('it-IT', {
          day: '2-digit', month: 'long', year: 'numeric',
        });
      } catch { return iso; }
    }

    function daysFromNow(iso) {
      if (!iso) return null;
      return Math.floor((new Date(iso) - Date.now()) / 86_400_000);
    }

    function formatCode(code) {
      if (!code) return '';
      return code.replace(/(.{6})/g, '$1-').replace(/-$/, '');
    }

    function getBadgeCodeFromUrl() {
      const parts = window.location.pathname.split('/').filter(Boolean);
      const idx = parts.indexOf('badge');
      return idx !== -1 ? (parts[idx + 1] || '') : '';
    }

    function parseDobFromCf(cf) {
      if (!cf || cf.length < 11) return null;
      try {
        const MONTHS = { A:1,B:2,C:3,D:4,E:5,H:6,L:7,M:8,P:9,R:10,S:11,T:12 };
        const yy    = parseInt(cf.substring(6, 8), 10);
        const month = MONTHS[cf.charAt(8).toUpperCase()];
        let   day   = parseInt(cf.substring(9, 11), 10);
        if (!month || isNaN(day) || isNaN(yy)) return null;
        if (day > 40) day -= 40;
        const currentYY = new Date().getFullYear() % 100;
        const fullYear  = yy > currentYY ? 1900 + yy : 2000 + yy;
        return new Date(fullYear, month - 1, day)
          .toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' });
      } catch { return null; }
    }

    function parseSexFromCf(cf) {
      if (!cf || cf.length < 11) return null;
      try {
        const day = parseInt(cf.substring(9, 11), 10);
        if (isNaN(day)) return null;
        return day > 40 ? 'F' : 'M';
      } catch { return null; }
    }

    const STATUS_CFG = {
      compliant:     { icon: '✓', title: 'Lavoratore Conforme',      sub: 'Tutti i documenti di sicurezza sono validi e aggiornati' },
      expiring:      { icon: '⚠', title: 'Documenti in Scadenza',    sub: 'Uno o più documenti stanno per scadere — verificare il rinnovo' },
      non_compliant: { icon: '✗', title: 'Documenti Non Conformi',   sub: 'Uno o più documenti risultano scaduti — lavoratore non conforme D.Lgs. 81/2008' },
      incomplete:    { icon: '○', title: 'Documentazione Incompleta', sub: 'Alcuni documenti non sono stati ancora registrati nel sistema' },
      inactive:      { icon: '—', title: 'Badge Disattivato',         sub: 'Il lavoratore è stato disattivato dall\'azienda' },
    };

    const DOC_CFG = {
      ok:       { cls: 'cs-ok',       label: 'Valida'       },
      expiring: { cls: 'cs-expiring', label: 'In scadenza'  },
      expired:  { cls: 'cs-expired',  label: 'Scaduta'      },
      not_set:  { cls: 'cs-not_set',  label: 'Non inserita' },
    };

    function docBadge(status) {
      const { cls, label } = DOC_CFG[status] || DOC_CFG.not_set;
      return `<span class="doc-badge ${cls}"><span class="doc-dot"></span>${esc(label)}</span>`;
    }

    function docDetail(expiryIso, status) {
      if (!expiryIso) {
        return `<div class="doc-detail">Data di scadenza non registrata nel sistema</div>`;
      }
      const days = daysFromNow(expiryIso);
      const dateStr = formatDate(expiryIso);

      if (status === 'expired') {
        const ago = Math.abs(days);
        return `<div class="doc-detail">
          Scaduta il <strong>${dateStr}</strong>
          <span class="days-expired"> · scaduta da ${ago} giorn${ago === 1 ? 'o' : 'i'}</span>
        </div>`;
      }
      if (status === 'expiring') {
        return `<div class="doc-detail">
          Scade il <strong>${dateStr}</strong>
          <span class="days-expiring"> · tra ${days} giorn${days === 1 ? 'o' : 'i'}</span>
        </div>`;
      }
      if (status === 'ok') {
        return `<div class="doc-detail">
          Valida fino al <strong>${dateStr}</strong>
          <span class="days-ok"> · ancora ${days} giorn${days === 1 ? 'o' : 'i'}</span>
        </div>`;
      }
      return '';
    }

    function renderError(title, sub) {
      document.getElementById('container').innerHTML = `
        <div class="card state-card">
          <div style="margin-bottom:14px;"><svg style="width:36px;height:36px;stroke:var(--amber);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
          <div class="state-title">${esc(title)}</div>
          <div class="state-sub">${esc(sub)}</div>
          <button onclick="location.reload()" style="margin-top:18px;padding:14px 28px;font-size:16px;font-weight:700;background:var(--text);color:#fff;border:none;border-radius:10px;cursor:pointer;min-height:48px;">Riprova</button>
        </div>`;
    }

    const DOC_LABELS = {
      idoneita_medica:      'Idoneità medica',
      formazione_sicurezza: 'Formazione sicurezza',
      primo_soccorso:       'Primo soccorso',
      antincendio:          'Antincendio',
      lavori_quota:         'Lavori in quota',
      ponteggi:             'Ponteggi',
      gruista:              'Gruista',
      pes_pav_pei:          'PES / PAV / PEI',
      rspp:                 'RSPP',
      patente_guida:        'Patente di guida',
      altro:                'Documento',
    };
    const _bic = (d) => `<svg style="width:15px;height:15px;display:inline-block;vertical-align:middle;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24">${d}</svg>`;
    const DOC_ICONS = {
      idoneita_medica:      _bic('<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>'),
      formazione_sicurezza: _bic('<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>'),
      primo_soccorso:       _bic('<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>'),
      antincendio:          _bic('<path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>'),
      lavori_quota:         _bic('<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>'),
      ponteggi:             _bic('<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>'),
      gruista:              _bic('<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>'),
      pes_pav_pei:          _bic('<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>'),
      rspp:                 _bic('<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>'),
      patente_guida:        _bic('<rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 3v4h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>'),
      altro:                _bic('<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>'),
    };

    function renderDocSection(d) {
      let rows = '';

      if (d.documents && d.documents.length > 0) {
        rows = d.documents.map(doc => {
          const label  = DOC_LABELS[doc.doc_type] || doc.name || doc.doc_type;
          const icon   = DOC_ICONS[doc.doc_type]  || '📄';
          const expTxt = doc.expiry_date
            ? `Scad. ${new Date(doc.expiry_date).toLocaleDateString('it-IT')}`
            : '';
          const viewBtn = doc.has_file
            ? `<button class="btn-view-doc"
                 onclick="viewDocument('${esc(d.badge_code)}','${esc(doc.id)}',this)">
                 👁 Visualizza
               </button>`
            : '';
          return `<div class="doc-row">
            <div class="doc-header">
              <span class="doc-name">${icon}&nbsp;${esc(label)}</span>
              ${viewBtn}
            </div>
            ${expTxt ? `<div class="doc-detail">${expTxt}</div>` : ''}
          </div>`;
        }).join('');
      } else {
        // Fallback ai campi legacy sul record worker
        const safetyExp = d.safety_training_expiry
          ? `<div class="doc-detail">Scad. ${formatDate(d.safety_training_expiry)}</div>`
          : `<div class="doc-detail">Data non registrata</div>`;
        const healthExp = d.health_fitness_expiry
          ? `<div class="doc-detail">Scad. ${formatDate(d.health_fitness_expiry)}</div>`
          : `<div class="doc-detail">Data non registrata</div>`;
        rows = `
          <div class="doc-row">
            <div class="doc-header"><span class="doc-name">${DOC_ICONS.formazione_sicurezza}&nbsp;Formazione Sicurezza</span></div>
            ${safetyExp}
          </div>
          <div class="doc-row">
            <div class="doc-header"><span class="doc-name">${DOC_ICONS.idoneita_medica}&nbsp;Sorveglianza Sanitaria</span></div>
            ${healthExp}
          </div>`;
      }

      return `
        <div class="section-label">Documenti di sicurezza · D.Lgs. 81/2008</div>
        <div class="card">${rows}</div>`;
    }

    async function viewDocument(badgeCode, docId, btn) {
      btn.disabled = true;
      const orig   = btn.innerHTML;
      btn.innerHTML = '…';
      try {
        const resp = await fetch(`/api/v1/badge/${badgeCode}/document/${docId}`);
        const body = await resp.json();
        if (!resp.ok) throw new Error(body.error || 'Errore');
        window.open(body.url, '_blank', 'noopener');
      } catch {
        alert('Impossibile aprire il documento. Riprova.');
      }
      btn.disabled = false;
      btn.innerHTML = orig;
    }

    function renderBadge(d) {
      const code = formatCode(d.badge_code);

      const photoHtml = d.photo_url
        ? `<img src="${esc(d.photo_url)}" alt="Foto lavoratore" class="worker-photo">`
        : `<div class="photo-placeholder"><svg style="width:40px;height:40px;stroke:#d1d5db;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>`;

      const showEmployer = d.employer_name && d.employer_name !== d.company_name;

      const dob      = parseDobFromCf(d.fiscal_code);
      const sex      = parseSexFromCf(d.fiscal_code);
      const sexLabel = sex === 'M' ? 'Maschio' : sex === 'F' ? 'Femmina' : null;

      const tags = [
        d.qualification      ? `<span class="tag">${esc(d.qualification)}</span>`         : '',
        d.role               ? `<span class="tag">${esc(d.role)}</span>`                  : '',
        d.subcontracting_auth ? `<span class="tag sub-auth">&#10003; Subappalto autorizzato</span>` : '',
      ].filter(Boolean).join('');

      const fieldRows = [
        dob
          ? `<div class="field-row"><span class="field-label">Data di nascita</span><span class="field-value">${esc(dob)}</span></div>`
          : '',
        d.birth_place
          ? `<div class="field-row"><span class="field-label">Luogo di nascita</span><span class="field-value">${esc(d.birth_place)}</span></div>`
          : '',
        sexLabel
          ? `<div class="field-row"><span class="field-label">Sesso</span><span class="field-value">${esc(sexLabel)}</span></div>`
          : '',
        d.fiscal_code
          ? `<div class="field-row"><span class="field-label">Codice fiscale</span><span class="field-value" style="font-family:monospace;letter-spacing:0.04em">${esc(d.fiscal_code.toUpperCase())}</span></div>`
          : '',
        d.company_name
          ? `<div class="field-row"><span class="field-label">Gestione presenze</span><span class="field-value">${esc(d.company_name)}</span></div>`
          : '',
        showEmployer
          ? `<div class="field-row"><span class="field-label">Impresa esecutrice</span><span class="field-value">${esc(d.employer_name)}</span></div>`
          : '',
        d.hire_date
          ? `<div class="field-row"><span class="field-label">Assunto il</span><span class="field-value">${esc(formatDate(d.hire_date))}</span></div>`
          : '',
        d.issued_at
          ? `<div class="field-row"><span class="field-label">Badge emesso il</span><span class="field-value">${esc(formatDate(d.issued_at))}</span></div>`
          : '',
        `<div class="field-row">
           <span class="field-label">Stato lavoratore</span>
           <span class="field-value ${d.is_active ? 'active' : 'inactive'}">${d.is_active ? '● Attivo' : '● Inattivo'}</span>
         </div>`,
      ].filter(Boolean).join('');

      document.getElementById('container').innerHTML = `

        <!-- Identità lavoratore -->
        <div class="card">
          <div class="identity-card">
            ${photoHtml}
            <div class="identity-info">
              <div class="worker-name">${esc(d.full_name)}</div>
              ${d.company_name ? `<div class="worker-company">${esc(d.company_name)}</div>` : ''}
              ${showEmployer   ? `<div class="worker-employer">Impresa: ${esc(d.employer_name)}</div>` : ''}
              ${tags ? `<div class="tag-row">${tags}</div>` : ''}
            </div>
          </div>
        </div>

        ${renderDocSection(d)}

        <!-- Dettagli impiego -->
        <div class="section-label">Dettagli impiego</div>
        <div class="card">${fieldRows}</div>

        <!-- Autenticità badge -->
        <div class="section-label">Autenticità badge</div>
        <div class="card auth-card">
          <div class="auth-code-label">Codice univoco anticontraffazione</div>
          <div class="auth-code">${esc(code)}</div>
          <div class="auth-hint">
            Codice univoco generato da Palladia e stampato sul badge fisico.<br>
            Corrisponde al QR code scansionato. Non replicabile.
          </div>
        </div>`;

      const ts = document.getElementById('ts');
      if (ts) {
        ts.textContent = 'Verificato il ' + new Date().toLocaleString('it-IT', {
          day: '2-digit', month: 'long', year: 'numeric',
          hour: '2-digit', minute: '2-digit',
        });
      }
    }

    async function main() {
      const code = getBadgeCodeFromUrl();
      if (!code || !/^[A-Fa-f0-9]{18}$/.test(code)) {
        renderError('Codice non valido', 'Il link a questo badge non è corretto o è stato modificato.');
        return;
      }

      const apiBase = window.location.origin;
      let data;
      try {
        const resp = await fetch(`${apiBase}/api/v1/badge/${code}`, {
          headers: { 'Accept': 'application/json' },
        });
        if (resp.status === 404) {
          renderError('Badge non trovato', 'Il codice non corrisponde a nessun lavoratore nell\'archivio Palladia.');
          return;
        }
        if (resp.status === 429) {
          renderError('Troppe richieste', 'Riprova tra un minuto.');
          return;
        }
        if (!resp.ok) {
          renderError('Errore del server', 'Impossibile verificare il badge in questo momento. Riprova più tardi.');
          return;
        }
        data = await resp.json();
      } catch {
        renderError('Errore di rete', 'Impossibile contattare il server Palladia. Verifica la connessione.');
        return;
      }

      renderBadge(data);

      // Link all'Area Lavoratore protetta (accesso con CF)
      const container = document.getElementById('container');
      if (container) {
        container.insertAdjacentHTML('beforeend', `
          <div class="section-label">Area personale</div>
          <div class="card">
            <a href="/lavoratore/${esc(code)}" class="area-link-card">
              <div class="area-link-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </div>
              <div class="area-link-info">
                <div class="area-link-title">Area Lavoratore</div>
                <div class="area-link-sub">Timbrature, buste paga e documenti</div>
              </div>
              <div class="area-link-arrow">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
              </div>
            </a>
          </div>`);
      }
    }

    main().catch(function (err) {
      console.error('[badge] main() failed:', err);
      renderError('Errore imprevisto', 'Si è verificato un errore. Riprova tra qualche istante.');
    });
  </script>
</body>
</html>
