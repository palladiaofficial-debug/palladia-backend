<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portale Verifiche Sicurezza — Palladia</title>
  <style>
    :root {
      --bg:           #0d0f18;
      --surface:      #13162a;
      --surface2:     #1c2038;
      --surface3:     #242848;
      --border:       #2a2f4e;
      --border-light: #363c5c;
      --text:         #dce4f5;
      --text-muted:   #8892b0;
      --text-dim:     #4a5278;
      --accent:       #3b82f6;
      --accent-dim:   #1e3a6e;
      --green-bg:     #052912;
      --green-border: #166534;
      --green-text:   #4ade80;
      --yellow-bg:    #1a1000;
      --yellow-border:#78350f;
      --yellow-text:  #fbbf24;
      --red-bg:       #1a0505;
      --red-border:   #7f1d1d;
      --red-text:     #f87171;
      --gray-bg:      #111420;
      --gray-border:  #2a2f4e;
      --gray-text:    #6b7280;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --radius: 8px;
      --radius-sm: 5px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 15px; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }

    .page { max-width: 720px; margin: 0 auto; padding: 0 16px 80px; }

    /* Header */
    .site-header { border-bottom: 1px solid var(--border); padding: 20px 0 16px; margin-bottom: 24px; }
    .site-header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .brand { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); }
    .portal-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
    .site-name { font-size: 22px; font-weight: 700; color: var(--text); line-height: 1.2; }
    .site-address { font-size: 13px; color: var(--text-muted); margin-top: 3px; }
    .coordinator-info { display: flex; gap: 16px; margin-top: 12px; flex-wrap: wrap; }
    .coordinator-info span { font-size: 12px; color: var(--text-muted); }
    .coordinator-info strong { color: var(--text); font-weight: 600; }

    /* Cards */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 14px; }
    .card-title { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 14px; }

    /* Status Block */
    .status-card { border-radius: var(--radius); padding: 22px 20px; margin-bottom: 14px; border: 1px solid; }
    .status-card.conforme     { background: var(--green-bg);  border-color: var(--green-border); }
    .status-card.attenzione   { background: var(--yellow-bg); border-color: var(--yellow-border); }
    .status-card.critico      { background: var(--red-bg);    border-color: var(--red-border); }
    .status-card.insufficiente{ background: var(--gray-bg);   border-color: var(--gray-border); }
    .status-indicator { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .status-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .conforme   .status-dot { background: var(--green-text);  box-shadow: 0 0 8px var(--green-text); }
    .attenzione .status-dot { background: var(--yellow-text); box-shadow: 0 0 8px var(--yellow-text); }
    .critico    .status-dot { background: var(--red-text);    box-shadow: 0 0 8px var(--red-text); }
    .insufficiente .status-dot { background: var(--gray-text); }
    .status-level { font-size: 18px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
    .conforme   .status-level { color: var(--green-text); }
    .attenzione .status-level { color: var(--yellow-text); }
    .critico    .status-level { color: var(--red-text); }
    .insufficiente .status-level { color: var(--gray-text); }
    .status-label { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
    .conforme   .status-label { color: var(--green-text); }
    .attenzione .status-label { color: var(--yellow-text); }
    .critico    .status-label { color: var(--red-text); }
    .insufficiente .status-label { color: var(--gray-text); }
    .status-reasons { list-style: none; margin-top: 8px; }
    .status-reasons li { font-size: 13px; color: var(--text-muted); padding: 2px 0; }
    .status-reasons li::before { content: '— '; color: var(--text-dim); }
    .status-last-check { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-dim); }

    /* Issues */
    .issue-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .issue-item:last-child { border-bottom: none; padding-bottom: 0; }
    .issue-item:first-child { padding-top: 0; }
    .issue-severity { flex-shrink: 0; width: 6px; border-radius: 3px; background: var(--border); }
    .issue-severity.critica { background: var(--red-text); }
    .issue-severity.alta    { background: #f97316; }
    .issue-severity.media   { background: var(--yellow-text); }
    .issue-severity.bassa   { background: #60a5fa; }
    .issue-body { flex: 1; min-width: 0; }
    .issue-title { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .issue-meta { display: flex; gap: 8px; margin-top: 3px; flex-wrap: wrap; align-items: center; }
    .issue-meta span { font-size: 11px; color: var(--text-muted); }
    .badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
    .badge-critica { background: var(--red-bg);    color: var(--red-text);    border: 1px solid var(--red-border); }
    .badge-alta    { background: #1a0a00;           color: #f97316;            border: 1px solid #7c2d12; }
    .badge-media   { background: var(--yellow-bg);  color: var(--yellow-text); border: 1px solid var(--yellow-border); }
    .badge-bassa   { background: var(--accent-dim); color: #93c5fd;            border: 1px solid #1e40af; }
    .badge-nc      { background: var(--surface2);   color: var(--text-muted);  border: 1px solid var(--border); }

    /* Presenze */
    .presence-summary { display: flex; gap: 20px; margin-bottom: 14px; flex-wrap: wrap; }
    .presence-stat { text-align: center; }
    .presence-stat-num { font-size: 28px; font-weight: 700; line-height: 1; color: var(--text); }
    .presence-stat-num.alert { color: var(--yellow-text); }
    .presence-stat-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .worker-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .worker-row:last-child { border-bottom: none; }
    .worker-status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .worker-status-dot.in_cantiere { background: var(--green-text); }
    .worker-status-dot.uscito      { background: var(--text-dim); }
    .worker-name { flex: 1; color: var(--text); }
    .worker-time { font-size: 11px; color: var(--text-muted); }

    /* Documents */
    .doc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; margin-bottom: 12px; }
    .doc-item { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 10px 8px; text-align: center; }
    .doc-item-name { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .doc-item-count { font-size: 20px; font-weight: 700; color: var(--text); margin-top: 4px; }
    .doc-missing { padding: 8px 12px; background: var(--yellow-bg); border: 1px solid var(--yellow-border); border-radius: var(--radius-sm); font-size: 12px; color: var(--yellow-text); }

    /* Actions */
    .actions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .action-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; padding: 16px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; text-align: center; color: var(--text); font-family: var(--font); transition: border-color 0.15s, background 0.15s; }
    .action-btn:hover { border-color: var(--accent); background: var(--surface2); }
    .action-btn.primary { grid-column: 1 / -1; background: var(--accent-dim); border-color: var(--accent); flex-direction: row; justify-content: center; gap: 10px; }
    .action-btn.primary:hover { background: #1d3a6e; }
    .action-btn-icon { font-size: 20px; line-height: 1; }
    .action-btn-label { font-size: 12px; font-weight: 600; color: var(--text); }
    .action-btn.primary .action-btn-label { font-size: 14px; font-weight: 700; color: #93c5fd; }
    .action-btn-desc { font-size: 11px; color: var(--text-muted); line-height: 1.3; }

    /* Timeline */
    .timeline { position: relative; padding-left: 20px; }
    .timeline::before { content: ''; position: absolute; left: 6px; top: 6px; bottom: 0; width: 1px; background: var(--border); }
    .timeline-item { position: relative; padding-bottom: 20px; }
    .timeline-item::before { content: ''; position: absolute; left: -17px; top: 6px; width: 9px; height: 9px; border-radius: 50%; background: var(--surface); border: 2px solid var(--border); }
    .timeline-item.verifica::before   { border-color: var(--accent); background: var(--accent); }
    .timeline-item.nc_aperta::before  { border-color: var(--red-text); background: var(--red-bg); }
    .timeline-item.nc_risolta::before { border-color: var(--green-text); background: var(--green-bg); }
    .timeline-item.nc_chiusa::before  { border-color: var(--green-text); background: var(--green-text); }
    .timeline-item.nota::before       { border-color: var(--text-dim); }
    .timeline-date { font-size: 11px; color: var(--text-dim); margin-bottom: 2px; }
    .timeline-type { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); margin-bottom: 2px; }
    .timeline-title { font-size: 13px; color: var(--text); }
    .timeline-verif-box { margin-top: 6px; padding: 8px 10px; background: var(--surface2); border-radius: var(--radius-sm); font-size: 12px; }
    .status-pill { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .status-pill.conforme     { background: var(--green-bg);  color: var(--green-text);  border: 1px solid var(--green-border); }
    .status-pill.attenzione   { background: var(--yellow-bg); color: var(--yellow-text); border: 1px solid var(--yellow-border); }
    .status-pill.critico      { background: var(--red-bg);    color: var(--red-text);    border: 1px solid var(--red-border); }
    .status-pill.dati_insufficienti { background: var(--gray-bg); color: var(--gray-text); border: 1px solid var(--gray-border); }
    .timeline-note { font-size: 12px; color: var(--text-muted); margin-top: 4px; font-style: italic; }

    /* Collapsible */
    .section-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
    .section-header .toggle-icon { font-size: 11px; color: var(--text-dim); transition: transform 0.15s; }
    .section-header.collapsed .toggle-icon { transform: rotate(-90deg); }

    /* Empty */
    .empty { text-align: center; padding: 20px 0; color: var(--text-dim); font-size: 13px; }

    /* Divider */
    .divider { height: 1px; background: var(--border); margin: 6px 0 14px; }

    /* Loader */
    .loader { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 14px; color: var(--text-muted); font-size: 14px; }
    .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error */
    .error-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 12px; text-align: center; padding: 32px; }
    .error-icon { font-size: 40px; }
    .error-title { font-size: 18px; font-weight: 700; color: var(--text); }
    .error-desc  { font-size: 14px; color: var(--text-muted); max-width: 340px; }

    /* Modals */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; align-items: flex-end; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border-light); border-radius: var(--radius) var(--radius) 0 0; padding: 24px 20px 32px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
    @media (min-width: 520px) { .modal-overlay { align-items: center; } .modal { border-radius: var(--radius); } }
    .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 18px; color: var(--text); }
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); margin-bottom: 6px; }
    .form-input, .form-textarea, .form-select { width: 100%; background: var(--surface2); border: 1px solid var(--border-light); border-radius: var(--radius-sm); color: var(--text); font-family: var(--font); font-size: 14px; padding: 10px 12px; outline: none; transition: border-color 0.15s; }
    .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--accent); }
    .form-textarea { min-height: 90px; resize: vertical; }
    .form-select option { background: var(--surface2); }
    .modal-status-preview { display: flex; align-items: center; gap: 10px; padding: 12px; border-radius: var(--radius-sm); margin-bottom: 16px; border: 1px solid; }
    .modal-status-preview.conforme   { background: var(--green-bg);  border-color: var(--green-border); }
    .modal-status-preview.attenzione { background: var(--yellow-bg); border-color: var(--yellow-border); }
    .modal-status-preview.critico    { background: var(--red-bg);    border-color: var(--red-border); }
    .modal-status-preview.insufficiente { background: var(--gray-bg); border-color: var(--gray-border); }
    .btn-row { display: flex; gap: 10px; margin-top: 18px; }
    .btn { flex: 1; padding: 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 14px; font-weight: 600; cursor: pointer; font-family: var(--font); transition: background 0.15s; }
    .btn:hover { background: var(--surface3); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.primary:hover { background: #2563eb; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .form-error { font-size: 12px; color: var(--red-text); margin-top: 6px; }

    /* Toast */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--surface3); border: 1px solid var(--border-light); color: var(--text); padding: 10px 20px; border-radius: 6px; font-size: 13px; z-index: 200; display: none; white-space: nowrap; }
    .toast.show { display: block; }
    .toast.success { border-color: var(--green-border); color: var(--green-text); }
    .toast.error   { border-color: var(--red-border);   color: var(--red-text); }

    /* Disclaimer */
    .disclaimer { margin-top: 40px; padding: 16px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); font-size: 11px; color: var(--text-dim); line-height: 1.6; }
    .disclaimer strong { color: var(--text-muted); }
  </style>
</head>
<body>

<div id="app">
  <div class="loader"><div class="spinner"></div><span>Caricamento portale sicurezza…</span></div>
</div>

<div class="toast" id="toast"></div>

<!-- Modal: Conferma Verifica -->
<div class="modal-overlay" id="modal-verifica">
  <div class="modal">
    <div class="modal-title">Conferma verifica cantiere</div>
    <div id="verifica-status-preview"></div>
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px">
      Il sistema acquisirà uno snapshot dello stato documentale, delle non conformità e delle presenze attuali.
      Il record è immutabile e costituisce traccia della verifica effettuata.
    </p>
    <div class="form-group">
      <label class="form-label">Nota (opzionale)</label>
      <textarea class="form-textarea" id="verifica-note" placeholder="Osservazioni, condizioni rilevate, elementi controllati…"></textarea>
    </div>
    <div class="btn-row">
      <button class="btn" onclick="closeModal('modal-verifica')">Annulla</button>
      <button class="btn primary" id="btn-verifica" onclick="submitVerifica()">Conferma e registra</button>
    </div>
  </div>
</div>

<!-- Modal: Segnala NC -->
<div class="modal-overlay" id="modal-nc">
  <div class="modal">
    <div class="modal-title">Segnala non conformità</div>
    <div class="form-group">
      <label class="form-label">Titolo *</label>
      <input class="form-input" id="nc-title" type="text" placeholder="Descrizione sintetica del problema" maxlength="300">
      <div class="form-error" id="nc-title-err" style="display:none"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Descrizione *</label>
      <textarea class="form-textarea" id="nc-desc" placeholder="Descrivere in dettaglio la non conformità rilevata" maxlength="3000"></textarea>
      <div class="form-error" id="nc-desc-err" style="display:none"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="form-group">
        <label class="form-label">Gravità</label>
        <select class="form-select" id="nc-severity">
          <option value="media">Media</option>
          <option value="bassa">Bassa</option>
          <option value="alta">Alta</option>
          <option value="critica">Critica</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Categoria</label>
        <select class="form-select" id="nc-category">
          <option value="sicurezza">Sicurezza</option>
          <option value="documentale">Documentale</option>
          <option value="operativa">Operativa</option>
          <option value="igiene">Igiene</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Scadenza risoluzione (opzionale)</label>
      <input class="form-input" id="nc-due" type="date">
    </div>
    <div class="btn-row">
      <button class="btn" onclick="closeModal('modal-nc')">Annulla</button>
      <button class="btn primary" id="btn-nc" onclick="submitNC()">Segnala NC</button>
    </div>
  </div>
</div>

<!-- Modal: Aggiungi Nota -->
<div class="modal-overlay" id="modal-nota">
  <div class="modal">
    <div class="modal-title">Aggiungi nota di verifica</div>
    <div class="form-group">
      <label class="form-label">Tipo</label>
      <select class="form-select" id="nota-type">
        <option value="observation">Osservazione</option>
        <option value="request">Richiesta</option>
        <option value="approval">Approvazione</option>
        <option value="warning">Avvertenza</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Contenuto *</label>
      <textarea class="form-textarea" id="nota-content" placeholder="Testo della nota (min. 3 caratteri)" maxlength="2000"></textarea>
      <div class="form-error" id="nota-err" style="display:none"></div>
    </div>
    <div class="btn-row">
      <button class="btn" onclick="closeModal('modal-nota')">Annulla</button>
      <button class="btn primary" id="btn-nota" onclick="submitNota()">Salva nota</button>
    </div>
  </div>
</div>

<script>
'use strict';

const token = (window.location.pathname.match(/\/coordinator\/([0-9a-f]{64})/i)||[])[1];
const API   = window.location.origin;

let siteData      = null;
let verifications = [];

function esc(s) {
  return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function fmtDateTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+d.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
}
function fmtTime(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
}
function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show '+(type||'');
  setTimeout(()=>{ el.className='toast'; }, 3200);
}
function openModal(id)  { document.getElementById(id).classList.add('open');    document.body.style.overflow='hidden'; }
function closeModal(id) { document.getElementById(id).classList.remove('open'); document.body.style.overflow=''; }
function toggleSection(hdr, bodyId) {
  const body = document.getElementById(bodyId);
  if (!body) return;
  const c = hdr.classList.toggle('collapsed');
  body.style.display = c ? 'none' : '';
}

async function apiFetch(path, opts) {
  const r = await fetch(API+path, { headers:{'Content-Type':'application/json'}, ...(opts||{}) });
  const b = await r.json();
  if (!r.ok) throw Object.assign(new Error(b.error||'Errore'),{status:r.status});
  return b;
}

async function load() {
  if (!token) { renderError('Link non valido','Questo link di accesso non è valido.'); return; }
  try {
    const [data, verifs] = await Promise.all([
      apiFetch(`/api/v1/coordinator/${token}`),
      apiFetch(`/api/v1/coordinator/${token}/verifications`),
    ]);
    siteData = data;
    verifications = verifs;
    render();
  } catch(e) {
    if (e.status===404) renderError('Link scaduto o non valido','Questo link di accesso è scaduto o è stato revocato. Richiedilo di nuovo all\'impresa.');
    else renderError('Errore di caricamento','Impossibile caricare i dati. Riprova tra qualche istante.');
  }
}

function render() {
  const { site, invite, safety_status, active_issues, today_presences, document_status } = siteData;
  document.title = esc(site.name)+' — Portale Verifiche Palladia';
  document.getElementById('app').innerHTML =
    renderHeader(site, invite) +
    '<div class="page">' +
    renderStatusCard(safety_status) +
    renderActiveIssues(active_issues||[]) +
    renderTodayPresences(today_presences) +
    renderDocuments(document_status) +
    renderActions(safety_status) +
    renderTimeline() +
    renderDisclaimer() +
    '</div>';
}

function renderHeader(site, invite) {
  const exp = new Date(invite.expires_at);
  const expStr = exp.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'});
  const expiring = (exp - Date.now()) < 14*86400000;
  return `<div class="page"><div class="site-header">
    <div class="site-header-top"><span class="brand">Palladia</span><span class="portal-label">Portale Verifiche Sicurezza</span></div>
    <div class="site-name">${esc(site.name)}</div>
    ${site.address ? `<div class="site-address">${esc(site.address)}</div>` : ''}
    <div class="coordinator-info">
      <span>Coordinatore: <strong>${esc(invite.coordinator_name)}</strong></span>
      ${invite.coordinator_company ? `<span>Azienda: <strong>${esc(invite.coordinator_company)}</strong></span>` : ''}
      <span style="${expiring?'color:var(--yellow-text)':''}">Accesso valido fino: <strong>${expStr}</strong></span>
    </div>
  </div></div>`;
}

function renderStatusCard(ss) {
  if (!ss) ss = { level:'dati_insufficienti', label:'Dati insufficienti', reasons:['Dati non disponibili.'] };
  const cls = ss.level === 'dati_insufficienti' ? 'insufficiente' : ss.level;
  const icons = { conforme:'●', attenzione:'▲', critico:'■', dati_insufficienti:'○' };
  const icon  = icons[ss.level] || '○';
  const lastV = verifications[0];
  const lastStr = lastV ? `Ultima verifica registrata: ${fmtDateTime(lastV.created_at)}` : 'Nessuna verifica formale registrata';
  return `
    <div class="card-title">Stato sicurezza cantiere</div>
    <div class="status-card ${cls}">
      <div class="status-indicator">
        <div class="status-dot"></div>
        <div class="status-level">${icon} ${ss.level.replace('_',' ').toUpperCase()}</div>
      </div>
      <div class="status-label">${esc(ss.label)}</div>
      ${ss.reasons&&ss.reasons.length ? `<ul class="status-reasons">${ss.reasons.map(r=>`<li>${esc(r)}</li>`).join('')}</ul>` : ''}
      <div class="status-last-check">${lastStr}</div>
    </div>`;
}

function renderActiveIssues(issues) {
  const sevL = {critica:'Critica',alta:'Alta',media:'Media',bassa:'Bassa'};
  const catL = {sicurezza:'Sicurezza',documentale:'Documentale',operativa:'Operativa',igiene:'Igiene'};
  if (!issues.length) return `<div class="card"><div class="card-title">Problemi attivi</div><div class="empty">Nessun problema attivo rilevato nei dati registrati</div></div>`;
  return `
    <div class="card">
      <div class="section-header" onclick="toggleSection(this,'issues-body')">
        <div class="card-title" style="margin-bottom:0">Problemi attivi <span style="color:var(--red-text)">(${issues.length})</span></div>
        <span class="toggle-icon">▼</span>
      </div>
      <div id="issues-body" style="margin-top:14px">
        ${issues.map(i => {
          if (i.type==='nc') return `
            <div class="issue-item">
              <div class="issue-severity ${i.severity}"></div>
              <div class="issue-body">
                <div class="issue-title">${esc(i.title)}</div>
                <div class="issue-meta">
                  <span class="badge badge-${i.severity}">${sevL[i.severity]||i.severity}</span>
                  <span class="badge badge-nc">${catL[i.category]||i.category}</span>
                  <span>${i.age_days===0?'Oggi':i.age_days+' giorni fa'}</span>
                  <span style="color:var(--text-dim)">${esc(i.status.replace('_',' '))}</span>
                </div>
              </div>
            </div>`;
          return `
            <div class="issue-item">
              <div class="issue-severity ${i.severity}"></div>
              <div class="issue-body">
                <div class="issue-title">${esc(i.title)}</div>
                <div class="issue-meta">
                  <span class="badge badge-${i.severity}">${sevL[i.severity]||i.severity}</span>
                  ${(i.workers||[]).slice(0,3).map(w=>`<span>${esc(w.name)}</span>`).join('')}
                </div>
              </div>
            </div>`;
        }).join('')}
      </div>
    </div>`;
}

function renderTodayPresences(tp) {
  if (!tp) return '';
  const today = new Date().toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long'});
  return `
    <div class="card">
      <div class="section-header" onclick="toggleSection(this,'pres-body')">
        <div class="card-title" style="margin-bottom:0">Presenze di oggi</div>
        <span class="toggle-icon">▼</span>
      </div>
      <div id="pres-body" style="margin-top:14px">
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:12px;text-transform:capitalize">${today}</div>
        <div class="presence-summary">
          <div class="presence-stat">
            <div class="presence-stat-num">${tp.present_count}</div>
            <div class="presence-stat-label">In cantiere ora</div>
          </div>
          <div class="presence-stat">
            <div class="presence-stat-num">${tp.workers_today}</div>
            <div class="presence-stat-label">Passaggi oggi</div>
          </div>
          ${tp.missing_exits_count>0 ? `
            <div class="presence-stat">
              <div class="presence-stat-num alert">${tp.missing_exits_count}</div>
              <div class="presence-stat-label">Uscite mancanti</div>
            </div>` : ''}
        </div>
        ${tp.workers&&tp.workers.length ? `
          <div class="divider"></div>
          ${tp.workers.map(w=>`
            <div class="worker-row">
              <div class="worker-status-dot ${w.status}"></div>
              <div class="worker-name">${esc(w.name)}</div>
              <div class="worker-time">
                ${w.entry_time?'Entrata '+fmtTime(w.entry_time):''}
                ${w.exit_time?' · Uscita '+fmtTime(w.exit_time):''}
                ${!w.exit_time&&w.entry_time?'<span style="color:var(--green-text)"> · presente</span>':''}
              </div>
            </div>`).join('')}` :
          '<div class="empty">Nessuna presenza registrata oggi</div>'}
      </div>
    </div>`;
}

function renderDocuments(ds) {
  if (!ds) return '';
  const catN = {pos:'POS',psc:'PSC',notifica_asl:'Notifica ASL',durc:'DURC',dvr:'DVR',assicurazione:'Assicurazione',altro:'Altro'};
  const entries = Object.entries(ds.by_category||{});
  return `
    <div class="card">
      <div class="section-header" onclick="toggleSection(this,'docs-body')">
        <div class="card-title" style="margin-bottom:0">Documenti caricati</div>
        <span class="toggle-icon">▼</span>
      </div>
      <div id="docs-body" style="margin-top:14px">
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:12px">${ds.total_count} documento${ds.total_count!==1?'i':''} in piattaforma</div>
        ${entries.length ? `<div class="doc-grid">${entries.map(([c,n])=>`<div class="doc-item"><div class="doc-item-name">${esc(catN[c]||c)}</div><div class="doc-item-count">${n}</div></div>`).join('')}</div>` : ''}
        ${ds.missing_required&&ds.missing_required.length ? `<div class="doc-missing">Categorie non presenti: <strong>${ds.missing_required.map(c=>catN[c]||c).join(', ')}</strong></div>` : ''}
        ${!entries.length ? '<div class="empty">Nessun documento caricato</div>' : ''}
        <div style="font-size:11px;color:var(--text-dim);margin-top:10px">La scadenza documentale non è tracciata automaticamente — verificare i documenti originali per le date di validità.</div>
      </div>
    </div>`;
}

function renderActions(ss) {
  const pillC = {conforme:'var(--green-text)',attenzione:'var(--yellow-text)',critico:'var(--red-text)',dati_insufficienti:'var(--gray-text)'};
  const pill = ss ? `<span style="color:${pillC[ss.level]||'var(--gray-text)'}">● ${esc(ss.label)}</span>` : '';
  return `
    <div class="card-title">Azioni</div>
    <div class="actions-grid">
      <button class="action-btn primary" onclick="prepareVerifica()">
        <span class="action-btn-icon">✓</span>
        <div><div class="action-btn-label">Conferma verifica cantiere</div><div style="font-size:11px;color:#93c5fd;margin-top:2px">${pill}</div></div>
      </button>
      <button class="action-btn" onclick="openModal('modal-nc')">
        <span class="action-btn-icon">⚠</span>
        <div class="action-btn-label">Segnala non conformità</div>
        <div class="action-btn-desc">Apri una NC formale</div>
      </button>
      <button class="action-btn" onclick="openModal('modal-nota')">
        <span class="action-btn-icon">📋</span>
        <div class="action-btn-label">Aggiungi nota verifica</div>
        <div class="action-btn-desc">Osservazione o richiesta</div>
      </button>
      <button class="action-btn" onclick="exportReport()">
        <span class="action-btn-icon">↓</span>
        <div class="action-btn-label">Scarica registro</div>
        <div class="action-btn-desc">CSV verifiche e NC</div>
      </button>
    </div>`;
}

function renderTimeline() {
  const events = buildLocalTimeline();
  if (!events.length) return `<div class="card"><div class="card-title">Storico verifiche</div><div class="empty">Nessuna attività registrata.<br>Effettua la prima verifica formale con il pulsante qui sopra.</div></div>`;
  const typeL = {verifica:'Verifica effettuata',nc_aperta:'Non conformità aperta',nc_risolta:'NC risolta dall\'impresa',nc_chiusa:'NC chiusa',nota:'Nota aggiunta'};
  const pillMap = {
    conforme:`<span class="status-pill conforme">Conforme</span>`,
    attenzione:`<span class="status-pill attenzione">Attenzione</span>`,
    critico:`<span class="status-pill critico">Critico</span>`,
    dati_insufficienti:`<span class="status-pill dati_insufficienti">Dati insuf.</span>`
  };
  return `
    <div class="card">
      <div class="card-title">Storico verifiche e attività</div>
      <div class="timeline">
        ${events.map(ev=>`
          <div class="timeline-item ${ev.type}">
            <div class="timeline-date">${fmtDateTime(ev.date)}</div>
            <div class="timeline-type">${typeL[ev.type]||ev.type}</div>
            ${ev.type==='verifica' ? `
              <div class="timeline-verif-box">
                ${pillMap[ev.safety_status]||''}
                <span style="font-size:11px;color:var(--text-muted);margin-left:8px">NC aperte: ${ev.meta.open_nc} · Non conformi: ${ev.meta.non_compliant} · Presenti: ${ev.meta.present_today}</span>
                ${ev.note ? `<div class="timeline-note">"${esc(ev.note)}"</div>` : ''}
              </div>` : ''}
            ${ev.type!=='verifica' ? `<div class="timeline-title">${esc(ev.title)}</div>` : ''}
          </div>`).join('')}
      </div>
    </div>`;
}

function buildLocalTimeline() {
  const evs = [];
  const slabel = {conforme:'Situazione regolare',attenzione:'Elementi da verificare',critico:'Situazione critica',dati_insufficienti:'Dati insufficienti'};
  for (const v of verifications) evs.push({type:'verifica',id:v.id,safety_status:v.safety_status,note:v.note,meta:{open_nc:v.open_nc_count||0,non_compliant:v.non_compliant_workers||0,present_today:v.workers_present_today||0},date:v.created_at});
  for (const n of (siteData.nonconformities||[])) {
    evs.push({type:'nc_aperta',id:n.id,title:n.title,severity:n.severity,date:n.created_at});
    if (n.resolved_at) evs.push({type:'nc_risolta',id:n.id+'_r',title:n.title,date:n.resolved_at});
    if (n.closed_by_coordinator_at) evs.push({type:'nc_chiusa',id:n.id+'_c',title:n.title,date:n.closed_by_coordinator_at});
  }
  for (const n of (siteData.notes||[])) evs.push({type:'nota',id:n.id,title:n.content.slice(0,100),date:n.created_at});
  return evs.sort((a,b)=>new Date(b.date)-new Date(a.date));
}

function renderDisclaimer() {
  return `<div class="disclaimer"><strong>Nota informativa.</strong> Palladia è uno strumento digitale di supporto alla gestione e alla tracciabilità del cantiere. Le informazioni visualizzate riflettono i dati inseriti in piattaforma. La responsabilità delle verifiche, delle valutazioni tecniche e del rispetto della normativa vigente rimane in capo ai soggetti obbligati secondo legge. L'utilizzo di questo strumento non sostituisce le verifiche in loco né gli obblighi previsti dalla normativa.</div>`;
}

function renderError(title, desc) {
  document.getElementById('app').innerHTML = `<div class="page"><div class="error-screen"><div class="error-icon">🔒</div><div class="error-title">${esc(title)}</div><div class="error-desc">${esc(desc)}</div></div></div>`;
}

function prepareVerifica() {
  const ss = siteData?.safety_status;
  const cls = !ss ? 'insufficiente' : ss.level==='dati_insufficienti' ? 'insufficiente' : ss.level;
  const pillC = {conforme:'var(--green-text)',attenzione:'var(--yellow-text)',critico:'var(--red-text)',insufficiente:'var(--gray-text)'};
  document.getElementById('verifica-status-preview').innerHTML = `
    <div class="modal-status-preview ${cls}">
      <div style="flex:1">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:${pillC[cls]||'var(--gray-text)'}">
          ${esc(ss?.label||'Stato sconosciuto')}
        </div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:4px">Lo stato attuale sarà acquisito come snapshot della verifica</div>
      </div>
    </div>`;
  document.getElementById('verifica-note').value = '';
  openModal('modal-verifica');
}

async function submitVerifica() {
  const btn = document.getElementById('btn-verifica');
  btn.disabled=true; btn.textContent='Registrazione…';
  try {
    const note = document.getElementById('verifica-note').value.trim();
    const res  = await apiFetch(`/api/v1/coordinator/${token}/verifications`,{method:'POST',body:JSON.stringify({note:note||undefined})});
    verifications.unshift(res.verification);
    if (res.safety_status) siteData.safety_status = res.safety_status;
    closeModal('modal-verifica');
    showToast('Verifica registrata','success');
    render();
  } catch(e) { showToast('Errore nel salvataggio. Riprova.','error'); }
  finally { btn.disabled=false; btn.textContent='Conferma e registra'; }
}

async function submitNC() {
  const title = document.getElementById('nc-title').value.trim();
  const desc  = document.getElementById('nc-desc').value.trim();
  document.getElementById('nc-title-err').style.display='none';
  document.getElementById('nc-desc-err').style.display='none';
  let ok = true;
  if (!title||title.length<3) { document.getElementById('nc-title-err').textContent='Titolo: minimo 3 caratteri'; document.getElementById('nc-title-err').style.display='block'; ok=false; }
  if (!desc||desc.length<3)   { document.getElementById('nc-desc-err').textContent='Descrizione: minimo 3 caratteri'; document.getElementById('nc-desc-err').style.display='block'; ok=false; }
  if (!ok) return;
  const btn = document.getElementById('btn-nc');
  btn.disabled=true; btn.textContent='Invio…';
  try {
    const payload = {title,description:desc,severity:document.getElementById('nc-severity').value,category:document.getElementById('nc-category').value};
    const due = document.getElementById('nc-due').value;
    if (due) payload.due_date = due;
    const res = await apiFetch(`/api/v1/coordinator/${token}/nonconformities`,{method:'POST',body:JSON.stringify(payload)});
    if (!siteData.nonconformities) siteData.nonconformities=[];
    siteData.nonconformities.unshift(res.nonconformity);
    siteData.active_issues = rebuildActiveIssues();
    closeModal('modal-nc');
    showToast('Non conformità segnalata','success');
    document.getElementById('nc-title').value='';
    document.getElementById('nc-desc').value='';
    document.getElementById('nc-due').value='';
    render();
  } catch(e) { showToast('Errore nell\'invio. Riprova.','error'); }
  finally { btn.disabled=false; btn.textContent='Segnala NC'; }
}

async function submitNota() {
  const content = document.getElementById('nota-content').value.trim();
  document.getElementById('nota-err').style.display='none';
  if (!content||content.length<3) { document.getElementById('nota-err').textContent='Minimo 3 caratteri'; document.getElementById('nota-err').style.display='block'; return; }
  const btn = document.getElementById('btn-nota');
  btn.disabled=true; btn.textContent='Salvataggio…';
  try {
    const res = await apiFetch(`/api/v1/coordinator/${token}/notes`,{method:'POST',body:JSON.stringify({note_type:document.getElementById('nota-type').value,content})});
    if (!siteData.notes) siteData.notes=[];
    siteData.notes.unshift(res.note);
    closeModal('modal-nota');
    showToast('Nota salvata','success');
    document.getElementById('nota-content').value='';
    render();
  } catch(e) { showToast('Errore nel salvataggio. Riprova.','error'); }
  finally { btn.disabled=false; btn.textContent='Salva nota'; }
}

function rebuildActiveIssues() {
  const so = {critica:0,alta:1,media:2,bassa:3};
  const nc = (siteData.nonconformities||[]).filter(n=>n.status==='aperta'||n.status==='in_lavorazione').sort((a,b)=>(so[a.severity]??9)-(so[b.severity]??9));
  return nc.slice(0,6).map(n=>({type:'nc',id:n.id,title:n.title,severity:n.severity,category:n.category,status:n.status,age_days:Math.floor((Date.now()-new Date(n.created_at))/86400000),date:n.created_at.split('T')[0]}));
}

function exportReport() {
  if (!siteData) return;
  const rows=[['Data','Tipo','Stato/Gravità','Descrizione']];
  for (const v of verifications) rows.push([fmtDateTime(v.created_at),'Verifica',v.safety_status,v.note||'']);
  for (const n of (siteData.nonconformities||[])) rows.push([fmtDate(n.created_at),'NC',n.severity,n.title+' — '+n.status]);
  for (const n of (siteData.notes||[])) rows.push([fmtDateTime(n.created_at),'Nota',n.note_type,n.content.slice(0,200)]);
  const csv = rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href=url; a.download='verifiche_'+(siteData.site?.name||'cantiere').replace(/[^a-zA-Z0-9]/g,'_')+'_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click(); URL.revokeObjectURL(url);
  showToast('Report scaricato','success');
}

document.querySelectorAll('.modal-overlay').forEach(o=>{
  o.addEventListener('click',e=>{ if(e.target===o){ o.classList.remove('open'); document.body.style.overflow=''; } });
});

load();
</script>
</body>
</html>
