<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <title>Timbratura — Palladia</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f172a;
      --surface: #1e293b;
      --border:  #334155;
      --accent:  #3b82f6;
      --green:   #22c55e;
      --red:     #ef4444;
      --amber:   #f59e0b;
      --text:    #f1f5f9;
      --muted:   #94a3b8;
      --radius:  12px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 16px;
      line-height: 1.5;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 40px;
      min-height: 100%;
    }

    /* ── Header ─────────────────────────────── */
    .logo {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    #site-name {
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 4px;
    }
    #site-address {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 28px;
    }

    /* ── Card ───────────────────────────────── */
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 16px;
    }

    /* ── Form ───────────────────────────────── */
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 16px;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--border); }

    .field { margin-bottom: 16px; }
    .field:last-child { margin-bottom: 0; }

    /* ── Buttons ────────────────────────────── */
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-appearance: none;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-green   { background: var(--green);  color: #fff; }
    .btn-ghost   {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
      padding: 11px;
    }

    .btn + .btn  { margin-top: 10px; }

    /* ── Worker badge (sessione attiva) ─────── */
    #worker-badge {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .worker-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .worker-info { flex: 1; min-width: 0; }
    .worker-name { font-size: 16px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .worker-sub  { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* ── Punch result card ──────────────────── */
    #result-card {
      width: 100%;
      max-width: 420px;
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
      text-align: center;
    }
    #result-card.entry { background: rgba(34,197,94,.12); border: 1px solid rgba(34,197,94,.35); }
    #result-card.exit  { background: rgba(239,68,68,.10); border: 1px solid rgba(239,68,68,.30); }
    .result-icon  { font-size: 40px; margin-bottom: 8px; }
    .result-label { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .result-sub   { font-size: 13px; color: var(--muted); }
    .result-entry .result-label { color: var(--green); }
    .result-exit  .result-label { color: var(--red);   }

    /* ── Error toast ────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #1e293b;
      border: 1px solid var(--red);
      color: var(--text);
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 14px;
      max-width: 360px;
      width: calc(100% - 32px);
      text-align: center;
      transition: transform 0.3s ease;
      z-index: 100;
    }
    #toast.visible { transform: translateX(-50%) translateY(0); }
    #toast.info    { border-color: var(--accent); }
    #toast.warn    { border-color: var(--amber); }

    /* ── Spinner ────────────────────────────── */
    .spin {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Helpers ────────────────────────────── */
    .hidden { display: none !important; }
    .w-full { width: 100%; max-width: 420px; }
    .text-center { text-align: center; }
    .mt-4 { margin-top: 16px; }

    /* ── GPS status ─────────────────────────── */
    #gps-hint {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      margin-top: 8px;
    }
    #gps-hint.ok    { color: var(--green); }
    #gps-hint.warn  { color: var(--amber); }
    #gps-hint.error { color: var(--red);   }
  </style>
</head>
<body>

  <p class="logo">Palladia — Presenze</p>
  <h1 id="site-name">Caricamento…</h1>
  <p id="site-address"></p>

  <!-- ── STATO: loading iniziale ─────────────────────────────────────── -->
  <div id="state-loading" class="w-full text-center">
    <div class="spin" style="width:28px;height:28px;border-width:3px;margin:0 auto;display:block;"></div>
  </div>

  <!-- ── STATO: sessione attiva ───────────────────────────────────────── -->
  <div id="state-active" class="hidden w-full" style="display:flex;flex-direction:column;align-items:center;">
    <div id="worker-badge">
      <div class="worker-avatar" id="avatar-letter">?</div>
      <div class="worker-info">
        <div class="worker-name" id="worker-display-name">—</div>
        <div class="worker-sub">Sessione attiva</div>
      </div>
    </div>

    <!-- Risultato ultimo punch -->
    <div id="result-card" class="hidden"></div>

    <div class="w-full" style="max-width:420px;">
      <button class="btn btn-green" id="btn-punch">
        Timbra entrata / uscita
      </button>
      <p id="gps-hint">In attesa del GPS…</p>
      <button class="btn btn-ghost mt-4" id="btn-logout">Cambia lavoratore</button>
    </div>
  </div>

  <!-- ── STATO: identificazione ───────────────────────────────────────── -->
  <div id="state-identify" class="hidden w-full" style="display:flex;flex-direction:column;align-items:center;">
    <div class="card w-full">
      <p class="card-title">Identificazione</p>

      <div class="field">
        <label for="input-cf">Codice Fiscale</label>
        <input id="input-cf" type="text" maxlength="16" placeholder="RSSMRA80A01H501U"
               autocomplete="off" autocapitalize="characters" spellcheck="false">
      </div>

      <!-- Rivelati progressivamente dal server -->
      <div id="field-name" class="field hidden">
        <label for="input-name">Nome completo</label>
        <input id="input-name" type="text" placeholder="Mario Rossi" autocomplete="name">
      </div>

      <div id="field-pin" class="field hidden">
        <label for="input-pin">PIN cantiere</label>
        <input id="input-pin" type="password" maxlength="20" placeholder="••••"
               autocomplete="off" inputmode="numeric">
      </div>

      <div id="field-error" class="hidden" style="font-size:13px;color:var(--red);margin-bottom:12px;"></div>

      <button class="btn btn-primary" id="btn-identify">Continua</button>
    </div>
  </div>

  <!-- Toast notifiche -->
  <div id="toast"></div>

  <script>
  'use strict';

  // ── Config ────────────────────────────────────────────────────────────────
  const API = '';  // stesso origin — server.js serve sia API che HTML

  // Supporta due formati URL:
  //   /scan/<uuid>                          (path-based, no token — backward compat)
  //   /scan/<uuid>?t=<hmac>&exp=<unix>      (path + QR token firmato)
  const pathParts = window.location.pathname.split('/');
  const WSITE_ID  = pathParts[pathParts.length - 1];

  // Estrai parametri token QR dalla query string (se presenti)
  const _qp      = new URLSearchParams(window.location.search);
  const QR_TOKEN = _qp.get('t');
  const QR_EXP   = _qp.get('exp');
  const HAS_QR   = !!(QR_TOKEN && QR_EXP);

  const LS_KEY_TOK = `badge_tok_${WSITE_ID}`;
  const LS_KEY_NAM = `badge_nam_${WSITE_ID}`;

  // ── Stato locale ──────────────────────────────────────────────────────────
  let sessionToken = localStorage.getItem(LS_KEY_TOK) || null;
  let workerName   = localStorage.getItem(LS_KEY_NAM) || '';
  let siteInfo     = null;   // caricato da GET /scan/worksites/:id
  let gpsCoords    = null;   // { latitude, longitude, accuracy } — aggiornato continuamente
  let gpsWatcher   = null;
  let maxAccuracyM = 80;     // aggiornato da loadSite() con il valore del backend
  let punchInProgress = false;

  // ── UI helpers ────────────────────────────────────────────────────────────
  const $ = id => document.getElementById(id);

  function showState(name) {
    ['loading','active','identify'].forEach(s => {
      const el = $(`state-${s}`);
      el.classList.toggle('hidden', s !== name);
      if (s !== name) el.style.display = '';
      else el.style.display = 'flex';
    });
    if (name === 'loading') { $('state-loading').style.display = 'block'; }
  }

  let toastTimer;
  function toast(msg, type = 'error') {
    const el = $('toast');
    el.textContent = msg;
    el.className   = `visible ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = ''; }, 4000);
  }

  function fmtTime(iso) {
    const d = new Date(iso);
    return d.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
  }

  // ── GPS ───────────────────────────────────────────────────────────────────
  function startGps() {
    if (!navigator.geolocation) {
      $('gps-hint').textContent = 'GPS non disponibile su questo dispositivo';
      $('gps-hint').className   = 'error';
      return;
    }
    gpsWatcher = navigator.geolocation.watchPosition(
      pos => {
        const acc = pos.coords.accuracy;
        gpsCoords = { latitude: pos.coords.latitude, longitude: pos.coords.longitude, accuracy: acc };

        const accRound = Math.round(acc);
        const btn      = $('btn-punch');

        if (acc > maxAccuracyM) {
          $('gps-hint').textContent = `Precisione GPS: ~${accRound}m — troppo bassa, spostati all'aperto`;
          $('gps-hint').className   = 'warn';
          btn.disabled = true;
        } else {
          $('gps-hint').textContent = `Precisione GPS: ~${accRound}m`;
          $('gps-hint').className   = 'ok';
          if (!punchInProgress) btn.disabled = false;
        }
      },
      err => {
        gpsCoords = null;
        const msgs = {
          1: 'Permesso GPS negato — abilitarlo per timbrarsi',
          2: 'Segnale GPS non disponibile',
          3: 'Timeout GPS — riprovare'
        };
        $('gps-hint').textContent = msgs[err.code] || 'Errore GPS';
        $('gps-hint').className   = 'error';
      },
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 10000 }
    );
  }

  function stopGps() {
    if (gpsWatcher !== null) {
      navigator.geolocation.clearWatch(gpsWatcher);
      gpsWatcher = null;
    }
  }

  // ── API calls ─────────────────────────────────────────────────────────────
  async function apiFetch(method, path, body) {
    const opts = {
      method,
      headers: { 'Content-Type': 'application/json' }
    };
    if (body) opts.body = JSON.stringify(body);
    const r   = await fetch(`${API}${path}`, opts);
    const json = await r.json().catch(() => ({}));
    return { status: r.status, body: json };
  }

  // ── Init: carica info cantiere ────────────────────────────────────────────
  async function loadSite() {
    const { status, body } = await apiFetch('GET', `/api/v1/scan/worksites/${WSITE_ID}`);
    if (status !== 200) {
      $('site-name').textContent = 'Cantiere non trovato';
      $('site-address').textContent = `Errore: ${body.error || status}`;
      showState('loading');
      return false;
    }
    siteInfo     = body;
    maxAccuracyM = body.max_gps_accuracy_m ?? 80;  // soglia dal backend, non hardcoded
    $('site-name').textContent    = body.name;
    $('site-address').textContent = body.address || '';
    return true;
  }

  // ── Sessione attiva — mostra schermata punch ──────────────────────────────
  function activateSession(name) {
    workerName = name;
    localStorage.setItem(LS_KEY_NAM, name);
    $('worker-display-name').textContent = name;
    $('avatar-letter').textContent       = name.trim().charAt(0).toUpperCase();
    $('result-card').classList.add('hidden');
    showState('active');
    startGps();
  }

  // ── Punch ─────────────────────────────────────────────────────────────────
  $('btn-punch').addEventListener('click', async () => {
    if (punchInProgress) return;

    if (!gpsCoords) {
      toast('GPS non disponibile — attendere il segnale o abilitare i permessi', 'warn');
      return;
    }

    punchInProgress = true;
    const btn = $('btn-punch');
    btn.disabled   = true;
    btn.innerHTML  = '<span class="spin"></span>Invio…';

    try {
      const { status, body } = await apiFetch('POST', '/api/v1/scan/punch', {
        worksite_id:    WSITE_ID,
        session_token:  sessionToken,
        latitude:       gpsCoords.latitude,
        longitude:      gpsCoords.longitude,
        gps_accuracy_m: gpsCoords.accuracy
      });

      if (status === 200) {
        showResult(body);
        return;
      }

      // compat window: backend aggiornato, frontend vecchio (no gps_accuracy_m)
      if (status === 202 && body.warning === 'GPS_ACCURACY_MISSING') {
        showRefreshPrompt(body.message);
        return;
      }

      // Errori gestiti
      if (status === 429 && body.error === 'PUNCH_TOO_SOON') {
        const mins = Math.ceil(body.retry_after_secs / 60);
        toast(`Timbratura troppo ravvicinata — riprovare tra ${mins > 0 ? mins + ' min' : body.retry_after_secs + ' s'}`, 'warn');
        return;
      }
      if (status === 403 && body.error === 'OUTSIDE_GEOFENCE') {
        toast(`Fuori dalla zona cantiere — distanza ${body.distance_m}m (max ${body.max_allowed_m}m)`, 'error');
        return;
      }
      if (status === 401) {
        // Sessione scaduta o revocata
        clearSession();
        toast('Sessione scaduta — effettuare nuovamente l\'identificazione', 'warn');
        return;
      }
      if (status === 422 && body.error === 'GPS_REQUIRED') {
        toast('GPS obbligatorio — abilitare la geolocalizzazione', 'warn');
        return;
      }
      if (status === 422 && body.error === 'GPS_ACCURACY_REQUIRED') {
        const max = body.max_accuracy_m ?? maxAccuracyM;
        toast(`Precisione GPS non disponibile (max ${max}m) — aggiorna la pagina e riprova`, 'warn');
        return;
      }
      if (status === 422 && body.error === 'GPS_ACCURACY_TOO_LOW') {
        toast(`Precisione GPS insufficiente (${body.accuracy_m}m, max ${body.max_accuracy_m}m) — spostati all'aperto`, 'warn');
        return;
      }
      if (status === 422 && body.error === 'GEOFENCE_NOT_CONFIGURED') {
        toast('Cantiere non ancora configurato — contattare l\'amministratore', 'warn');
        return;
      }

      toast(`Errore: ${body.error || status}`, 'error');
    } catch (e) {
      toast('Errore di rete — verificare la connessione', 'error');
    } finally {
      punchInProgress = false;
      btn.disabled    = false;
      btn.innerHTML   = 'Timbra entrata / uscita';
    }
  });

  function showResult(data) {
    const isEntry  = data.event_type === 'ENTRY';
    const card     = $('result-card');
    const accLabel = data.gps_accuracy_m != null
      ? `±${data.gps_accuracy_m}m`
      : 'precisione n.d.';
    card.className = `result-${isEntry ? 'entry' : 'exit'} ${isEntry ? 'entry' : 'exit'}`;
    card.innerHTML = `
      <div class="result-icon">${isEntry ? '🟢' : '🔴'}</div>
      <div class="result-label">${isEntry ? 'ENTRATA' : 'USCITA'}</div>
      <div class="result-sub">
        ${fmtTime(data.timestamp_server)} — ${data.distance_m}m dal cantiere — ${accLabel}
      </div>`;
    card.classList.remove('hidden');
    if (data.warning === 'GPS_ACCURACY_MISSING') {
      toast('Precisione GPS non registrata — aggiorna la pagina per abilitarla', 'warn');
    }
  }

  // ── Refresh prompt (compat window: gps_accuracy_m non inviato dal vecchio client) ──
  function showRefreshPrompt(msg) {
    const card = $('result-card');
    card.className = '';
    card.style.cssText = 'background:rgba(245,158,11,.10);border:1px solid rgba(245,158,11,.40);';
    card.innerHTML = `
      <div class="result-icon">⚠️</div>
      <div class="result-label" style="color:var(--amber);font-size:17px;">Aggiornamento necessario</div>
      <div class="result-sub" style="margin:10px 0 16px;">${msg || 'Aggiorna la pagina e riprova a timbrare.'}</div>
      <button class="btn btn-primary" onclick="location.reload()" style="max-width:200px;margin:0 auto;">Ricarica</button>`;
    card.classList.remove('hidden');
  }

  // ── Logout ────────────────────────────────────────────────────────────────
  $('btn-logout').addEventListener('click', () => {
    clearSession();
    // Reset form
    $('input-cf').value   = '';
    $('input-name').value = '';
    $('input-pin').value  = '';
    $('field-name').classList.add('hidden');
    $('field-pin').classList.add('hidden');
    $('field-error').classList.add('hidden');
  });

  function clearSession() {
    sessionToken = null;
    workerName   = '';
    localStorage.removeItem(LS_KEY_TOK);
    localStorage.removeItem(LS_KEY_NAM);
    stopGps();
    showState('identify');
  }

  // ── Identify ──────────────────────────────────────────────────────────────
  let nameRequired = false;
  let pinRequired  = false;

  $('btn-identify').addEventListener('click', doIdentify);
  ['input-cf','input-name','input-pin'].forEach(id => {
    $(id).addEventListener('keydown', e => { if (e.key === 'Enter') doIdentify(); });
  });

  async function doIdentify() {
    const cf   = $('input-cf').value.toUpperCase().trim();
    const name = $('input-name').value.trim();
    const pin  = $('input-pin').value;

    if (!cf || cf.length !== 16) {
      showFieldError('Codice Fiscale deve essere di 16 caratteri');
      return;
    }

    const btn = $('btn-identify');
    btn.disabled  = true;
    btn.innerHTML = '<span class="spin"></span>Verifica…';
    $('field-error').classList.add('hidden');

    const payload = {
      worksite_id: WSITE_ID,
      fiscal_code: cf
    };
    if (nameRequired) payload.full_name = name;
    if (pinRequired || $('field-pin').classList.contains('hidden') === false) payload.pin_code = pin;

    try {
      const { status, body } = await apiFetch('POST', '/api/v1/scan/identify', payload);

      if (status === 200) {
        sessionToken = body.session_token;
        localStorage.setItem(LS_KEY_TOK, sessionToken);
        activateSession(body.worker_name);
        return;
      }

      // Rivela campi progressivamente
      if (status === 400 && body.error === 'FULL_NAME_REQUIRED') {
        nameRequired = true;
        pinRequired  = !!body.pin_required;
        $('field-name').classList.remove('hidden');
        if (pinRequired) {
          $('field-pin').classList.remove('hidden');
          showFieldError('Lavoratore non trovato — inserire nome completo e PIN cantiere');
        } else {
          showFieldError('Lavoratore non trovato — inserire il nome completo per registrarsi');
        }
        $('input-name').focus();
        return;
      }
      if (status === 403 && body.error === 'INVALID_PIN') {
        pinRequired = true;
        $('field-pin').classList.remove('hidden');
        showFieldError('PIN cantiere errato — riprovare');
        $('input-pin').focus();
        return;
      }
      if (status === 403 && body.error === 'WORKER_INACTIVE') {
        showFieldError('Lavoratore non attivo — contattare l\'amministratore');
        return;
      }
      if (status === 403 && body.error === 'WORKER_NOT_ACTIVE_ON_SITE') {
        showFieldError('Non autorizzato su questo cantiere — contattare l\'amministratore');
        return;
      }
      if (status === 400 && body.error === 'INVALID_FISCAL_CODE') {
        showFieldError('Codice Fiscale non valido (16 caratteri alfanumerici)');
        return;
      }
      if (status === 503) {
        showFieldError('Cantiere non configurato — contattare l\'amministratore');
        return;
      }
      showFieldError(`Errore: ${body.error || status}`);
    } catch (e) {
      showFieldError('Errore di rete — verificare la connessione');
    } finally {
      btn.disabled  = false;
      btn.innerHTML = 'Continua';
    }
  }

  function showFieldError(msg) {
    const el = $('field-error');
    el.textContent = msg;
    el.classList.remove('hidden');
  }

  // ── Verifica firma QR (se il link proviene da un QR code firmato) ────────
  async function verifyQrSignature() {
    if (!HAS_QR) return true;  // nessun token → accesso libero (backward compat)

    // Scadenza client-side (primo controllo veloce, senza round-trip)
    if (Date.now() / 1000 > Number(QR_EXP)) {
      $('site-name').textContent    = 'QR code scaduto';
      $('site-address').textContent = 'Questo QR non è più valido. Contattare l\'amministratore per generarne uno nuovo.';
      return false;
    }

    // Verifica firma server-side
    const { status, body } = await apiFetch(
      'GET',
      `/api/v1/scan/verify-qr?site=${encodeURIComponent(WSITE_ID)}&t=${encodeURIComponent(QR_TOKEN)}&exp=${QR_EXP}`
    );

    if (status === 200 && body.valid) return true;

    const errMsg = {
      QR_EXPIRED:          'QR code scaduto. Richiedere un QR aggiornato all\'amministratore.',
      INVALID_SIGNATURE:   'QR code non valido. Assicurarsi di aver scansionato il QR corretto.',
      SIGNING_NOT_CONFIGURED: 'Errore di configurazione server.',
    }[body.error] || `QR non valido (${body.error || status})`;

    $('site-name').textContent    = 'Accesso negato';
    $('site-address').textContent = errMsg;
    return false;
  }

  // ── Bootstrap ─────────────────────────────────────────────────────────────
  (async () => {
    showState('loading');

    // 1. Se il link proviene da un QR firmato, verifica la firma prima di tutto
    const qrOk = await verifyQrSignature();
    if (!qrOk) return;  // pagina mostra l'errore nell'h1/p

    // 2. Carica info cantiere
    const ok = await loadSite();
    if (!ok) return;

    // 3. Sessione già in localStorage → accesso diretto
    if (sessionToken) {
      activateSession(workerName || 'Lavoratore');
    } else {
      showState('identify');
    }
  })();
  </script>
</body>
</html>
