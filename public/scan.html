<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#faf8f4">
  <title>Timbratura — Palladia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #faf8f4;
      --surface:   #ffffff;
      --border:    #e4e7ed;
      --text:      #1a1a1a;
      --muted:     #6b7280;
      --subtle:    #9ca3af;
      --primary:   #000000;
      --green:     #16a34a;
      --green-bg:  #22c55e;
      --red:       #dc2626;
      --amber:     #d97706;
      --radius:    12px;
      --shadow:    0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.05);
      --shadow-md: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.05);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px 48px;
      min-height: 100%;
    }

    /* ── Top bar ──────────────────────────────── */
    .topbar {
      width: 100%;
      max-width: 440px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 0 8px;
      margin-bottom: 4px;
    }
    .palladia-logo {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
    }
    .palladia-logo span {
      color: var(--subtle);
      font-weight: 400;
      letter-spacing: 0;
    }

    /* ── Site header ──────────────────────────── */
    .site-header {
      width: 100%;
      max-width: 440px;
      text-align: center;
      padding: 12px 0 24px;
    }
    #site-name {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 4px;
    }
    #site-address {
      font-size: 14px;
      color: var(--muted);
    }

    /* ── Card ───────────────────────────────────── */
    .card {
      width: 100%;
      max-width: 440px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
    }
    .card-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--subtle);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
    }

    /* ── Form ──────────────────────────────────── */
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input[type="text"] {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
    }
    input:focus {
      border-color: var(--text);
      box-shadow: 0 0 0 3px rgba(0,0,0,.06);
    }
    input::placeholder { color: var(--border); }

    .field { margin-bottom: 14px; }
    .field:last-child { margin-bottom: 0; }

    /* ── Buttons ────────────────────────────────── */
    .btn {
      display: block;
      width: 100%;
      padding: 14px 20px;
      border: none;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
      -webkit-appearance: none;
      text-align: center;
    }
    .btn:active  { transform: scale(0.97); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }
    .btn-primary:not(:disabled):hover { box-shadow: var(--shadow-md); }

    .btn-green {
      background: var(--green-bg);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      padding: 16px 20px;
    }
    .btn-green:not(:disabled):hover { box-shadow: var(--shadow-md); }

    .btn-ghost {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
      padding: 11px;
    }
    .btn-ghost:not(:disabled):hover { border-color: var(--subtle); color: var(--text); }

    .btn + .btn { margin-top: 8px; }

    /* ── Worker badge ─────────────────────────── */
    #worker-badge {
      width: 100%;
      max-width: 440px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: var(--shadow);
    }
    .worker-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--text);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .worker-info { flex: 1; min-width: 0; }
    .worker-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .worker-sub  { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* ── Punch result card ──────────────────────── */
    #result-card {
      width: 100%;
      max-width: 440px;
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 12px;
      text-align: center;
    }
    #result-card.entry {
      background: #f0fdf4;
      border: 1.5px solid #bbf7d0;
    }
    #result-card.exit {
      background: #fef2f2;
      border: 1.5px solid #fecaca;
    }
    .result-icon  { font-size: 36px; margin-bottom: 8px; line-height: 1; }
    .result-label { font-size: 20px; font-weight: 800; margin-bottom: 6px; letter-spacing: -0.01em; }
    .result-sub   { font-size: 13px; color: var(--muted); }
    #result-card.entry .result-label { color: var(--green); }
    #result-card.exit  .result-label { color: var(--red);   }

    /* ── GPS status ─────────────────────────────── */
    #gps-hint {
      font-size: 12px;
      font-weight: 500;
      color: var(--subtle);
      text-align: center;
      margin-top: 8px;
      height: 18px;
    }
    #gps-hint.ok    { color: var(--green); }
    #gps-hint.warn  { color: var(--amber); }
    #gps-hint.error { color: var(--red);   }

    /* ── Error inline ─────────────────────────── */
    #field-error {
      font-size: 13px;
      font-weight: 500;
      color: var(--red);
      margin-bottom: 12px;
      padding: 10px 12px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
    }

    /* ── Toast ──────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--text);
      color: #fff;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 500;
      max-width: 360px;
      width: calc(100% - 32px);
      text-align: center;
      transition: transform 0.25s ease;
      z-index: 100;
      box-shadow: 0 8px 24px rgba(0,0,0,.18);
    }
    #toast.visible { transform: translateX(-50%) translateY(0); }
    #toast.warn    { background: #92400e; }
    #toast.info    { background: #1e40af; }

    /* ── Spinner ────────────────────────────────── */
    .spin {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .65s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Note uscita ────────────────────────────── */
    .notes-card textarea {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      padding: 10px 12px;
      resize: vertical;
      min-height: 80px;
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    .notes-card textarea:focus { border-color: var(--text); }

    /* ── Helpers ────────────────────────────────── */
    .hidden { display: none !important; }
    .w-full { width: 100%; max-width: 440px; }
    .text-center { text-align: center; }
    .mt-3 { margin-top: 12px; }

    /* ── Divider ─────────────────────────────────── */
    .divider {
      width: 100%;
      max-width: 440px;
      height: 1px;
      background: var(--border);
      margin: 4px 0 12px;
    }

    /* ── Fade-in ─────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeUp 0.3s ease-out both; }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="topbar">
    <div class="palladia-logo">Palladia <span>· Presenze</span></div>
  </div>

  <!-- Site info -->
  <div class="site-header fade-in">
    <h1 id="site-name">Caricamento…</h1>
    <p id="site-address"></p>
  </div>

  <!-- ── STATO: loading ─────────────────────────────────────────────────── -->
  <div id="state-loading" class="w-full text-center" style="padding-top:32px;">
    <div class="spin" style="width:24px;height:24px;border-width:2.5px;border-color:rgba(0,0,0,.15);border-top-color:#000;display:block;margin:0 auto;"></div>
  </div>

  <!-- ── STATO: sessione attiva ─────────────────────────────────────────── -->
  <div id="state-active" class="hidden w-full" style="display:flex;flex-direction:column;align-items:center;">

    <!-- Worker badge -->
    <div id="worker-badge" class="fade-in">
      <div class="worker-avatar" id="avatar-letter">?</div>
      <div class="worker-info">
        <div class="worker-name" id="worker-display-name">—</div>
        <div class="worker-sub">Sessione attiva</div>
      </div>
    </div>

    <!-- Risultato ultimo punch -->
    <div id="result-card" class="hidden fade-in"></div>

    <!-- Azioni -->
    <div class="w-full fade-in">
      <button class="btn btn-green" id="btn-punch">
        Timbra entrata / uscita
      </button>
      <p id="gps-hint">In attesa del GPS…</p>
      <button class="btn btn-ghost mt-3" id="btn-logout">Cambia lavoratore</button>
    </div>
  </div>

  <!-- ── STATO: identificazione ─────────────────────────────────────────── -->
  <div id="state-identify" class="hidden w-full" style="display:flex;flex-direction:column;align-items:center;">
    <div class="card fade-in">
      <p class="card-label">Identificazione lavoratore</p>

      <div class="field">
        <label for="input-cf">Codice Fiscale</label>
        <input id="input-cf" type="text" maxlength="16" placeholder="RSSMRA80A01H501U"
               autocomplete="off" autocapitalize="characters" spellcheck="false" inputmode="text">
      </div>

      <div id="field-name" class="field hidden">
        <label for="input-name">Nome completo</label>
        <input id="input-name" type="text" placeholder="Mario Rossi" autocomplete="name">
      </div>

      <div id="field-error" class="hidden"></div>

      <button class="btn btn-primary" id="btn-identify">Continua</button>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <script>
  'use strict';

  // ── Config ─────────────────────────────────────────────────────────────────
  const API = '';

  const pathParts = window.location.pathname.split('/');
  const WSITE_ID  = pathParts[pathParts.length - 1];

  const _qp      = new URLSearchParams(window.location.search);
  const QR_TOKEN = _qp.get('t');
  const QR_EXP   = _qp.get('exp');
  const HAS_QR   = !!(QR_TOKEN && QR_EXP);

  const LS_KEY_TOK = `badge_tok_${WSITE_ID}`;
  const LS_KEY_NAM = `badge_nam_${WSITE_ID}`;

  // ── State ──────────────────────────────────────────────────────────────────
  let sessionToken    = localStorage.getItem(LS_KEY_TOK) || null;
  let workerName      = localStorage.getItem(LS_KEY_NAM) || '';
  let siteInfo        = null;
  let gpsCoords       = null;
  let gpsWatcher      = null;
  let maxAccuracyM    = 80;
  let punchInProgress = false;

  // ── Helpers ────────────────────────────────────────────────────────────────
  const $ = id => document.getElementById(id);

  function showState(name) {
    ['loading','active','identify'].forEach(s => {
      const el = $(`state-${s}`);
      el.classList.toggle('hidden', s !== name);
      if (s !== name) el.style.display = '';
      else el.style.display = name === 'loading' ? 'block' : 'flex';
    });
  }

  let toastTimer;
  function toast(msg, type = 'error') {
    const el = $('toast');
    el.textContent = msg;
    el.className   = `visible ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = ''; }, 4500);
  }

  function fmtTime(iso) {
    return new Date(iso).toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
  }

  // ── GPS ────────────────────────────────────────────────────────────────────
  function startGps() {
    if (!navigator.geolocation) {
      $('gps-hint').textContent = 'GPS non disponibile';
      $('gps-hint').className   = 'error';
      return;
    }
    gpsWatcher = navigator.geolocation.watchPosition(
      pos => {
        const acc = pos.coords.accuracy;
        gpsCoords = { latitude: pos.coords.latitude, longitude: pos.coords.longitude, accuracy: acc };
        const accRound = Math.round(acc);
        const btn = $('btn-punch');
        if (acc > maxAccuracyM) {
          $('gps-hint').textContent = `Precisione GPS: ~${accRound}m — spostati all'aperto`;
          $('gps-hint').className   = 'warn';
          btn.disabled = true;
        } else {
          $('gps-hint').textContent = `Precisione GPS: ~${accRound}m`;
          $('gps-hint').className   = 'ok';
          if (!punchInProgress) btn.disabled = false;
        }
      },
      err => {
        gpsCoords = null;
        const msgs = { 1: 'Permesso GPS negato — abilitarlo per timbrare', 2: 'Segnale GPS non disponibile', 3: 'Timeout GPS — riprovare' };
        $('gps-hint').textContent = msgs[err.code] || 'Errore GPS';
        $('gps-hint').className   = 'error';
      },
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 10000 }
    );
  }

  function stopGps() {
    if (gpsWatcher !== null) { navigator.geolocation.clearWatch(gpsWatcher); gpsWatcher = null; }
  }

  // ── API ────────────────────────────────────────────────────────────────────
  async function apiFetch(method, path, body) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const r    = await fetch(`${API}${path}`, opts);
    const json = await r.json().catch(() => ({}));
    return { status: r.status, body: json };
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  async function loadSite() {
    const { status, body } = await apiFetch('GET', `/api/v1/scan/worksites/${WSITE_ID}`);
    if (status !== 200) {
      $('site-name').textContent    = 'Cantiere non trovato';
      $('site-address').textContent = `Errore: ${body.error || status}`;
      return false;
    }
    siteInfo     = body;
    maxAccuracyM = body.max_gps_accuracy_m ?? 80;
    $('site-name').textContent    = body.name;
    $('site-address').textContent = body.address || '';
    return true;
  }

  function activateSession(name) {
    workerName = name;
    localStorage.setItem(LS_KEY_NAM, name);
    $('worker-display-name').textContent = name;
    $('avatar-letter').textContent       = name.trim().charAt(0).toUpperCase();
    $('result-card').classList.add('hidden');
    showState('active');
    startGps();
  }

  // ── Punch ──────────────────────────────────────────────────────────────────
  $('btn-punch').addEventListener('click', async () => {
    if (punchInProgress) return;
    if (!gpsCoords) {
      toast('GPS non disponibile — attendere il segnale o abilitare i permessi', 'warn');
      return;
    }

    punchInProgress = true;
    const btn = $('btn-punch');
    btn.disabled  = true;
    btn.innerHTML = '<span class="spin"></span>Invio…';

    try {
      const { status, body } = await apiFetch('POST', '/api/v1/scan/punch', {
        worksite_id:    WSITE_ID,
        session_token:  sessionToken,
        latitude:       gpsCoords.latitude,
        longitude:      gpsCoords.longitude,
        gps_accuracy_m: gpsCoords.accuracy
      });

      if (status === 200)  { showResult(body); return; }
      if (status === 202 && body.warning === 'GPS_ACCURACY_MISSING') { showRefreshPrompt(body.message); return; }

      if (status === 429 && body.error === 'PUNCH_TOO_SOON') {
        const mins = Math.ceil(body.retry_after_secs / 60);
        toast(`Timbratura troppo ravvicinata — riprovare tra ${mins > 0 ? mins + ' min' : body.retry_after_secs + ' s'}`, 'warn');
        return;
      }
      if (status === 403 && body.error === 'OUTSIDE_GEOFENCE') {
        toast(`Fuori dalla zona cantiere — distanza ${body.distance_m}m (max ${body.max_allowed_m}m)`, 'error');
        return;
      }
      if (status === 401)  { clearSession(); toast('Sessione scaduta — identificarsi nuovamente', 'warn'); return; }
      if (status === 422 && body.error === 'GPS_REQUIRED')          { toast('GPS obbligatorio — abilitare la geolocalizzazione', 'warn'); return; }
      if (status === 422 && body.error === 'GPS_ACCURACY_REQUIRED') { toast(`Precisione GPS non disponibile — aggiorna e riprova`, 'warn'); return; }
      if (status === 422 && body.error === 'GPS_ACCURACY_TOO_LOW')  { toast(`Precisione GPS insufficiente (${body.accuracy_m}m) — spostati all'aperto`, 'warn'); return; }

      toast(`Errore: ${body.error || status}`, 'error');
    } catch (e) {
      toast('Errore di rete — verificare la connessione', 'error');
    } finally {
      punchInProgress = false;
      btn.disabled    = false;
      btn.innerHTML   = 'Timbra entrata / uscita';
    }
  });

  function showResult(data) {
    const isEntry = data.event_type === 'ENTRY';
    const card    = $('result-card');
    const distStr = data.distance_m != null ? `${data.distance_m}m dal cantiere — ` : '';
    const accStr  = data.gps_accuracy_m != null ? `±${data.gps_accuracy_m}m` : '';
    card.className = isEntry ? 'entry' : 'exit';
    card.innerHTML = `
      <div class="result-icon">${isEntry ? '✅' : '🔴'}</div>
      <div class="result-label">${isEntry ? 'ENTRATA REGISTRATA' : 'USCITA REGISTRATA'}</div>
      <div class="result-sub">${fmtTime(data.timestamp_server)}${distStr || accStr ? ' — ' + distStr + accStr : ''}</div>`;
    card.classList.remove('hidden');
    if (!isEntry) { showNotesSection(); } else { const ns = $('notes-section'); if (ns) ns.remove(); }
  }

  // ── Note uscita ────────────────────────────────────────────────────────────
  function showNotesSection() {
    const existing = $('notes-section');
    if (existing) existing.remove();

    const section = document.createElement('div');
    section.id        = 'notes-section';
    section.className = 'w-full fade-in';
    section.innerHTML = `
      <div class="card notes-card" style="margin-bottom:12px;">
        <p class="card-label" style="margin-bottom:10px;">Note lavorazione (opzionale)</p>
        <textarea id="note-input" placeholder="Es: Montaggio armatura pilastro P3, getto calcestruzzo…" maxlength="500"></textarea>
        <button class="btn btn-primary" id="btn-save-note" style="margin-top:10px;">Salva nota</button>
        <p id="note-status" style="font-size:12px;color:var(--green);text-align:center;margin-top:8px;display:none;">✓ Nota salvata</p>
      </div>`;

    const resultCard = $('result-card');
    resultCard.parentNode.insertBefore(section, resultCard.nextSibling);

    $('btn-save-note').addEventListener('click', async () => {
      const noteText = $('note-input').value.trim();
      if (!noteText) { toast('Scrivi una nota prima di salvare', 'warn'); return; }

      const btn = $('btn-save-note');
      btn.disabled  = true;
      btn.innerHTML = '<span class="spin"></span>Salvataggio…';

      try {
        const { status, body } = await apiFetch('POST', '/api/v1/scan/note', {
          worksite_id: WSITE_ID, session_token: sessionToken, note_text: noteText
        });
        if (status === 200 && body.ok) {
          $('note-status').style.display = 'block';
          btn.style.display = 'none';
          $('note-input').disabled = true;
        } else {
          toast('Errore salvataggio nota — riprovare', 'error');
          btn.disabled  = false;
          btn.innerHTML = 'Salva nota';
        }
      } catch (e) {
        toast('Errore di rete', 'error');
        btn.disabled  = false;
        btn.innerHTML = 'Salva nota';
      }
    });
  }

  // ── Refresh prompt ──────────────────────────────────────────────────────────
  function showRefreshPrompt(msg) {
    const card = $('result-card');
    card.className = '';
    card.style.cssText = 'background:#fffbeb;border:1.5px solid #fde68a;';
    card.innerHTML = `
      <div class="result-icon">⚠️</div>
      <div class="result-label" style="color:var(--amber);font-size:17px;">Aggiornamento richiesto</div>
      <div class="result-sub" style="margin:8px 0 16px;">${msg || 'Aggiorna la pagina e riprova.'}</div>
      <button class="btn btn-primary" onclick="location.reload()" style="max-width:200px;margin:0 auto;">Ricarica pagina</button>`;
    card.classList.remove('hidden');
  }

  // ── Logout ──────────────────────────────────────────────────────────────────
  $('btn-logout').addEventListener('click', () => {
    clearSession();
    $('input-cf').value = '';
    $('input-name').value = '';
    $('field-name').classList.add('hidden');
    $('field-error').classList.add('hidden');
  });

  function clearSession() {
    sessionToken = null; workerName = '';
    localStorage.removeItem(LS_KEY_TOK);
    localStorage.removeItem(LS_KEY_NAM);
    stopGps();
    const ns = $('notes-section'); if (ns) ns.remove();
    showState('identify');
  }

  // ── Identify ────────────────────────────────────────────────────────────────
  let nameRequired = false;

  $('btn-identify').addEventListener('click', doIdentify);
  ['input-cf','input-name'].forEach(id => {
    $(id).addEventListener('keydown', e => { if (e.key === 'Enter') doIdentify(); });
  });

  async function doIdentify() {
    const cf   = $('input-cf').value.toUpperCase().trim();
    const name = $('input-name').value.trim();

    if (!cf || cf.length !== 16) {
      showFieldError('Il Codice Fiscale deve essere di 16 caratteri');
      return;
    }

    const btn = $('btn-identify');
    btn.disabled  = true;
    btn.innerHTML = '<span class="spin"></span>Verifica…';
    $('field-error').classList.add('hidden');

    const payload = { worksite_id: WSITE_ID, fiscal_code: cf };
    if (nameRequired) payload.full_name = name;

    try {
      const { status, body } = await apiFetch('POST', '/api/v1/scan/identify', payload);

      if (status === 200) {
        sessionToken = body.session_token;
        localStorage.setItem(LS_KEY_TOK, sessionToken);
        activateSession(body.worker_name);
        return;
      }

      if (status === 400 && body.error === 'FULL_NAME_REQUIRED') {
        nameRequired = true;
        $('field-name').classList.remove('hidden');
        showFieldError('Prima registrazione — inserire il nome completo');
        $('input-name').focus();
        return;
      }
      if (status === 403 && body.error === 'WORKER_INACTIVE') {
        showFieldError('Lavoratore non attivo — contattare l\'amministratore');
        return;
      }
      if (status === 403 && body.error === 'WORKER_NOT_ACTIVE_ON_SITE') {
        showFieldError('Non autorizzato su questo cantiere — contattare l\'amministratore');
        return;
      }
      if (status === 400 && body.error === 'INVALID_FISCAL_CODE') {
        showFieldError('Codice Fiscale non valido (16 caratteri alfanumerici)');
        return;
      }
      if (status === 503) {
        showFieldError('Cantiere non configurato — contattare l\'amministratore');
        return;
      }
      showFieldError(`Errore: ${body.error || status}`);
    } catch (e) {
      showFieldError('Errore di rete — verificare la connessione');
    } finally {
      btn.disabled  = false;
      btn.innerHTML = 'Continua';
    }
  }

  function showFieldError(msg) {
    const el = $('field-error');
    el.textContent = msg;
    el.classList.remove('hidden');
  }

  // ── Verifica QR ─────────────────────────────────────────────────────────────
  async function verifyQrSignature() {
    if (!HAS_QR) return true;
    if (Date.now() / 1000 > Number(QR_EXP)) {
      $('site-name').textContent    = 'QR code scaduto';
      $('site-address').textContent = 'Questo QR non è più valido. Richiedere un nuovo QR all\'amministratore.';
      return false;
    }
    const { status, body } = await apiFetch('GET',
      `/api/v1/scan/verify-qr?site=${encodeURIComponent(WSITE_ID)}&t=${encodeURIComponent(QR_TOKEN)}&exp=${QR_EXP}`);
    if (status === 200 && body.valid) return true;
    const errMsg = { QR_EXPIRED: 'QR code scaduto.', INVALID_SIGNATURE: 'QR code non valido.', SIGNING_NOT_CONFIGURED: 'Errore configurazione server.' }[body.error]
      || `QR non valido (${body.error || status})`;
    $('site-name').textContent    = 'Accesso negato';
    $('site-address').textContent = errMsg;
    return false;
  }

  // ── Bootstrap ──────────────────────────────────────────────────────────────
  (async () => {
    showState('loading');
    const qrOk = await verifyQrSignature();
    if (!qrOk) return;
    const ok = await loadSite();
    if (!ok) return;
    if (sessionToken) { activateSession(workerName || 'Lavoratore'); }
    else              { showState('identify'); }
  })();
  </script>
</body>
</html>
